<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบวิชากฎหมายทั่วไป (ครบทุกโหมด + Midterm)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { color: #2c3e50; text-align: center; }
        .setup-section, .quiz-section, .result-section { display: none; }
        .active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; }
        button {
            display: inline-block; background: #3498db; color: #fff; border: none;
            padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 16px;
            width: 100%; margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover { background: #2980b9; }
        .option-btn {
            background: #ecf0f1; color: #333; text-align: left; margin-bottom: 10px;
            padding: 15px; border: 2px solid transparent; transition: 0.3s;
        }
        .option-btn:hover:not(:disabled) { background: #e0e6ed; border-color: #bdc3c7; }
        .option-btn.correct { background: #2ecc71; color: white; border-color: #27ae60; }
        .option-btn.wrong { background: #e74c3c; color: white; border-color: #c0392b; }
        .option-btn:disabled { cursor: not-allowed; }
        .explanation {
            background: #e8f8f5; border-left: 4px solid #1abc9c; padding: 15px;
            margin-top: 15px; display: none; font-size: 0.95em;
        }
        .old-exam-tag { color: #e74c3c; font-weight: bold; }
        #next-btn { background: #2ecc71; display: none; }
        #next-btn:hover { background: #27ae60; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>แบบทดสอบวิชากฎหมายทั่วไป</h1>

    <div id="setup-section" class="setup-section active">
        <div class="form-group">
            <label for="chapter-select">เลือกบทเรียน / หมวดหมู่:</label>
            <select id="chapter-select">
                <option value="chapter1">บทที่ 1: หลักการของกฎหมาย ลำดับชั้นของกฎหมาย</option>
                <option value="chapter2">บทที่ 2: บุคคลและทรัพย์สิน</option>
                <option value="chapter3">บทที่ 3: กฎหมายทะเบียนราษฎร</option>
                <option value="chapter4">บทที่ 4: นิติกรรม สัญญากู้ยืม</option>
                <option value="chapter5">บทที่ 5: สัญญาจ้างแรงงานและจ้างทำของ</option>
                <option value="chapter6">บทที่ 6: สัญญาซื้อขาย</option>
                <option value="all" style="font-weight:bold; color:#e74c3c;">🔥 สุ่มรวมทุกบท (ท้าทาย - 30 ข้อ) 🔥</option>
                <option value="old_exams" style="font-weight:bold; color:#f39c12;">⭐ แนวข้อสอบ Midterm 1 (รวมข้อสอบเก่า)</option>
                <option value="midterm2" style="font-weight:bold; color:#8e44ad;">📝 แนวข้อสอบ Midterm 2 (35 ข้อ)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="mode-select">เลือกรูปแบบการทำข้อสอบ:</label>
            <select id="mode-select">
                <option value="sequential">เรียงตามลำดับข้อ</option>
                <option value="random">สุ่มข้อสอบ</option>
            </select>
        </div>
        <button onclick="startQuiz()">เริ่มทำแบบทดสอบ</button>
    </div>

    <div id="quiz-section" class="quiz-section">
        <div class="status-bar">
            <span id="question-counter">ข้อที่: 1 / ?</span>
            <span id="score-counter">คะแนน: 0</span>
        </div>
        <h3 id="question-text">คำถามจะแสดงที่นี่</h3>
        <div id="options-container"></div>
        <div id="explanation-container" class="explanation"></div>
        <button id="next-btn" onclick="nextQuestion()">ข้อถัดไป</button>
    </div>

    <div id="result-section" class="result-section">
        <h2>สรุปผลคะแนน</h2>
        <h3 id="final-score">คุณทำได้ 0 / 0 คะแนน</h3>
        <button onclick="location.reload()">กลับไปหน้าหลักเพื่อเริ่มใหม่</button>
    </div>
</div>

<script>
    const quizData = {
        chapter1: [
            { q: "กฎหมายคืออะไร ตามความหมายในไฟล์สรุป?", options: ["ก. กฎเกณฑ์ทางศีลธรรมที่ทุกคนต้องปฏิบัติ", "ข. กฎที่สถาบันหรือผู้มีอำนาจสูงสุดในรัฐตราขึ้น หรือเกิดจากจารีตประเพณีอันเป็นที่ยอมรับ", "ค. ข้อตกลงที่เกิดจากการทำประชามติของประชาชน", "ง. กฎเกณฑ์ทางธรรมชาติที่มีมาตั้งแต่กำเนิด"], answer: 1, explanation: "กฎหมายคือกฎที่ผู้มีอำนาจสูงสุด (รัฏฐาธิปัตย์) ตราขึ้น หรือเกิดจากจารีตประเพณีที่ยอมรับ เพื่อบังคับบุคคลให้ปฏิบัติตาม" },
            { q: "หากเกิดการยึดอำนาจการปกครอง และทำ 'สำเร็จ' จะเรียกว่าอะไร และผู้ที่ทำการสำเร็จจะอยู่ในสถานะใด?", options: ["ก. ปฏิวัติ / เป็นนิติบัญญัติ", "ข. ปฏิวัติ / เป็นนายกรัฐมนตรี", "ค. รัฐประหาร / เป็นประมุขแห่งรัฐ", "ง. รัฐประหาร / เป็นรัฏฐาธิปัตย์"], answer: 3, explanation: "ตามสรุปข้อสอบเก่า หากทำสำเร็จเรียกว่า 'รัฐประหาร' และจะทำให้มีสถานะเป็น 'รัฏฐาธิปัตย์' ซึ่งมีอำนาจสูงสุด" },
            { q: "ประเทศสหรัฐอเมริกาใช้ระบบกฎหมายใดเป็นหลัก? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. Civil Law", "ข. Socialist Law", "ค. Common Law", "ง. Religious Law"], answer: 2, explanation: "ระบบ Common Law (กฎหมายจารีตประเพณี/ยึดคำพิพากษาเป็นหลัก) ใช้ในประเทศเช่น USA, UK, มาเลเซีย, สิงคโปร์" },
            { q: "ข้อใดคือลักษณะเด่นของระบบกฎหมายแบบ Civil Law?", options: ["ก. ศาลไม่สามารถบัญญัติกฎหมายเองได้ ต้องพิจารณาตามลายลักษณ์อักษร", "ข. ศาลเป็นที่มาสำคัญของกฎหมาย", "ค. พิพากษาตามคดีที่เคยเกิดขึ้นก่อนหน้าเป็นหลัก", "ง. ใช้เฉพาะกฎหมายที่ไม่เป็นลายลักษณ์อักษร"], answer: 0, explanation: "Civil Law เป็นระบบประมวลกฎหมาย ศาลต้องพิพากษาตามหลักกฎหมายลายลักษณ์อักษร และไม่สามารถบัญญัติกฎหมายเองได้" },
            { q: "'อนุสัญญาว่าด้วยการขจัดการเลือกปฏิบัติต่อสตรีในทุกรูปแบบ' จัดเป็นกฎหมายประเภทใด? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. กฎหมายมหาชน", "ข. กฎหมายระหว่างประเทศ", "ค. กฎหมายภายใน", "ง. กฎหมายวิธีสบัญญัติ"], answer: 1, explanation: "อนุสัญญา สนธิสัญญา พิธีสาร หรือปฏิญญา จัดเป็น 'กฎหมายระหว่างประเทศ' เพราะเป็นข้อตกลงตั้งแต่ 2 รัฐขึ้นไป" },
            { q: "กฎหมายประเภทใดที่เน้นกำหนดเนื้อหาสิทธิ หน้าที่ และความรับผิดชอบของบุคคล?", options: ["ก. กฎหมายสารบัญญัติ", "ข. กฎหมายวิธีสบัญญัติ", "ค. กฎหมายระหว่างประเทศ", "ง. กฎหมายจารีตประเพณี"], answer: 0, explanation: "กฎหมายสารบัญญัติ (Substantive Law) คือกฎหมายที่บัญญัติเนื้อหาของสิทธิ หน้าที่ และความรับผิดชอบ เช่น ป.อาญา" },
            { q: "'ประมวลกฎหมายวิธีพิจารณาความแพ่ง' จัดเป็นกฎหมายประเภทใด? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. กฎหมายสารบัญญัติ", "ข. กฎหมายเอกชน", "ค. กฎหมายวิธีสบัญญัติ", "ง. กฎหมายมหาชน"], answer: 2, explanation: "ประมวลกฎหมายวิธีพิจารณาความแพ่ง เป็นกฎหมายที่บัญญัติถึง วิธีการ ขั้นตอน และการใช้สิทธิ จึงจัดเป็นกฎหมายวิธีสบัญญัติ" },
            { q: "กฎหมายอาญา กับ กฎหมายแพ่ง แตกต่างกันอย่างไรตามข้อสังเกตในไฟล์สรุป?", options: ["ก. อาญาเรียกร้องค่าเสียหาย แพ่งจับติดคุก", "ข. อาญาเน้นไกล่เกลี่ย แพ่งมุ่งเอาตัวมาลงโทษ", "ค. แพ่งได้เงิน อาญาไม่ได้เงินแต่ต้องหาตำรวจ (มุ่งลงโทษ)", "ง. อาญาเป็นความสัมพันธ์ระหว่างเอกชน แพ่งเป็นความสัมพันธ์กับรัฐ"], answer: 2, explanation: "ตามไฟล์สรุป: กฎหมายแพ่ง (ไม่ต้องหาตำรวจ เน้นเรียกค่าสินไหมทดแทน/ได้เงิน) ส่วนกฎหมายอาญา (ไม่ได้เงิน ต้องหาตำรวจ มุ่งเอาตัวผู้กระทำผิดมาลงโทษ)" },
            { q: "ข้อใดเรียงลำดับศักดิ์ของกฎหมายจาก 'สูงไปต่ำ' ได้ถูกต้องที่สุด? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. รัฐธรรมนูญ > พระราชกฤษฎีกา > พ.ร.บ. > กฎกระทรวง > ข้อบัญญัติท้องถิ่น", "ข. รัฐธรรมนูญ > พ.ร.บ.ประกอบรัฐธรรมนูญ > พ.ร.บ./พ.ร.ก. > พระราชกฤษฎีกา > กฎกระทรวง", "ค. รัฐธรรมนูญ > พ.ร.บ. > พ.ร.บ.ประกอบรัฐธรรมนูญ > กฎกระทรวง > พระราชกฤษฎีกา", "ง. พระราชบัญญัติ > รัฐธรรมนูญ > พระราชกฤษฎีกา > กฎกระทรวง"], answer: 1, explanation: "ลำดับศักดิ์ที่ถูกต้อง: รัฐธรรมนูญ > พ.ร.บ.ประกอบรัฐธรรมนูญ > พ.ร.บ./พ.ร.ก. > พระราชกฤษฎีกา > กฎกระทรวง > ระเบียบท้องถิ่น" },
            { q: "การออกกฎหมายใดที่เป็นอำนาจของ 'คณะรัฐมนตรี (ครม.)' ในสถานการณ์ฉุกเฉิน และมีศักดิ์เทียบเท่าพระราชบัญญัติ?", options: ["ก. พระราชบัญญัติประกอบรัฐธรรมนูญ", "ข. พระราชกฤษฎีกา", "ค. กฎกระทรวง", "ง. พระราชกำหนด (พ.ร.ก.)"], answer: 3, explanation: "พระราชกำหนด อาศัยอำนาจรัฐธรรมนูญ ออกโดย ครม. ในสถานการณ์ฉุกเฉิน มีศักดิ์เท่ากับพระราชบัญญัติ" },
            { q: "กฎหมายที่ใช้สำหรับกำหนดความสัมพันธ์บางอย่างของรัฐ เช่น 'การกำหนดวันเลือกตั้ง' คือข้อใด?", options: ["ก. พระราชกฤษฎีกา", "ข. พระราชกำหนด", "ค. กฎกระทรวง", "ง. ข้อบัญญัติท้องถิ่น"], answer: 0, explanation: "พระราชกฤษฎีกา อาศัยอำนาจตาม รฐน., พ.ร.บ., หรือ พ.ร.ก. เพื่อกำหนดความสัมพันธ์บางอย่าง เช่น วันเลือกตั้ง การแบ่งส่วนราชการ" },
            { q: "ในขั้นตอน 'นิติวิธี' หรือการใช้กฎหมาย สิ่งแรกสุดที่ต้องทำคืออะไร?", options: ["ก. ค้นหาข้อกฎหมาย", "ข. ค้นหาข้อเท็จจริง", "ค. วินิจฉัยปรับข้อเท็จจริงเข้ากับกฎหมาย", "ง. ชี้ผลทางกฎหมาย"], answer: 1, explanation: "ขั้นตอนนิติวิธีคือ: 1. ค้นหาข้อเท็จจริง 2. ค้นหาข้อกฎหมาย 3. วินิจฉัย (ปรับบท) 4. ชี้ผลทางกฎหมาย" },
            { q: "โทษในทางอาญามีทั้งหมดกี่สถาน?", options: ["ก. 3 สถาน", "ข. 4 สถาน", "ค. 5 สถาน", "ง. 6 สถาน"], answer: 2, explanation: "โทษทางอาญามี 5 สถาน ได้แก่ ประหารชีวิต, จำคุก, กักขัง, ปรับ, และริบทรัพย์สิน" }
        ],
        chapter2: [
            { q: "สภาพบุคคลเริ่มต้นและสิ้นสุดเมื่อใด? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. เริ่มเมื่อปฏิสนธิ สิ้นสุดเมื่อสมองตาย", "ข. เริ่มเมื่อคลอดและอยู่รอดเป็นทารก สิ้นสุดเมื่อตาย", "ค. เริ่มเมื่ออายุครบ 18 ปี สิ้นสุดเมื่อศาลสั่งสาบสูญ", "ง. เริ่มเมื่อจดทะเบียนสูติบัตร สิ้นสุดเมื่อออกมรณบัตร"], answer: 1, explanation: "สภาพบุคคลย่อมเริ่มเมื่อคลอดและอยู่รอดเป็นทารก (อวัยวะทุกส่วนพ้นจากครรภ์และหายใจได้เอง) สิ้นสุดลงเมื่อตาย" },
            { q: "บุคคลที่ขอให้ศาลสั่งให้เป็นคนสาบสูญได้ กรณีทั่วไปต้องหายไปติดต่อกันกี่ปี? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. 2 ปี", "ข. 3 ปี", "ค. 5 ปี", "ง. 7 ปี"], answer: 2, explanation: "การสาบสูญกรณีทั่วไป ต้องหายไปติดต่อกัน 5 ปี (ถ้ากรณีพิเศษเช่นสงครามหรือภัยพิบัติ คือ 2 ปี)" },
            { q: "อายุ 15 ปี ทำพินัยกรรม มีผลทางกฎหมายเป็นอย่างไร? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. สมบูรณ์", "ข. โมฆะ", "ค. โมฆยะ", "ง. ต้องให้ผู้แทนโดยชอบธรรมเซ็นรับรองก่อนจึงจะสมบูรณ์"], answer: 0, explanation: "การทำพินัยกรรมเป็นข้อยกเว้นเรื่องเฉพาะตัว หากอายุ 15 ปีขึ้นไป ทำพินัยกรรมมีผล 'สมบูรณ์' (ถ้าไม่ถึง 15 ทำแล้วตกเป็นโมฆยะ)" },
            { q: "แก้ว ไข่ คนึง ร่วมกันจัดตั้งบริษัท ก้างขวางคอ จำกัด จะมีบุคคลในทางกฎหมายทั้งหมดกี่บุคคล? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. 1 บุคคล (นิติบุคคล 1)", "ข. 3 บุคคล (บุคคลธรรมดา 3)", "ค. 4 บุคคล (บุคคลธรรมดา 3 นิติบุคคล 1)", "ง. 5 บุคคล (บุคคลธรรมดา 3 นิติบุคคล 2)"], answer: 2, explanation: "มีบุคคลทั้งหมด 4 บุคคล ได้แก่ บุคคลธรรมดา 3 คน (แก้ว ไข่ คนึง) และ นิติบุคคลอีก 1 บุคคล (บริษัท ก้างขวางคอ จำกัด)" },
            { q: "จงระบุว่าข้อใดจัดเป็น 'อสังหาริมทรัพย์'? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. รถยนต์", "ข. เครื่องจักรอุตสาหกรรมในโรงงาน", "ค. ที่ดิน และบ้าน", "ง. เพชรนิลจินดา"], answer: 2, explanation: "อสังหาริมทรัพย์ ได้แก่ ที่ดิน, ทรัพย์ที่ติดอยู่กับที่ดินถาวร (เช่น บ้าน), ต้นไม้ยืนต้น" },

            { q: "บุคคลใดมีหน้าที่ทำนิติกรรมแทน 'คนไร้ความสามารถ'?", options: ["ก. ผู้แทนโดยชอบธรรม", "ข. ผู้พิทักษ์", "ค. ผู้อนุบาล", "ง. ทนายความ"], answer: 2, explanation: "คนไร้ความสามารถทำนิติกรรมไม่ได้เลย ต้องมี 'ผู้อนุบาล' เป็นผู้ทำแทน หากขืนทำจะตกเป็นโมฆยะ" },
            { q: "พฤติกรรมในข้อใดที่อาจทำให้ศาลสั่งให้เป็น 'คนเสมือนไร้ความสามารถ'?", options: ["ก. มีอาการผิดปกติทางสมองจนพูดไม่รู้เรื่องเลย", "ข. พิการทางสายตา", "ค. ประพฤติสุรุ่ยสุร่ายเสเพลเป็นอาจิณ ติดสุรายาเมา", "ง. เป็นหนี้สินล้นพ้นตัว"], answer: 2, explanation: "คนเสมือนไร้ความสามารถคือผู้ที่บกพร่องทางกาย/จิตใจแต่ไม่ถึงวิกลจริต, ประพฤติสุรุ่ยสุร่ายเสเพลเป็นอาจิณ, ติดสุรายาเมา" },
            { q: "ข้อใดต่อไปนี้ 'ไม่ใช่' ทรัพย์สิน?", options: ["ก. ข้อมูลในคอมพิวเตอร์", "ข. กระแสไฟฟ้า", "ค. ก้อนเมฆบนท้องฟ้า", "ง. สิทธิบัตรและลิขสิทธิ์"], answer: 2, explanation: "ก้อนเมฆ พระอาทิตย์ เป็นสิ่งที่ไม่สามารถถือเอาได้ (ครอบครองไม่ได้) จึงไม่เป็นทรัพย์สิน ส่วนข้อมูลและไฟฟ้า ถือเอาและมีราคาได้ จึงเป็นทรัพย์สิน" },
            { q: "ข้อใดคือตัวอย่างของ 'ดอกผลนิตินัย'?", options: ["ก. ลูกแมวที่เพิ่งคลอด", "ข. กิ่งไม้ที่ตัดออกมาจากต้น", "ค. ค่าเช่าบ้าน และดอกเบี้ยเงินฝาก", "ง. ยางอะไหล่รถยนต์"], answer: 2, explanation: "ดอกผลนิตินัย คือ ทรัพย์หรือประโยชน์อื่นที่ได้มาเป็นครั้งคราวจากผู้อื่นเพื่อการได้ใช้ทรัพย์นั้น (เช่น ค่าเช่า ดอกเบี้ย) ซึ่งคำนวณตามระยะเวลาได้" }

        chapter3: [
            { q: "ข้อมูลทะเบียนราษฎรสามารถเปิดเผยให้บุคคลทั่วไปทราบได้หรือไม่? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. ได้ หากเป็นการร้องขอเพื่อทำรายงาน", "ข. ไม่ได้ ถือเป็นความลับ ห้ามมิให้ผู้ใดเปิดเผย", "ค. ได้เฉพาะข้อมูลเกี่ยวกับวันเดือนปีเกิด", "ง. ได้ หากเจ้าบ้านยินยอม"], answer: 1, explanation: "ตามไฟล์สรุป ข้อมูลทะเบียนราษฎร ถือเป็นความลับห้ามมิให้ผู้ใดเปิดเผย (จุดเน้นตัวแดง)" },
            { q: "คำว่า 'บ้าน' ในทางทะเบียนราษฎร ครอบคลุมถึงสถานที่ใดบ้าง?", options: ["ก. สิ่งปลูกสร้างที่มีเลขที่บ้านเท่านั้น", "ข. โรงเรือน คอนโด และเต็นท์ที่พักชั่วคราว", "ค. โรงเรือน สิ่งปลูกสร้าง รวมทั้งเรือ แพ ที่จอดประจำ และยานพาหนะที่ใช้เป็นที่อยู่ประจำได้", "ง. ที่ดินทุกประเภทที่ล้อมรั้ว"], answer: 2, explanation: "บ้าน คือ โรงเรือนหรือสิ่งปลูกสร้าง รวมถึงเรือ แพ ที่จอดประจำ และยานพาหนะซึ่งใช้เป็นที่อยู่ประจำ" },
            { q: "การแจ้งเกิด ไม่ว่าจะเกิดในบ้านหรือนอกบ้าน ต้องแจ้งต่อนายทะเบียนภายในกี่วัน?", options: ["ก. 7 วัน", "ข. 15 วัน", "ค. 30 วัน", "ง. 60 วัน"], answer: 1, explanation: "ให้เจ้าบ้านหรือพ่อแม่แจ้งต่อนายทะเบียน ภายใน 15 วันตั้งแต่เกิด" },
            { q: "การแจ้งตาย (คนตายในบ้าน) เจ้าบ้านต้องแจ้งต่อนายทะเบียนภายในเวลาเท่าใด?", options: ["ก. ภายใน 12 ชม.", "ข. ภายใน 24 ชม.", "ค. ภายใน 3 วัน", "ง. ภายใน 7 วัน"], answer: 1, explanation: "ให้เจ้าบ้านแจ้งต่อนายทะเบียน ภายใน 24 ชม. ถ้านอกบ้านก็ 24 ชม. เช่นกัน" },
            { q: "ในการย้ายที่อยู่ เจ้าบ้านมีหน้าที่แจ้งย้ายออก/เข้า ภายในกี่วันนับตั้งแต่ย้าย? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. 7 วัน", "ข. 15 วัน", "ค. 30 วัน", "ง. 60 วัน"], answer: 1, explanation: "ในการย้าย เจ้าบ้านมีหน้าที่แจ้งนายทะเบียนภายใน 15 วัน นับตั้งแต่ย้ายออก/เข้า" },
            { q: "หากเจ้าบ้านไม่แจ้งการย้ายที่อยู่ภายในเวลาที่กฎหมายกำหนด มีความผิดอย่างไร? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. จำคุกไม่เกิน 1 เดือน", "ข. ปรับไม่เกิน 500 บาท", "ค. ปรับไม่เกิน 1,000 บาท", "ง. ปรับวันละ 100 บาทจนกว่าจะแจ้ง"], answer: 2, explanation: "หากไม่แจ้งย้ายเข้า/ออกภายในกำหนด มีความผิดปรับไม่เกิน 1,000 บาท" },
            { q: "กรณีที่ย้ายออกจาก 'ทะเบียนบ้านกลาง' จะสามารถไปแจ้งย้ายที่ปลายทางได้หรือไม่? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. ทำได้ปกติเหมือนทะเบียนบ้านทั่วไป", "ข. แจ้งปลายทางไม่ได้ ผู้ย้ายต้องมาแสดงตัว ณ ท้องที่ด้วย", "ค. ทำได้เฉพาะกรณีผู้เยาว์", "ง. ทำได้แต่ต้องเสียค่าธรรมเนียมพิเศษ"], answer: 1, explanation: "ถ้าย้ายมาจาก/ออกจาก ทะเบียนบ้านกลาง จะแจ้งย้ายปลายทางไม่ได้ ต้องมาแสดงตัว" }
        ],
        chapter4: [
            { q: "ข้อใดคือความหมายของ 'นิติกรรม' ที่ถูกต้องที่สุด?", options: ["ก. การกระทำใดๆ ที่ทำลงด้วยความสมัครใจ แม้จะผิดกฎหมาย", "ข. การกระทำที่ทำลงโดยชอบด้วยกฎหมาย ด้วยใจสมัคร และมุ่งผูกนิติสัมพันธ์", "ค. การทำสัญญาที่มีลายลักษณ์อักษรเสมอ", "ง. การกระทำที่มุ่งหวังผลกำไรทางธุรกิจ"], answer: 1, explanation: "นิติกรรม คือการใดๆ อันทำลงโดยชอบด้วยกฎหมายและด้วยใจสมัคร มุ่งโดยตรงต่อการผูกนิติสัมพันธ์ระหว่างบุคคล" },
            { q: "การสมคบกันทำสัญญาหลอกผู้อื่น หรือที่เรียกว่า 'การแสดงเจตนาลวง' มีผลทางกฎหมายอย่างไร?", options: ["ก. สมบูรณ์", "ข. โมฆิยะ", "ค. โมฆะ", "ง. ยกเลิกได้ภายใน 1 ปี"], answer: 2, explanation: "เจตนาลวง (สมคบกัน หลอกผู้อื่น) ผลคือตกเป็นโมฆะ" },
            { q: "การ 'สำคัญผิดในคุณสมบัติ' เช่น จ้างก้อยมาทาสีเพราะคิดว่าเป็นช่าง แต่ความจริงก้อยทาสีไม่เป็น มีผลทางกฎหมายอย่างไร?", options: ["ก. โมฆะ", "ข. โมฆยะ", "ค. สมบูรณ์", "ง. มีผลบางส่วน"], answer: 1, explanation: "สำคัญผิดในคุณสมบัติ (ถูกตัวคนแต่คุณสมบัติไม่ใช่) ผลคือตกเป็น โมฆยะ" },
            { q: "สัญญากู้ยืมเงินต้องมีจำนวนตั้งแต่กี่บาทขึ้นไป จึงจะต้องมีหลักฐานเป็นหนังสือเพื่อใช้ฟ้องร้อง? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. 50 บาท", "ข. 500 บาท", "ค. 2,000 บาท", "ง. 5,000 บาท"], answer: 2, explanation: "กู้เกิน 2,000 บาท ต้องมีหลักฐานเป็นหนังสือลงลายมือชื่อ ถ้าไม่มีหลักฐานป้องกันไม่ได้(ฟ้องไม่ได้)" },
            { q: "หากกู้ยืมเงินเกินจำนวนที่กฎหมายกำหนด แต่ไม่มีหลักฐานเป็นหนังสือ จะมีผลอย่างไร? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. สัญญาตกเป็นโมฆะ", "ข. สัญญาตกเป็นโมฆยะ", "ค. สัญญาสมบูรณ์ แต่ฟ้องร้องบังคับคดีไม่ได้ (ป้องกันไม่ได้)", "ง. ถูกปรับทางอาญา"], answer: 2, explanation: "หากกู้เกิน 2000 แต่ไม่มีหลักฐาน สัญญายังสมบูรณ์(ทวงเองได้) แต่ไม่มีหลักฐานป้องกันไม่ได้ คือฟ้องศาลไม่ได้" },
            { q: "อัตราดอกเบี้ยเงินกู้ยืม กฎหมายห้ามคิดเกินร้อยละเท่าใดต่อปี?", options: ["ก. 3% ต่อปี", "ข. 5% ต่อปี", "ค. 15% ต่อปี", "ง. 20% ต่อปี"], answer: 2, explanation: "อัตราดอกเบี้ยห้ามเกิน 15% ต่อปี หากเกิน ดอกเบี้ยจะตกเป็นโมฆะ" },
            { q: "ในสัญญากู้ยืม หากตกลงคิดดอกเบี้ยกันไว้แต่ 'ไม่ได้ระบุอัตรา' กฎหมายให้คิดดอกเบี้ยในอัตราเท่าใด?", options: ["ก. 1% ต่อปี", "ข. 3% ต่อปี", "ค. 5% ต่อปี", "ง. 15% ต่อปี"], answer: 1, explanation: "ตกลงคิดดอกเบี้ยแต่ไม่ได้กำหนดอัตรา ให้คิดอัตรา 3% ต่อปี" }

        chapter5: [
            { q: "ความแตกต่างสำคัญที่สุดระหว่าง 'สัญญาจ้างแรงงาน' กับ 'สัญญาจ้างทำของ' คือข้อใด?", options: ["ก. จ้างแรงงานได้เงินเยอะกว่า จ้างทำของได้น้อยกว่า", "ข. จ้างแรงงานนายจ้างมีอำนาจบังคับบัญชา แต่จ้างทำของเน้นที่ผลสำเร็จของงานผู้รับจ้างมีอิสระ", "ค. จ้างทำของต้องจ่ายเงินล่วงหน้าเสมอ", "ง. จ้างแรงงานห้ามมีสัญญาเป็นลายลักษณ์อักษร"], answer: 1, explanation: "จ้างแรงงานนายจ้างมีอำนาจบังคับบัญชา ส่วนจ้างทำของเน้นที่ 'ผลสำเร็จของงานเป็นสำคัญ' ผู้รับจ้างมีอิสระในการทำงาน" },
            { q: "ใน 'สัญญาจ้างแรงงาน' ลูกจ้างสามารถให้บุคคลอื่นมาทำงานแทนตนเองได้หรือไม่?", options: ["ก. ได้ หากงานเสร็จตามกำหนด", "ข. ได้ แต่ต้องแบ่งค่าจ้างให้คนอื่นด้วย", "ค. ไม่ได้ เพราะการทำงานเป็นเรื่องเฉพาะตัวของลูกจ้าง", "ง. ได้ หากหัวหน้างานไม่เห็น"], answer: 2, explanation: "หน้าที่ของลูกจ้างคือต้อง 'ทำงานด้วยตัวเอง' เพราะเป็นเรื่องเฉพาะตัว" },
            { q: "ตามมาตรา 583 กรณีใดที่นายจ้างสามารถ 'ไล่ออกโดยไม่ต้องบอกกล่าวล่วงหน้า' ได้? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. ลูกจ้างป่วยหนัก", "ข. ลูกจ้างมาสาย 10 นาที", "ค. ลูกจ้างจงใจขัดคำสั่ง หรือกระทำผิดอย่างร้ายแรง", "ง. ลูกจ้างขอลางานเพื่อแต่งงาน"], answer: 2, explanation: "มาตรา 583 นายจ้างสามารถไล่ออกได้ทันทีหาก ลูกจ้างจงใจขัดคำสั่ง, ละทิ้งหน้าที่การงาน, หรือกระทำผิดอย่างร้ายแรง" },
            { q: "เวลาทำงานปกติทั่วไปตามกฎหมายคุ้มครองแรงงาน กำหนดไว้ไม่เกินเท่าใด?", options: ["ก. วันละ 7 ชม. / สัปดาห์ละ 42 ชม.", "ข. วันละ 8 ชม. / สัปดาห์ละ 48 ชม.", "ค. วันละ 9 ชม. / สัปดาห์ละ 54 ชม.", "ง. วันละ 10 ชม. / สัปดาห์ละ 60 ชม."], answer: 1, explanation: "เวลาทำงานปกติ ไม่เกินวันละ 8 ชั่วโมง และสัปดาห์ละ 48 ชั่วโมง (หากเป็นงานอันตรายคือ 7 ชม./42 ชม.)" },
            { q: "ลูกจ้างหญิงมีสิทธิลาคลอดบุตรได้ทั้งหมดกี่วัน และได้รับค่าจ้างระหว่างลาคลอดกี่วัน?", options: ["ก. ลา 90 วัน ได้รับค่าจ้าง 90 วัน", "ข. ลา 98 วัน ได้รับค่าจ้าง 45 วัน", "ค. ลา 120 วัน ได้รับค่าจ้าง 60 วัน", "ง. ลา 98 วัน ได้รับค่าจ้าง 98 วัน"], answer: 1, explanation: "ลูกจ้างหญิงมีครรภ์ลาคลอดได้ 98 วัน และได้รับค่าจ้าง (เงินเดือน) 45 วัน" },
            { q: "เงินค่าตอบแทนในข้อใด ที่กฎหมาย 'ไม่ถือว่าเป็นค่าจ้าง'?", options: ["ก. ค่าล่วงเวลา (OT)", "ข. เงินช่วยเหลือบุตร / โบนัส / เบี้ยขยัน", "ค. ค่าทำงานในวันหยุด", "ง. เงินเดือนพื้นฐาน"], answer: 1, explanation: "เงินช่วยค่าเช่าบ้าน เงินโบนัส เบี้ยขยัน ค่าอาหาร เงินช่วยเหลือบุตร ไม่ถือเป็นค่าจ้าง" }
        ],
        chapter6: [
            { q: "ในสัญญาซื้อขาย ผู้ซื้อมีหน้าที่สำคัญที่สุดคืออะไร?", options: ["ก. โอนกรรมสิทธิ์", "ข. ชำระราคาด้วยเงินเท่านั้น", "ค. ชำระราคาด้วยสินค้าอื่นแลกเปลี่ยน", "ง. จัดหาสัมภาระ"], answer: 1, explanation: "ผู้ซื้อมีหน้าที่ต้องชำระราคาให้แก่ผู้ขาย ซึ่งการชำระราคาในสัญญาซื้อขาย 'ต้องเป็นเงินเท่านั้น' (หากจ่ายเป็นทรัพย์สินจะกลายเป็นสัญญาแลกเปลี่ยน)" },
            { q: "หากเป็นการซื้อขาย 'อสังหาริมทรัพย์' หรือ 'สังหาริมทรัพย์ชนิดพิเศษ' กฎหมายบังคับให้ต้องทำตามแบบใด?", options: ["ก. ทำสัญญาปากเปล่าก็เพียงพอ", "ข. ทำหลักฐานเป็นหนังสือลงลายมือชื่อผู้ซื้อฝ่ายเดียว", "ค. ต้องวางมัดจำเท่านั้น", "ง. ต้องทำเป็นหนังสือและจดทะเบียนต่อพนักงานเจ้าหน้าที่"], answer: 3, explanation: "อสังหาริมทรัพย์ และสังหาริมทรัพย์ชนิดพิเศษ ต้องทำตามแบบ คือ 'ทำเป็นหนังสือและจดทะเบียน' หากไม่ทำจะตกเป็น โมฆะ" },
            { q: "การซื้อขายสังหาริมทรัพย์ (เช่น โทรศัพท์มือถือ) ราคาตั้งแต่เท่าใดขึ้นไป จึงจะต้องมีหลักฐานเป็นหนังสือ วางมัดจำ หรือชำระหนี้บางส่วน เพื่อใช้ฟ้องร้องบังคับคดี? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. 5,000 บาทขึ้นไป", "ข. 10,000 บาทขึ้นไป", "ค. 20,000 บาทขึ้นไป", "ง. 50,000 บาทขึ้นไป"], answer: 2, explanation: "ซื้อขายสังหาริมทรัพย์ 20,000 บาทขึ้นไป ต้องมีหลักฐานเป็นหนังสือ วางมัดจำ หรือชำระบางส่วน ถ้าไม่มีจะฟ้องร้อง(ป้องกัน)ไม่ได้" },
            { q: "การขายฝาก 'อสังหาริมทรัพย์' (เช่น ที่ดิน บ้าน) กฎหมายกำหนดให้ตกลงระยะเวลาไถ่ถอนได้สูงสุดไม่เกินกี่ปี? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. 3 ปี", "ข. 5 ปี", "ค. 10 ปี", "ง. 15 ปี"], answer: 2, explanation: "ระยะเวลาไถ่ถอนอสังหาริมทรัพย์ ตกลงได้สูงสุดไม่เกิน 10 ปี" },
            { q: "การขายฝาก 'สังหาริมทรัพย์' (เช่น รถยนต์ ทองคำ) กฎหมายกำหนดให้ตกลงระยะเวลาไถ่ถอนได้สูงสุดไม่เกินกี่ปี? <span class='old-exam-tag'>(ข้อสอบเก่า)</span>", options: ["ก. 1 ปี", "ข. 3 ปี", "ค. 5 ปี", "ง. 10 ปี"], answer: 1, explanation: "ระยะเวลาไถ่ถอนสังหาริมทรัพย์ ตกลงได้สูงสุดไม่เกิน 3 ปี" },
            { q: "ในกรณี 'การซื้อขายทรัพย์เฉพาะสิ่ง' กรรมสิทธิ์ในกองข้าวสารจะโอนไปยังผู้ซื้อเมื่อใด?", options: ["ก. เมื่อตกลงซื้อขายกัน", "ข. เมื่อชำระเงินครบ", "ค. เมื่อได้ทำการ คัดเลือก ชั่ง ตวง วัด ให้รู้ปริมาณและราคาที่แน่นอนแล้ว", "ง. เมื่อขนข้าวสารขึ้นรถ"], answer: 2, explanation: "ปกติโอนตั้งแต่ทำสัญญา แต่ทรัพย์ต้องเป็น 'ทรัพย์เฉพาะสิ่ง' ก่อน คือต้อง คัดเลือก ชั่ง ตวง วัด ให้รู้ปริมาณหรือราคาก่อน กรรมสิทธิ์จึงจะโอน" }
        ],
        midterm2: [
            { q: "1. ข้อใดเรียงกฎหมายตามลำดับจากสูงสุดไปหาต่ำสุดได้ถูกต้อง", options: ["ก. รัฐธรรมนูญ พระราชบัญญัติ พระราชกฤษฎีกา ข้อบังคับ กฎกระทรวง", "ข. รัฐธรรมนูญ พระราชกฤษฎีกา พระราชบัญญัติ กฎกระทรวง ข้อบังคับ", "ค. รัฐธรรมนูญ พระราชบัญญัติ กฎกระทรวง พระราชกฤษฎีกา ข้อบังคับ", "ง. รัฐธรรมนูญ พระราชบัญญัติ พระราชกฤษฎีกา กฎกระทรวง ข้อบังคับ", "จ. รัฐธรรมนูญ พระราชกฤษฎีกา กฎกระทรวง พระราชบัญญัติ ข้อบังคับ"], answer: 3, explanation: "ลำดับศักดิ์กฎหมายที่ถูกต้องคือ: รัฐธรรมนูญ > พระราชบัญญัติ > พระราชกฤษฎีกา > กฎกระทรวง > ข้อบังคับ/ระเบียบท้องถิ่น" },
            { q: "2. ข้อใดคือแบบของการทำสัญญาซื้อขายอสังหาริมทรัพย์", options: ["ก. การจดทะเบียนต่อพนักงานเจ้าหน้าที่", "ข. การทำเป็นหนังสือ", "ค. การทำเป็นหนังสือและจดทะเบียนต่อพนักงานเจ้าหน้าที่", "ง. การทำเป็นหนังสือต่อพนักงานเจ้าหน้าที่", "จ. การทำหลักฐานเป็นหนังสือลงลายมือชื่อผู้ซื้อ"], answer: 2, explanation: "แบบของสัญญาซื้อขายอสังหาริมทรัพย์ กฎหมายบังคับให้ต้องทำเป็นหนังสือและจดทะเบียนต่อพนักงานเจ้าหน้าที่ มิฉะนั้นจะตกเป็นโมฆะ" },
            { q: "3. “สัญญาซึ่งบุคคลหนึ่งเรียกว่าผู้รับจ้าง ตกลงจะทำงานสิ่งใดสิ่งหนึ่งจนสำเร็จให้แก่บุคคลอีกคนหนึ่งเรียกว่า ผู้ว่าจ้าง และผู้ว่าจ้างตกลงจะให้สินจ้างเพื่อผลสำเร็จแห่งการที่ทำนั้น” หมายถึงสัญญาตามข้อใด", options: ["ก. สัญญาซื้อขาย", "ข. สัญญาจ้างแรงงาน", "ค. สัญญาจ้างทำของ", "ง. สัญญารับจ้าง", "จ. สัญญารับบริการ"], answer: 2, explanation: "เป็นนิยามของสัญญาจ้างทำของ ซึ่งมุ่งเน้น 'ผลสำเร็จของงาน' เป็นสำคัญ" },
            { q: "4. การซื้อขายตามข้อใดต่อไปนี้ที่ “ไม่ต้อง” ทำเป็นหนังสือและจดทะเบียนต่อพนักงานเจ้าหน้าที่", options: ["ก. การซื้อขายช้างลากซุง", "ข. การซื้อขายอาคารพาณิชย์", "ค. การซื้อขายรถยนต์", "ง. การซื้อขายบ้าน", "จ. การซื้อขายที่ดิน"], answer: 2, explanation: "รถยนต์เป็น 'สังหาริมทรัพย์ทั่วไป' สามารถซื้อขายกันได้โดยไม่ต้องทำเป็นหนังสือและจดทะเบียนฯ ส่วนช้างเป็นสัตว์พาหนะ (สังหาฯพิเศษ) และบ้าน/ที่ดินเป็นอสังหาฯ ซึ่งต้องทำตามแบบ" },
            { q: "5. ผู้เยาว์อายุ 15 ปีบริบูรณ์แล้ว ทำพินัยกรรมโดยไม่ได้รับความยินยอมจากผู้แทนโดยชอบธรรม พินัยกรรมมีผลอย่างไร", options: ["ก. โมฆะ", "ข. โมฆียะ", "ค. บริบูรณ์", "ง. สมบูรณ์", "จ. ไม่สมบูรณ์"], answer: 3, explanation: "ผู้เยาว์ที่มีอายุ 15 ปีบริบูรณ์ขึ้นไป สามารถทำพินัยกรรมได้ด้วยตนเอง (เป็นข้อยกเว้นเรื่องเฉพาะตัว) พินัยกรรมนั้นมีผลสมบูรณ์" },
            { q: "6. ในหนึ่งปีลูกจ้างมีสิทธิหยุดตามประเพณีได้กี่วัน", options: ["ก. ไม่น้อยกว่า 15 วัน", "ข. ไม่น้อยกว่า 10 วัน", "ค. ไม่น้อยกว่า 13 วัน", "ง. ไม่น้อยกว่า 30 วัน", "จ. ไม่น้อยกว่า 6 วัน"], answer: 2, explanation: "ตามกฎหมายคุ้มครองแรงงาน นายจ้างต้องจัดให้ลูกจ้างหยุดตามประเพณีไม่น้อยกว่า 13 วันต่อปี" },
            { q: "7. การแจ้งเกิดต้องแจ้งต่อนายทะเบียนภายในกำหนดเวลาเท่าใด", options: ["ก. กรณีคนเกิดในบ้านต้องแจ้งเกิดภายใน 7 วัน", "ข. กรณีคนเกิดในบ้านต้องแจ้งเกิดภายใน 24 ชั่วโมง", "ค. กรณีคนเกิดนอกบ้านต้องแจ้งเกิดภายใน 15 วัน", "ง. กรณีคนเกิดในบ้านหรือเกิดนอกบ้านก็ต้องแจ้งเกิดภายใน 15 วัน", "จ. กรณีคนเกิดนอกบ้านต้องแจ้งเกิดภายใน 7 วัน"], answer: 3, explanation: "การแจ้งเกิดไม่ว่าจะเกิดในบ้านหรือนอกบ้าน กฎหมายกำหนดให้แจ้งต่อนายทะเบียนภายใน 15 วัน" },
            { q: "8. ข้อใดคือกฎหมายวิธีสบัญญัติ", options: ["ก. ประมวลกฎหมายอาญา", "ข. ประมวลกฎหมายวิธีพิจารณาความแพ่ง", "ค. ประมวลกฎหมายแพ่งและพาณิชย์", "ง. พระราชบัญญัติคุ้มครองแรงงาน", "จ. พระราชบัญญัติคุ้มครองผู้บริโภค"], answer: 1, explanation: "กฎหมายวิธีสบัญญัติคือ กฎหมายที่บัญญัติถึงวิธีการและขั้นตอนการใช้กฎหมาย เช่น ประมวลกฎหมายวิธีพิจารณาความแพ่ง (หมายเหตุ: ในไฟล์เฉลยของคุณอาจมีการวงข้อ จ. ผิดพลาด ซึ่งข้อ จ. เป็นกฎหมายสารบัญญัติครับ)" },
            { q: "9. นายเอกมีบุตร 2 คน คือ นายโทและนายตรี นายเอกต้องการให้รถยนต์คันหนึ่งแก่นายโทโดยเสน่หา แต่กลัวว่านายตรีจะเสียใจ จึงแกล้งทำเป็นขายรถยนต์ให้นายโท เช่นนี้ข้อใดถูกต้อง", options: ["ก. สัญญาซื้อขายและสัญญาให้เป็นโมฆะ", "ข. สัญญาซื้อขายและสัญญาให้สมบูรณ์", "ค. ไม่มีข้อใดถูก", "ง. สัญญาซื้อขายสมบูรณ์สัญญาให้โมฆะ", "จ. สัญญาซื้อขายโมฆะผูกพันตามสัญญาให้"], answer: 4, explanation: "กรณีนี้คือ 'นิติกรรมอำพราง' สัญญาซื้อขายที่ทำบังหน้าจะเป็น 'โมฆะ' และต้องบังคับตามสัญญาให้ที่ถูกซ่อนเร้นไว้ (หมายเหตุ: เฉลยในไฟล์ต้นฉบับวงข้อ ง. ไว้ ซึ่งสลับกันครับ ที่ถูกต้องตามหลักกฎหมายคือข้อ จ. ครับ)" },
            { q: "10. ข้อใด “ไม่ใช่” สัญญาซื้อขายเฉพาะอย่าง", options: ["ก. สัญญาขายตามคำพรรณนา", "ข. สัญญาขายตามตัวอย่าง", "ค. สัญญาขายเผื่อชอบ", "ง. สัญญาเช่าซื้อ", "จ. สัญญาขายฝาก"], answer: 3, explanation: "สัญญาเช่าซื้อ ไม่ใช่สัญญาซื้อขายเฉพาะอย่าง แต่เป็นเอกเทศสัญญาอีกประเภทหนึ่งที่แยกต่างหาก (คือการให้เช่า + คำมั่นว่าจะขาย)" },
            { q: "11. ประเทศใดต่อไปนี้ใช้ระบบกฎหมาย Common Law", options: ["ก. ประเทศไทย", "ข. ประเทศฝรั่งเศส", "ค. ประเทศญี่ปุ่น", "ง. ประเทศเกาหลี", "จ. ประเทศสหรัฐอเมริกา"], answer: 4, explanation: "ประเทศสหรัฐอเมริกา และอังกฤษ เป็นต้นกำเนิดและใช้ระบบกฎหมาย Common Law (กฎหมายจารีตประเพณี/คำพิพากษาศาล)" },
            { q: "12. ข้อใดคือความหมายของคำว่า “การทะเบียนราษฎร”", options: ["ก. ทะเบียนต่างๆ รวมทั้งการจัดเก็บข้อมูลทะเบียนประวัติราษฎร", "ข. ข้อมูลเกี่ยวกับทะเบียนประจำบ้านแต่ละบ้านซึ่งแสดงเลขประจำบ้าน", "ค. ข้อมูลเกี่ยวกับผู้ซึ่งเป็นหัวหน้าครอบครัว", "ง. ข้อมูลเกี่ยวกับบุคคลทั้งหมดซึ่งอยู่ในบ้าน", "จ. ข้อมูลตัวบุคคลเกี่ยวกับ ชื่อ ชื่อสกุล เพศ วันเดือนปี เกิด สัญชาติ ศาสนา"], answer: 0, explanation: "การทะเบียนราษฎร หมายถึง งานทะเบียนต่างๆ รวมทั้งการจัดเก็บข้อมูลทะเบียนประวัติราษฎร" },
            { q: "13. ข้อใดกล่าวถูกต้องเกี่ยวกับระยะเวลาการขายฝาก", options: ["ก. สังหาริมทรัพย์ขายฝากได้ไม่เกิน 3 ปี อสังหาริมทรัพย์ขายฝากได้ไม่เกิน 5 ปี", "ข. สังหาริมทรัพย์ขายฝากได้ไม่เกิน 5 ปี อสังหาริมทรัพย์ขายฝากได้ไม่เกิน 10 ปี", "ค. สังหาริมทรัพย์ขายฝากได้ไม่เกิน 5 ปี อสังหาริมทรัพย์ขายฝากได้ไม่เกิน 5 ปี", "ง. สังหาริมทรัพย์ขายฝากได้ไม่เกิน 2 ปี อสังหาริมทรัพย์ขายฝากได้ไม่เกิน 5 ปี", "จ. สังหาริมทรัพย์ขายฝากได้ไม่เกิน 3 ปี อสังหาริมทรัพย์ขายฝากได้ไม่เกิน 10 ปี"], answer: 4, explanation: "ระยะเวลาไถ่ถอนขายฝาก: สังหาริมทรัพย์ห้ามเกิน 3 ปี และ อสังหาริมทรัพย์ห้ามเกิน 10 ปี" },
            { q: "14. การสมรสใหม่ของผู้หญิงต้องรอให้พ้น 310 วันก่อน ยกเว้นข้อใด", options: ["ก. คลอดบุตรระหว่าง 310 วัน", "ข. ศาลสั่งให้สมรสใหม่ได้", "ค. มีใบรับรองแพทย์ว่าไม่ได้ตั้งครรภ์", "ง. สมรสกับคนเดิม", "จ. ถูกทุกข้อ"], answer: 4, explanation: "ผู้หญิงที่การสมรสสิ้นสุดลง จะสมรสใหม่ได้ต้องรอพ้น 310 วัน เว้นแต่ คลอดบุตรแล้ว, สมรสกับคนเดิม, มีใบรับรองแพทย์, หรือศาลสั่งอนุญาต" },
            { q: "15. ข้อใดคือกฎหมายระหว่างประเทศ", options: ["ก. อนุสัญญาว่าด้วยการขจัดการเลือกปฏิบัติต่อสตรีในทุกรูปแบบ", "ข. พระราชบัญญัติประกอบรัฐธรรมนูญว่าด้วยการป้องกันและปราบปราม", "ค. ประมวลกฎหมายแพ่งและพาณิชย์", "ง. รัฐธรรมนูญแห่งราชอาณาจักรไทยพุทธศักราช 2560", "จ. พระราชบัญญัติคุ้มครองแรงงาน พ.ศ. 2541"], answer: 0, explanation: "อนุสัญญา (Convention) เป็นข้อตกลงระหว่างรัฐตั้งแต่ 2 รัฐขึ้นไป จึงเป็นกฎหมายระหว่างประเทศ" },

            { q: "17. บุคคลตามกฎหมายมีกี่ประเภท อะไรบ้าง", options: ["ก. 2 ประเภท คือ บุคคลธรรมดาและบุคคลพิเศษ", "ข. 2 ประเภท คือ บุคคลทั่วไปและไพร่", "ค. 2 ประเภท คือ บุคคลธรรมดาและนิติบุคคล", "ง. 3 ประเภท คือ บุคคลธรรมดา บุคคลพิเศษ และนิติบุคคล", "จ. 1 ประเภท คือ บุคคลธรรมดา"], answer: 2, explanation: "บุคคลในทางกฎหมายมี 2 ประเภท คือ 1. บุคคลธรรมดา และ 2. นิติบุคคล (สิ่งที่กฎหมายสมมติให้เป็นบุคคล)" },

            { q: "24. เจ้าหนี้สัญญากู้ยืมมีสิทธิคิดดอกเบี้ยได้ในอัตราร้อยละเท่าใดต่อปี", options: ["ก. ไม่เกินร้อยละ 15 ต่อปี", "ข. ไม่เกินร้อยละ 1.5 ต่อปี", "ค. ไม่เกินร้อยละ 3 ต่อปี", "ง. ไม่เกินร้อยละ 5 ต่อปี", "จ. ไม่เกินร้อยละ 7.5 ต่อปี"], answer: 0, explanation: "กฎหมายห้ามเรียกดอกเบี้ยกู้ยืมเกินร้อยละ 15 ต่อปี หากฝ่าฝืนดอกเบี้ยจะตกเป็นโมฆะ" },

            { q: "29. ข้อใดกล่าวถูกต้อง", options: ["ก. กุญแจรถเป็นอุปกรณ์ของรถยนต์", "ข. ไม้พายเป็นส่วนควบของเรือ", "ค. ผลส้มบนพื้นเป็นส่วนควบของต้นส้ม", "ง. ล้อจักรยานยนต์เป็นอุปกรณ์ของรถจักรยานยนต์", "จ. หลังคาบ้านเป็นอุปกรณ์ของบ้าน"], answer: 0, explanation: "กุญแจรถเป็นสิ่งที่นำมาใช้เป็นเครื่องมือประจำเพื่อประโยชน์แก่ทรัพย์ประธาน (รถยนต์) จึงเป็นอุปกรณ์" },

            { q: "32. นายเงินทำสัญญาซื้อขายดวงอาทิตย์กับนายทอง ดังนั้นการซื้อขายนี้มีผลทางกฎหมายอย่างไร", options: ["ก. โมฆะ", "ข. โมฆียะ", "ค. บริบูรณ์", "ง. สมบูรณ์", "จ. ไม่สมบูรณ์"], answer: 0, explanation: "การทำสัญญาซื้อขายดวงอาทิตย์ เป็นนิติกรรมที่มีวัตถุประสงค์ 'พ้นวิสัย' (เป็นไปไม่ได้) นิติกรรมจึงตกเป็นโมฆะ" },
            { q: "33. การแจ้งตายต้องแจ้งภายในกำหนดเวลาเท่าใด", options: ["ก. 48 ชั่วโมง", "ข. 1 วัน", "ค. 24 ชั่วโมง", "ง. 2 วัน", "จ. 72 ชั่วโมง"], answer: 2, explanation: "คนตายในบ้านหรือนอกบ้าน ผู้พบศพหรือเจ้าบ้านต้องแจ้งตายภายใน 24 ชั่วโมง" },

    };

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;

    function startQuiz() {
        const chapter = document.getElementById('chapter-select').value;
        const mode = document.getElementById('mode-select').value;
        
        let questions = [];
        
        if (chapter === 'all') {
            questions = [
                ...quizData.chapter1, 
                ...quizData.chapter2, 
                ...quizData.chapter3, 
                ...quizData.chapter4,
                ...quizData.chapter5,
                ...quizData.chapter6
            ];
            questions = questions.sort(() => Math.random() - 0.5);
            questions = questions.slice(0, 30);
            
        } else if (chapter === 'old_exams') {
            let allQuestions = [
                ...quizData.chapter1, 
                ...quizData.chapter2, 
                ...quizData.chapter3, 
                ...quizData.chapter4,
                ...quizData.chapter5,
                ...quizData.chapter6
            ];
            questions = allQuestions.filter(q => q.q.includes("old-exam-tag"));
            if (mode === 'random') {
                questions = questions.sort(() => Math.random() - 0.5);
            }
        } else if (chapter === 'midterm2') {
            questions = [...quizData.midterm2];
            if (mode === 'random') {
                questions = questions.sort(() => Math.random() - 0.5);
            }
        } else {
            questions = [...quizData[chapter]];
            if (mode === 'random') {
                questions = questions.sort(() => Math.random() - 0.5);
                questions = questions.slice(0, 30);
            }
        }

        if (questions.length === 0) {
            alert("ไม่พบข้อสอบในหมวดนี้ครับ");
            return;
        }

        currentQuestions = questions;
        currentQuestionIndex = 0;
        score = 0;

        document.getElementById('setup-section').classList.remove('active');
        document.getElementById('quiz-section').classList.add('active');
        
        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('explanation-container').style.display = 'none';
        
        const qData = currentQuestions[currentQuestionIndex];
        document.getElementById('question-counter').innerText = `ข้อที่: ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('score-counter').innerText = `คะแนน: ${score}`;
        
        document.getElementById('question-text').innerHTML = qData.q;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        qData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, btnElement) {
        const qData = currentQuestions[currentQuestionIndex];
        const buttons = document.querySelectorAll('.option-btn');
        
        buttons.forEach((btn, index) => {
            btn.disabled = true;
            if (index === qData.answer) {
                btn.classList.add('correct');
            }
        });

        if (selectedIndex === qData.answer) {
            score++;
            document.getElementById('score-counter').innerText = `คะแนน: ${score}`;
        } else {
            btnElement.classList.add('wrong');
        }

        const expContainer = document.getElementById('explanation-container');
        expContainer.innerHTML = `<strong>อธิบาย:</strong> ${qData.explanation}`;
        expContainer.style.display = 'block';

        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        if (currentQuestionIndex === currentQuestions.length - 1) {
            nextBtn.innerText = "ดูผลคะแนนสรุป";
        } else {
            nextBtn.innerText = "ข้อถัดไป";
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-section').classList.remove('active');
        document.getElementById('result-section').classList.add('active');
        document.getElementById('final-score').innerText = `คุณทำได้ ${score} / ${currentQuestions.length} คะแนน`;
    }
</script>
