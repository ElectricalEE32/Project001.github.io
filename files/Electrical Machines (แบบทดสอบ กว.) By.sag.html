          </div>
          <div className="flex items-start gap-2 text-sm text-slate-600">
            <span className="text-blue-500 mt-0.5">✦</span> ใช้แผงด้านซ้ายเพื่อข้ามข้อได้อิสระ
          </div>
          <div className="flex items-start gap-2 text-sm text-slate-600">
            <span className="text-blue-500 mt-0.5">✦</span> ติดตามคะแนนได้ตลอดเวลา
          </div>
        </div>

        <button
          onClick={() => setStarted(true)}
          className="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-4 rounded-2xl text-lg transition-all duration-150 shadow-lg shadow-blue-200"
        >
          เริ่มทำข้อสอบ →
        </button>
      </div>
    </div>
  );

  return (
    <div className="h-[100dvh] w-full bg-slate-50 text-slate-800 font-sans flex flex-col md:flex-row overflow-hidden">
      
      {/* Mobile Header */}
      <div className="md:hidden bg-blue-700 text-white p-4 flex justify-between items-center shadow-md shrink-0">
        <h1 className="font-bold text-lg">Electrical Machines Quiz</h1>
        <button onClick={() => setIsSidebarOpen(true)} className="p-2 bg-blue-800 rounded-lg">
          <Menu size={24} />
        </button>
      </div>

      {/* Sidebar Navigation — ขวา */}
      <div className={`fixed inset-y-0 right-0 transform ${isSidebarOpen ? "translate-x-0" : "translate-x-full"} md:relative md:translate-x-0 md:order-last w-80 bg-white shadow-xl md:shadow-none md:border-l border-slate-200 z-50 transition-transform duration-300 ease-in-out flex flex-col h-full shrink-0`}>
        <div className="p-6 bg-blue-700 text-white flex justify-between items-center md:block shrink-0">
          <div>
            <h1 className="font-bold text-xl hidden md:block mb-2">Quiz Navigator</h1>
            <p className="text-blue-100 text-sm">ความคืบหน้า: {answeredCount} / {totalQuestions} ข้อ</p>
            <div className="w-full bg-blue-900 rounded-full h-2 mt-2">
              <div className="bg-green-400 h-2 rounded-full transition-all" style={{ width: `${(answeredCount / totalQuestions) * 100}%` }}></div>
            </div>
          </div>
          <button className="md:hidden p-1 text-white hover:bg-blue-600 rounded" onClick={() => setIsSidebarOpen(false)}>
            <X size={24} />
          </button>
        </div>

        <div className="flex-1 overflow-y-auto custom-scrollbar p-4">
          <div className="flex items-center gap-2 mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-slate-600"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <h2 className="text-sm font-bold text-slate-700">แผงนำทาง (1-{totalQuestions})</h2>
          </div>
          <hr className="border-slate-200 mb-3" />
          <div className="grid grid-cols-4 gap-2">
            {quizData.map((_, index) => {
              const answered = userAnswers[index] !== undefined;
              const correct = userAnswers[index] === quizData[index].correctIndex;
              const isActive = currentIndex === index;

              let btnClass = "w-full aspect-square flex items-center justify-center rounded-xl text-sm font-semibold transition-all duration-150 ";
              if (isActive) {
                btnClass += "ring-2 ring-indigo-500 ring-offset-1 ";
              }
              if (!answered) {
                btnClass += "bg-slate-100 text-slate-600 hover:bg-slate-200";
              } else if (correct) {
                btnClass += "bg-emerald-500 text-white";
              } else {
                btnClass += "bg-rose-500 text-white";
              }

              return (
                <button
                  key={index}
                  id={`nav-item-${index}`}
                  onClick={() => jumpToQuestion(index)}
                  className={btnClass}
                >
                  {index + 1}
                </button>
              );
            })}
          </div>
        </div>

        {/* Legend */}
        <div className="px-4 py-3 border-t border-slate-200 bg-white shrink-0 space-y-1.5">
          <div className="flex items-center gap-2 text-xs text-slate-600">
            <span className="w-3 h-3 rounded-full bg-slate-300 inline-block"></span> ยังไม่ตอบ
          </div>
          <div className="flex items-center gap-2 text-xs text-slate-600">
            <span className="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span> ตอบถูก
          </div>
          <div className="flex items-center gap-2 text-xs text-slate-600">
            <span className="w-3 h-3 rounded-full bg-rose-500 inline-block"></span> ตอบผิด
          </div>
        </div>
        
        <div className="p-4 border-t border-slate-200 bg-slate-50 shrink-0">
          <div className="flex justify-between items-center text-sm font-medium">
            <span className="text-emerald-600">ถูก: {correctCount}</span>
            <span className="text-rose-600">ผิด: {answeredCount - correctCount}</span>
          </div>
        </div>
      </div>

      {/* Main Quiz Area */}
      <div className="flex-1 flex flex-col h-full overflow-hidden bg-slate-50">
        
        {/* Scrollable Content */}
        <div className="flex-1 overflow-y-auto p-4 md:p-8 lg:px-16">
          <div className="max-w-3xl mx-auto mt-4 pb-12">
            <div className="mb-8">
              <span className="inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-semibold mb-4">
                ข้อที่ {currentIndex + 1} จาก {totalQuestions}
              </span>
              <h2 className="text-2xl md:text-3xl font-bold text-slate-800 leading-snug">
                {currentQ.question}
              </h2>
            </div>

            <div className="space-y-3">
              {currentQ.options.map((option, index) => {
                const isSelected = selectedOption === index;
                const isThisCorrect = index === currentQ.correctIndex;
                
                let optionClass = "w-full text-left p-4 md:p-5 rounded-xl border-2 transition-all duration-200 flex items-center justify-between ";
                
                if (!isAnswered) {
                  optionClass += "border-slate-200 hover:border-blue-400 hover:bg-blue-50 cursor-pointer bg-white shadow-sm";
                } else {
                  optionClass += "cursor-default ";
                  if (isThisCorrect) {
                    optionClass += "bg-emerald-50 border-emerald-500 text-emerald-800 shadow-md";
                  } else if (isSelected) {
                    optionClass += "bg-rose-50 border-rose-500 text-rose-800 shadow-md";
                  } else {
                    optionClass += "bg-white border-slate-200 opacity-60";
                  }
                }

                return (
                  <button
                    key={index}
                    onClick={() => handleOptionClick(index)}
                    disabled={isAnswered}
                    className={optionClass}
                  >
                    <span className="text-lg leading-relaxed">{option}</span>
                    {isAnswered && isThisCorrect && <CheckCircle className="text-emerald-500 flex-shrink-0 ml-3" size={24} />}
                    {isAnswered && isSelected && !isThisCorrect && <XCircle className="text-rose-500 flex-shrink-0 ml-3" size={24} />}
                  </button>
                );
              })}
            </div>

            {/* Explanation Section */}
            {isAnswered && (
              <div className="mt-8 p-6 bg-blue-50 border border-blue-200 rounded-2xl animate-fade-in mb-8">
                <div className="flex items-center gap-2 mb-3">
                  {isCorrect ? (
                    <span className="flex items-center gap-1 text-emerald-600 font-bold text-lg">
                      <CheckCircle size={20} /> ตอบถูกต้อง!
                    </span>
                  ) : (
                    <span className="flex items-center gap-1 text-rose-600 font-bold text-lg">
                      <XCircle size={20} /> ตอบผิด!
                    </span>
                  )}
                </div>
                <div className="flex gap-3">
                  <Info className="text-blue-500 flex-shrink-0 mt-1" size={20} />
                  <div>
                    <h4 className="font-semibold text-blue-900 mb-1">คำอธิบายและเหตุผล:</h4>
                    <p className="text-blue-800 leading-relaxed">
                      {currentQ.explanation}
                    </p>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Bottom Navigation Bar */}
        <div className="w-full shrink-0 bg-white border-t border-slate-200 py-3 px-4 shadow-sm z-10">
          <div className="max-w-3xl mx-auto flex justify-between items-center">
            <button
              onClick={goToPrev}
              disabled={currentIndex === 0}
              className={`flex items-center gap-1.5 px-4 py-2 rounded-lg font-medium transition-colors text-sm ${
                currentIndex === 0 
                  ? "bg-slate-100 text-slate-400 cursor-not-allowed" 
                  : "bg-white text-blue-700 border border-blue-200 hover:bg-blue-50"
              }`}
            >
              <ArrowLeft size={18} /> ก่อนหน้า
            </button>
            
            <button
              onClick={goToNext}
              disabled={currentIndex === totalQuestions - 1}
              className={`flex items-center gap-1.5 px-4 py-2 rounded-lg font-medium transition-colors text-sm ${
                currentIndex === totalQuestions - 1 
                  ? "bg-slate-100 text-slate-400 cursor-not-allowed" 
                  : isAnswered ? "bg-blue-600 text-white hover:bg-blue-700 shadow-md" : "bg-white text-blue-700 border border-blue-200 hover:bg-blue-50"
              }`}
            >
              ถัดไป <ArrowRight size={18} />
            </button>
          </div>
        </div>
      </div>
      
      {/* Overlay for mobile sidebar */}
      {isSidebarOpen && (
        <div 
          className="fixed inset-0 bg-black/50 z-40 md:hidden"
          onClick={() => setIsSidebarOpen(false)}
        ></div>
      )}
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
