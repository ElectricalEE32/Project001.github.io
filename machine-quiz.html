                    { no: 3, text: "วงจรแม่เหล็กวงจรหนึ่งมีความยาวเฉลี่ยแกนเหล็ก 1.8 m พื้นที่หน้าตัดแกนเหล็ก 0.015 sq.m มีขดลวดจำนวน 200 turns พันรอบแกนเหล็ก เมื่อจ่ายกระแสไฟฟ้า 2 A เข้าไปในขดลวด มีค่าความซึมซาบแม่เหล็กสัมพัทธ์ (relative permeability) เท่ากับ 2500 จงหาค่าเส้นแรงแม่เหล็ก (magnetic flux) ของวงจรแม่เหล็กนี้", choices: ["1 : 9.95 mWb", "2 : 6.84 mWb", "3 : 8.24 mWb", "4 : 10.46 mWb"], correctIndex: 3, explanation: "ถูกต้อง คำนวณจาก $MMF = NI = 200 \\times 2 = 400$ A.turns และ $\\mathcal{R} = \\frac{l}{\\mu_0 \\mu_r A} = \\frac{1.8}{(4\\pi \\times 10^{-7})(2500)(0.015)} \\approx 38197$ A.turns/Wb จะได้ $\\Phi = \\frac{400}{38197} \\approx 0.01047$ Wb หรือ 10.46 mWb [cite: 21, 25]" },
                    { no: 4, text: "ตัวเหนี่ยวนำ (inductor) มีจำนวนรอบขดลวดพันบนแกนเหล็กเท่ากับ 20 turns และมีค่าความเหนี่ยวนำ (inductance) เท่ากับ 0.1 mH ถ้าต้องการเพิ่มค่าความเหนี่ยวนำเป็น 0.4 mH ต้องพันจำนวนรอบขดลวดเพิ่มอีกกี่รอบ", choices: ["1 : 20 turns", "2 : 30 turns", "3 : 24 turns", "4 : 16 turns"], correctIndex: 0, explanation: "ถูกต้อง ความเหนี่ยวนำแปรผันตรงกับกำลังสองของจำนวนรอบ ($L \\propto N^2$) การต้องการให้ L เพิ่ม 4 เท่า หมายความว่า N ต้องเพิ่ม 2 เท่า (จาก 20 เป็น 40 รอบ) ดังนั้นต้องพันเพิ่มอีก 20 รอบ [cite: 27, 28]" },

                    { no: 6, text: "การเปลี่ยนแปลงของตัวเลือกในข้อใด ที่ส่งผลทำให้ค่าความสูญเสียของแกนเหล็ก (core loss) ในวงจรแม่เหล็กมีการเปลี่ยนแปลง", choices: ["1 : ปริมาตรของแกนเหล็ก", "2 : น้ำหนักของแกนเหล็ก", "3 : แรงเคลื่อนทางแม่เหล็กที่ใช้งาน", "4 : ถูกทุกข้อ"], correctIndex: 3, explanation: "ถูกต้อง ความสูญเสียหลักในแกนเหล็ก (Core loss) ประกอบด้วย Hysteresis และ Eddy current loss ซึ่งขึ้นอยู่กับปริมาตร (หรือน้ำหนัก) ของแกนเหล็ก และความหนาแน่นเส้นแรงแม่เหล็ก (แปรผันตามแรงเคลื่อนแม่เหล็ก) [cite: 45, 49]" },

                    { no: 16, text: "เหตุใด แกนเหล็กของอาร์มาเจอร์ (armature core) ใน DC machine จึงต้องเป็นแท่งอัดจากแผ่นเหล็กบางอาบฉนวน", choices: ["1 : เพื่อลดความสูญเสียในขดลวดอาเมเจอร์ (armature copper loss)", "2 : เพื่อระบายความร้อนในแกนเหล็ก", "3 : เพื่อเพิ่มหน้าสัมผัสของแปรงถ่าน", "4 : เพื่อลดความสูญเสียเนื่องจากกระแสวน (eddy current loss)"], correctIndex: 3, explanation: "ถูกต้อง โครงสร้าง Lamination แผ่นบางอาบฉนวนช่วยลดขนาดของกระแส Eddy current ที่ไหลวนในแกนเหล็ก [cite: 128, 132]" },

                    { no: 19, text: "ความหนาแน่นกระแส (current density) ในวงจรไฟฟ้าเปรียบเหมือนข้อใดในวงจรแม่เหล็ก", choices: ["1 : Magnetic reluctance", "2 : Magnetic flux density", "3 : Permeability", "4 : Magnetic field intensity"], correctIndex: 1, explanation: "ถูกต้อง ความหนาแน่นกระแส ($J = I/A$) เทียบได้กับ ความหนาแน่นฟลักซ์แม่เหล็ก ($B = \\Phi/A$) [cite: 146, 148]" },
                    { no: 20, text: "จงคำนวณหาค่าความเหนี่ยวนำ พื้นที่หน้าตัด 0.0025 sq.m, ความยาว 1.6 m, ความหนาแน่นเส้นแรงแม่เหล็ก 1.6 T, ขดลวด 250 turns, กระแส 6 A", choices: ["1 : 83.33 mH", "2 : 166.67 H (mH)", "3 : 16.67 mH", "4 : 8.3333 mH"], correctIndex: 1, explanation: "ถูกต้อง ฟลักซ์ $\\Phi = 1.6 \\times 0.0025 = 0.004$ Wb. จะได้ $L = \\frac{N\\Phi}{I} = \\frac{250 \\times 0.004}{6} = 0.16667$ H หรือ 166.67 mH (เฉลยปรับหน่วยให้ตรงกับการคำนวณ) [cite: 157, 160]" },
                    { no: 21, text: "ข้อใดทำให้ฟลักซ์รั่ว (leakage flux) ของวงจรแม่เหล็กเพิ่มขึ้นได้", choices: ["1 : โครงสร้างแม่เหล็กทำงานในช่วงอิ่มตัว", "2 : วงจรแม่เหล็กทำงานในช่วงก่อนเข้าสู่ภาวะอิ่มตัวเป็นเวลา 60 s", "3 : โครงสร้างแม่เหล็กทำงานในช่วงเชิงเส้น", "4 : วงจรแม่เหล็กทำงานในช่วงที่ความซึมซาบแม่เหล็กสัมพัทธ์มีค่าสูง"], correctIndex: 0, explanation: "ถูกต้อง เมื่อแกนเหล็กเข้าสู่สภาวะอิ่มตัว (Saturation) ความต้านทานแม่เหล็กในแกนจะสูงขึ้น ฟลักซ์จึงรั่วออกไปทางอากาศมากขึ้น [cite: 164, 165]" },
                    { no: 22, text: "วัสดุแม่เหล็กชนิด Ferromagnetic material ควรมีคุณสมบัติตรงกับข้อใด", choices: ["1 : ความซึมซาบแม่เหล็กสัมพัทธ์ (relative permeability) มีค่าสูงมาก", "2 : ความซึมซาบแม่เหล็กสัมพัทธ์ มีค่าเท่ากับ 1", "3 : ความซึมซาบแม่เหล็กสัมพัทธ์ มีค่าน้อยกว่า 1", "4 : ความซึมซาบแม่เหล็กสัมพัทธ์ มีค่ามากกว่า 1 เล็กน้อย"], correctIndex: 0, explanation: "ถูกต้อง Ferromagnetic นำสนามแม่เหล็กได้ดีมาก จึงมีค่า $\\mu_r$ สูงตั้งแต่หลักร้อยถึงหลายพัน [cite: 170, 171]" },
                    { no: 23, text: "อากาศ (air) จัดเป็นวัสดุแม่เหล็กประเภทใด", choices: ["1 : Ferromagnetic material", "2 : Diamagnetic material", "3 : Paramagnetic material", "4 : Amorphous material"], correctIndex: 2, explanation: "ถูกต้อง อากาศมีความเป็น Paramagnetic เล็กน้อย (ค่าความซึมซาบแม่เหล็กมากกว่า 1 เล็กน้อยมาก) [cite: 174, 177]" },
                    { no: 24, text: "นิยามของตัวเหนี่ยวนำ (inductor) คือข้อใด", choices: ["1 : อัตราการเปลี่ยนแปลงของกระแสไฟฟ้าต่อเวลา", "2 : อัตราการเปลี่ยนแปลงของเส้นแรงแม่เหล็กต่อเวลา", "3 : ค่าเส้นแรงแม่เหล็กทั้งหมดที่เกี่ยวคล่องในขดลวดหารด้วยกระแสไฟฟ้า", "4 : จำนวนรอบของขดลวดคูณกับอัตราการเปลี่ยนแปลงของเส้นแรงแม่เหล็กต่อเวลา"], correctIndex: 2, explanation: "ถูกต้อง ความเหนี่ยวนำ $L = \\frac{N\\Phi}{I}$ คือสัดส่วนของ Flux linkage ต่อกระแสไฟฟ้า [cite: 180, 183]" },
                    { no: 25, text: "กำหนดให้มีกระแสไฟฟ้า 2 A ไหลในขดลวด (จากรูปมี 4 รอบ) แต่ละเส้นแรงแม่เหล็กเท่ากับ 4 mWb (มี 3 เส้นทะลุผ่าน) ให้คำนวณหาค่าความเหนี่ยวนำ", choices: ["1 : 0.036 H", "2 : 0.024 H", "3 : 0.002 H", "4 : 0.000 H"], correctIndex: 1, explanation: "ถูกต้อง ฟลักซ์รวมต่อรอบ $\\Phi = 3 \\times 0.004 = 0.012$ Wb. ขดลวดมี 4 รอบ $L = \\frac{N\\Phi}{I} = \\frac{4 \\times 0.012}{2} = 0.024$ H [cite: 186, 195]" },
                    { no: 26, text: "วงจรแม่เหล็ก ขดลวดชุดที่ 1 มี 100 turns ชุดที่ 2 มี 500 turns $\\mathcal{R} = 7,960,000$ A.turn/Wb ให้คำนวณหาค่าความเหนี่ยวนำร่วม (mutual inductance: M)", choices: ["1 : 0.0063 H", "2 : 0.0126 H", "3 : 0.00315 H", "4 : 0.0152 H"], correctIndex: 0, explanation: "ถูกต้อง คำนวณจาก $M = \\frac{N_1 N_2}{\\mathcal{R}} = \\frac{100 \\times 500}{7960000} \\approx 0.00628$ H หรือใกล้เคียง 0.0063 H [cite: 198, 199]" },
                    { no: 27, text: "วงจรแม่เหล็กวงจรหนึ่งมีช่องอากาศ 1 ช่อง ถ้าเพิ่มช่องอากาศให้มีค่าเพิ่มขึ้นเป็น 2 เท่า ค่าความเหนี่ยวนำตัวเอง (self-inductance) มีค่าเป็นอย่างไร", choices: ["1 : เพิ่มขึ้นเป็น 2 เท่า", "2 : เพิ่มขึ้นเป็น 4 เท่า", "3 : ลดลงเป็น 1/2 เท่า", "4 : ลดลงเป็น 1/4 เท่า"], correctIndex: 2, explanation: "ถูกต้อง ความต้านทานแม่เหล็ก (Reluctance) จะเพิ่มประมาณ 2 เท่า ทำให้ค่า L ลดลงเป็นครึ่งหนึ่ง ($1/2$ เท่า) เพราะ $L \\propto 1/\\mathcal{R}$ [cite: 204, 208]" },
                    { no: 28, text: "วงจรแม่เหล็กมีขดลวด 200 turns ต่ออยู่กับแหล่งจ่าย 220 V, 50 Hz ถ้าจำนวนรอบเพิ่มขึ้นเป็น 2 เท่า จะต้องปรับแรงดันเท่าใดเพื่อให้ความหนาแน่นเส้นแรงแม่เหล็ก (B) คงเดิม", choices: ["1 : 110 V", "2 : 220 V", "3 : 440 V", "4 : 550 V"], correctIndex: 2, explanation: "ถูกต้อง จากสมการ $V \\approx 4.44 f N B A$ ถ้า N เพิ่ม 2 เท่า และต้องการ B คงเดิม ต้องปรับ V ให้เพิ่มขึ้น 2 เท่าเป็น 440 V [cite: 211, 215]" },
                    { no: 29, text: "วงจรแม่เหล็กมีแรงเคลื่อนแม่เหล็ก 1000 A.turn ความต้านทานแม่เหล็ก 50,000 A.turn/Wb จงหาค่าของเส้นแรงแม่เหล็ก (magnetic flux)", choices: ["1 : 0.02 Wb", "2 : 0.02 mWb", "3 : 2 Wb", "4 : 50 Wb"], correctIndex: 0, explanation: "ถูกต้อง คำนวณจาก $\\Phi = \\frac{MMF}{\\mathcal{R}} = \\frac{1000}{50000} = 0.02$ Wb [cite: 218, 219]" },
                    { no: 30, text: "ตัวเหนี่ยวนำ 10 turns บนแกนวงแหวน A = 100 sq.mm, l = 0.1 m, $\\mu_r = 5000$, I = 1 A จงคำนวณหาความหนาแน่นเส้นแรงแม่เหล็ก (B)", choices: ["1 : 0.121 T", "2 : 0.358 T", "3 : 0.628 T", "4 : 1.12 T"], correctIndex: 2, explanation: "ถูกต้อง $H = \\frac{NI}{l} = \\frac{10 \\times 1}{0.1} = 100$ A/m. จากนั้น $B = \\mu_0 \\mu_r H = (4\\pi \\times 10^{-7})(5000)(100) \\approx 0.628$ T [cite: 229, 232]" },
                    { no: 31, text: "ตัวเหนี่ยวนำขนาด 10 mH แกนวงแหวน A = 100 sq.mm, l = 0.1 m, $\\mu_r = 5000$ จงคำนวณหาจำนวนรอบของขดลวด", choices: ["1 : 40 รอบ", "2 : 105 รอบ", "3 : 129 รอบ", "4 : 157 รอบ"], correctIndex: 0, explanation: "ถูกต้อง จาก $L = \\frac{N^2 \\mu_0 \\mu_r A}{l} \\Rightarrow 0.01 = \\frac{N^2 (4\\pi \\times 10^{-7})(5000)(100 \\times 10^{-6})}{0.1}$ แก้สมการได้ $N^2 \\approx 1591.5$ ถอดรูทได้ N $\\approx$ 40 รอบ [cite: 234, 235]" },
                    { no: 32, text: "เมื่อนำวัสดุแม่เหล็กแบบ Soft steel เข้าใกล้แม่เหล็กปรากฏว่าวัสดุแม่เหล็กมีความเป็นแม่เหล็กเกิดขึ้นเราเรียกปรากฏการณ์นี้ว่าอะไร", choices: ["1 : การเหนี่ยวนำแม่เหล็ก", "2 : แม่เหล็กถาวร", "3 : ความเป็นแม่เหล็กคงค้าง", "4 : แม่เหล็กไฟฟ้า"], correctIndex: 0, explanation: "ถูกต้อง ปรากฏการณ์ที่วัสดุกลายเป็นแม่เหล็กเมื่อจัดเรียงโดเมนตามสนามแม่เหล็กภายนอก เรียกว่า การเหนี่ยวนำแม่เหล็ก [cite: 240, 241]" },
                    { no: 33, text: "วัสดุในข้อใด เป็นวัสดุแม่เหล็กแบบ Paramagnetic material", choices: ["1 : เหล็ก (steel)", "2 : นิเกิล (nickel)", "3 : โคบอล (cobalt)", "4 : อากาศ (air)"], correctIndex: 3, explanation: "ถูกต้อง อากาศจัดเป็นวัสดุแบบ Paramagnetic ส่วนเหล็ก นิกเกิล และโคบอลต์ เป็น Ferromagnetic ทั้งหมด [cite: 246, 250]" },
                    { no: 34, text: "ข้อใดส่งผลต่อ ทิศทางของเส้นแรงแม่เหล็ก (magnetic flux) ที่เกิดขึ้นรอบตัวนำ", choices: ["1 : ทิศทางการไหลของกระแสไฟฟ้า", "2 : ขนาดแรงดันไฟฟ้าที่ป้อน", "3 : ขนาดกระแสไฟฟ้า", "4 : ชนิดของวัสดุตัวนำ"], correctIndex: 0, explanation: "ถูกต้อง กฎมือขวา (Right hand grip rule) ระบุว่าทิศทางกระแสจะเป็นตัวกำหนดทิศทางการวนของเส้นแรงแม่เหล็ก [cite: 253, 254]" },
                    { no: 35, text: "การหาขั้วแม่เหล็กของขดลวด พิจารณาได้จากข้อใด", choices: ["1 : ขนาดแรงดันไฟฟ้า", "2 : ขนาดกระแสไฟฟ้า", "3 : จำนวนรอบ", "4 : ทิศทางการไหลของกระแสไฟฟ้า"], correctIndex: 3, explanation: "ถูกต้อง กฎมือขวาของขดลวดโซลินอยด์ ทิศทางการไหลของกระแสจะเป็นตัวกำหนดขั้วแม่เหล็กเหนือ-ใต้ [cite: 264, 271]" },
                    { no: 36, text: "แรงเคลื่อนแม่เหล็ก (magnetomotive force) ของขดลวด ขึ้นอยู่กับตัวเลือกในข้อใด", choices: ["1 : ทิศทางกระแสไฟฟ้า", "2 : กฎมือซ้าย", "3 : ทิศทางเส้นแรง", "4 : ขนาดกระแสไฟฟ้า"], correctIndex: 3, explanation: "ถูกต้อง ขนาดของ MMF = N $\\times$ I ดังนั้นจึงแปรผันตามขนาดของกระแสไฟฟ้า [cite: 274, 278]" },
                    { no: 37, text: "เมื่อขดลวดพันบนแกนอากาศ 20 turns มีกระแสไฟฟ้าไหลผ่าน 2 A จะต้องทำอย่างไร ถ้าต้องการให้แรงเคลื่อนแม่เหล็กเพิ่มขึ้น", choices: ["1 : เพิ่มจำนวนรอบ", "2 : ลดจำนวนรอบ", "3 : ลดกระแสไฟฟ้า", "4 : กลับทิศทางการไหลของกระแสไฟฟ้า"], correctIndex: 0, explanation: "ถูกต้อง MMF = N $\\times$ I การเพิ่มจำนวนรอบ (N) จะช่วยเพิ่ม MMF ได้ [cite: 280, 281]" },
                    { no: 38, text: "วงจรแม่เหล็กมีขดลวด 200 turns, $\\mu_r = 2500$, A = 0.015 sq.m, l = 1.8 m, I = 1 A ค่าความต้านทานแม่เหล็กมีค่าเท่าใด", choices: ["1 : 38,217 A.turn/Wb", "2 : 27,638 A.turn/Wb", "3 : 42,478 A.turn/Wb", "4 : 21,023 A.turn/Wb"], correctIndex: 0, explanation: "ถูกต้อง $\\mathcal{R} = \\frac{l}{\\mu_0 \\mu_r A} = \\frac{1.8}{4\\pi \\times 10^{-7} \\times 2500 \\times 0.015} \\approx 38197$ A.turn/Wb [cite: 286, 287]" },
                    { no: 39, text: "ขดลวดพันบนแกนอากาศ 50 turns มีกระแสไฟฟ้าไหลผ่าน 2 A จะต้องทำอย่างไร ถ้าต้องการให้แรงเคลื่อนแม่เหล็กเพิ่มขึ้น (สมมติคำตอบที่ขาดหายไปคือ เพิ่มกระแสไฟฟ้า)", choices: ["1 : กลับทิศทางการพันขดลวด", "2 : ลดจำนวนรอบ", "3 : เพิ่มกระแสไฟฟ้า", "4 : กลับทิศทางการไหลของกระแสไฟฟ้า"], correctIndex: 2, explanation: "ถูกต้อง MMF แปรผันตามกระแสไฟฟ้า การเพิ่มกระแสไฟฟ้าจะทำให้แรงเคลื่อนแม่เหล็กเพิ่มขึ้น [cite: 292, 296]" },
                    { no: 40, text: "ขดลวด 100 turns กระแสไหล 5 A ถ้าต้องการให้ MMF ลดลงเหลือครึ่งหนึ่ง จะต้องทำอย่างไร", choices: ["1 : เพิ่มจำนวนรอบเป็น 200 รอบ และกระแสเท่าเดิม", "2 : ลดจำนวนรอบเหลือ 50 รอบ และกระแสเท่าเดิม", "3 : เพิ่มกระแสเป็น 10 A และจำนวนรอบเท่าเดิม", "4 : ลดกระแสเหลือ 2 A และเพิ่มจำนวนรอบเป็น 150 รอบ"], correctIndex: 1, explanation: "ถูกต้อง MMF เดิม = $100 \\times 5 = 500$ การลดจำนวนรอบเหลือ 50 รอบ จะได้ $50 \\times 5 = 250$ ซึ่งลดลงครึ่งหนึ่ง [cite: 298, 305]" },
                    { no: 41, text: "วงจรแม่เหล็ก ขดลวด 100 turns กระแส 5 A ถ้าต้องการให้ MMF เพิ่มขึ้นเป็นสองเท่า ข้อใดถูกต้อง", choices: ["1 : เพิ่มจำนวนรอบเป็น 200 turns และกระแสเท่าเดิม", "2 : ลดจำนวนรอบเป็น 50 turns และกระแสเท่าเดิม", "3 : ลดจำนวนรอบเป็น 50 turns และลดกระแสเป็น 2.5 A", "4 : เพิ่มจำนวนรอบเป็น 200 turns และเพิ่มกระแสเป็น 10 A"], correctIndex: 0, explanation: "ถูกต้อง MMF = NI การเพิ่มจำนวนรอบเป็น 200 จะทำให้ MMF เพิ่มเป็น $200 \\times 5 = 1000$ (สองเท่า) [cite: 308, 309]" },
                    { no: 42, text: "วงจรแม่เหล็ก l = 1.2567 m, A = 0.001 sq.m, $\\mu_r = 5000$ ค่าความต้านทานแม่เหล็ก (reluctance) มีค่าเท่าใด", choices: ["1 : 120,000 A.turn/Wb", "2 : 100,000 A.turn/Wb", "3 : 150,000 A.turn/Wb", "4 : 200,000 A.turn/Wb"], correctIndex: 3, explanation: "ถูกต้อง $\\mathcal{R} = \\frac{1.2567}{4\\pi \\times 10^{-7} \\times 5000 \\times 0.001} \\approx \\frac{1.2567}{0.000006283} \\approx 200,000$ A.turn/Wb [cite: 314, 318]" },
                    { no: 43, text: "วัสดุแม่เหล็กชนิด Cast iron ที่ค่า B = 0.5 T มีค่า H = 1000 A.turn/m วัสดุแม่เหล็กมีค่าความซึมซาบแม่เหล็ก (permeability) เท่าใด", choices: ["1 : 500 H/m", "2 : 1.0 H/m", "3 : 0.001 H/m", "4 : 0.0005 H/m"], correctIndex: 3, explanation: "ถูกต้อง จากสูตร $\\mu = \\frac{B}{H} = \\frac{0.5}{1000} = 0.0005$ H/m [cite: 320, 325]" },
                    { no: 44, text: "ความสูญเสียในแกนเหล็ก (core loss) ประกอบด้วยอะไรบ้าง", choices: ["1 : Hysteresis loss และ Eddy current loss", "2 : Hysteresis loss และ Copper loss", "3 : Eddy current loss และ Copper loss", "4 : Copper loss และ Stray load loss"], correctIndex: 0, explanation: "ถูกต้อง ความสูญเสียในแกนเหล็ก (Core loss) เกิดจาก Hysteresis loss (ความหน่วงแม่เหล็ก) และ Eddy current loss (กระแสไหลวน) [cite: 327, 328]" },
                    { no: 45, text: "วงจรแม่เหล็ก $\\mathcal{R} = 1500$ A.turn/wb, ขดลวด 200 turns ป้อนแบตเตอรี่ (DC) 24 V, กระแส 3 A ค่ากำลังสูญเสียในแกนเหล็ก (core loss) มีค่าเท่าใด", choices: ["1 : 0 W", "2 : 36 W", "3 : 72 W", "4 : 576 W"], correctIndex: 0, explanation: "ถูกต้อง เนื่องจากเป็นกระแสตรงคงตัว (Steady-state DC) ฟลักซ์แม่เหล็กไม่เปลี่ยนแปลงตามเวลา จึงไม่เกิด Core loss [cite: 334, 335]" },
                    { no: 46, text: "จากข้อที่แล้ว วงจรแม่เหล็ก ขดลวด 200 turns ป้อนแบตเตอรี่ 24 V กระแส 3 A กำลังที่สูญเสียในขดลวด (copper loss) มีค่าเท่าใด", choices: ["1 : 0 W", "2 : 36 W", "3 : 72 W", "4 : 576 W"], correctIndex: 2, explanation: "ถูกต้อง กำลังสูญเสียในขดลวด (Copper loss) คำนวณจาก $P_{cu} = V \\times I = 24 \\times 3 = 72$ W [cite: 347, 349]" },

            ,{
                chapter: "บทที่ 39 : DC machines (ข้อ 101 - 138)",
                questions: [
                    { no: 101, text: "ถ้าต้องการกลับทิศการหมุนของมอเตอร์ไฟฟ้ากระแสตรง ข้อใดถูกต้อง", choices: ["1 : เลือกวิธีการกลับขั้วขดลวดสร้างสนามแม่เหล็ก หรือเลือกวิธีการกลับขั้วขดลวดอาร์มาเจอร์ วิธีใดวิธีหนึ่ง", "2 : กลับขั้วทั้งของขดลวดสร้างสนามแม่เหล็กและขดลวดอาร์มาเจอร์", "3 : เปลี่ยนความถี่ที่ป้อนให้กับมอเตอร์ไฟฟ้ากระแสตรง", "4 : เปลี่ยนจำนวนแปรงถ่าน"], correctIndex: 0, explanation: "ถูกต้อง การกลับทิศทางการหมุนของมอเตอร์กระแสตรง (DC motor) ทำได้โดยการกลับทิศกระแสฟิลด์ (สลับขั้วสนามแม่เหล็ก) หรือกลับทิศกระแสอาร์มาเจอร์ อย่างใดอย่างหนึ่ง หากกลับพร้อมกันทั้งสองอย่าง มอเตอร์จะหมุนทิศเดิม" },
                    { no: 102, text: "เกี่ยวกับเครื่องจักรกลไฟฟ้ากระแสตรง ข้อใดกล่าวไม่ถูกต้อง", choices: ["1 : แรงดันไฟฟ้าของ Shunt DC generator จะเปลี่ยนแปลงมากกว่า Separately excited dc generator เมื่อจ่ายโหลด", "2 : เครื่องกำเนิดไฟฟ้าทำหน้าที่เปลี่ยนรูปพลังงานจากกลเป็นพลังงานไฟฟ้า", "3 : การเริ่มหมุนของ DC motor กระแสอาร์มาเจอร์จะมีค่าสูง", "4 : เมื่อเครื่องกำเนิดไฟฟ้าจ่ายภาระไฟฟ้าเพิ่มขึ้น แรงดันไฟฟ้าที่ขั้วของเครื่องกำเนิดไฟฟ้าจะมีค่าคงที่"], correctIndex: 3, explanation: "ถูกต้อง ข้อ 4 ผิด เพราะเมื่อเครื่องกำเนิดไฟฟ้าจ่ายภาระ (โหลด) เพิ่มขึ้น กระแสอาร์มาเจอร์จะสูงขึ้น ทำให้เกิดแรงดันตกคร่อมภายใน ($I_a R_a$) และปฏิกิริยาอาร์มาเจอร์ ส่งผลให้แรงดันที่ขั้ว (Terminal voltage) ลดลง ไม่คงที่" },
                    { no: 103, text: "เครื่องกำเนิดไฟฟ้ากระแสตรงแบบกระตุ้นแยก (separately excited dc generator) หมุนด้วยความเร็วคงที่ ถ้าต้องการเพิ่ม terminal voltage จะสามารถทำได้อย่างไร", choices: ["1 : ลดความต้านทานขดลวดสร้างสนามแม่เหล็ก (field winding resistance)", "2 : เพิ่มความต้านทานขดลวดสร้างสนามแม่เหล็ก", "3 : เพิ่มความต้านทานขดลวดอาร์มาเจอร์", "4 : เครื่องกำเนิดไฟฟ้ากระแสตรงแบบกระตุ้นแยกนี้ จ่ายภาระไฟฟ้าเพิ่มขึ้น"], correctIndex: 0, explanation: "ถูกต้อง การลดความต้านทานขดลวดสร้างสนามแม่เหล็ก ($R_f$) จะทำให้กระแสฟิลด์ ($I_f$) สูงขึ้น ส่งผลให้เส้นแรงแม่เหล็ก ($\\Phi$) เพิ่มขึ้น แรงเคลื่อนไฟฟ้าเหนี่ยวนำ ($E_a \\propto \\Phi \\omega$) จึงสูงขึ้น ทำให้ Terminal voltage สูงขึ้นตาม" },
                    { no: 104, text: "การเกิดปฏิกิริยาอาร์มาเจอร์ หรืออาร์มาเจอร์รีแอคชัน (armature reaction) มีผลอย่างไรกับเครื่องจักรไฟฟ้ากระแสตรง (DC machine)", choices: ["1 : เส้นที่ตั้งฉากกับแนวของเส้นแรงแม่เหล็ก หรือ “แกนนิวทรัล\" (neutral plane) บิดเบนไปจากตำแหน่งเดิม", "2 : สนามแม่เหล็กของขดลวดอาร์มาเจอร์สูงขึ้น", "3 : สนามแม่เหล็กของขดลวดสร้างสนามแม่เหล็กลดลง", "4 : สนามแม่เหล็กของขดลวดสร้างสนามแม่เหล็กสูงขึ้น"], correctIndex: 0, explanation: "ถูกต้อง ปฏิกิริยาอาร์มาเจอร์คือการที่สนามแม่เหล็กจากอาร์มาเจอร์ไปรบกวนสนามแม่เหล็กหลัก ทำให้เส้นแรงแม่เหล็กหลักบิดเบี้ยว ส่งผลให้แกนนิวทรัลทางแม่เหล็ก (Magnetic Neutral Axis: MNA) บิดเบนไปจากตำแหน่งเรขาคณิตเดิม" },
                    { no: 105, text: "ตัวเลือกในข้อใด เป็นเอกลักษณ์ของเครื่องจักรไฟฟ้ากระแสตรง (DC machine)", choices: ["1 : ขั้วแม่เหล็ก (magnetic pole)", "2 : วงแหวนแยก หรือคอมมิวเตเตอร์ (commutator)", "3 : วงแหวนลื่น (slip ring)", "4 : โรเตอร์แบบกรงกระรอก (squirrel-cage rotor)"], correctIndex: 1, explanation: "ถูกต้อง คอมมิวเตเตอร์ (Commutator) เป็นชิ้นส่วนเฉพาะของเครื่องจักรกลไฟฟ้ากระแสตรง ทำหน้าที่เปลี่ยนไฟฟ้ากระแสสลับในขดลวดให้เป็นกระแสตรง (หรือกลับกัน)" },
                    { no: 106, text: "การทำงานร่วมกันระหว่างวงแหวนแยก หรือคอมมิวเตเตอร์ (commutator) กับแปรงถ่าน (carbon brush) ในเครื่องกำเนิดไฟฟ้ากระแสตรงเทียบได้กับคอนเวอร์เตอร์แบบใด", choices: ["1 : DC to DC converter", "2 : Full wave rectifier", "3 : AC to AC converter", "4 : DC to AC converter"], correctIndex: 1, explanation: "ถูกต้อง แรงเคลื่อนไฟฟ้าที่เหนี่ยวนำในอาร์มาเจอร์เป็น AC เสมอ คอมมิวเตเตอร์และแปรงถ่านทำหน้าที่เรียงกระแส (Rectification) ให้เป็น DC ซีกบวก คล้ายการทำงานของวงจรแปลงกระแสสลับเป็นกระแสตรงแบบเต็มคลื่น (Full wave rectifier)" },
                    { no: 107, text: "ข้อใดไม่ใช่วิธีการแก้ปัญหาของการเกิดปฏิกิริยาอาร์มาเจอร์ หรืออาร์มาเจอร์รีแอคชัน (armature reaction)", choices: ["1 : การเลื่อนตำแหน่งแปรงถ่าน (carbon brush shifting)", "2 : วงแหวนลื่น (slip ring)", "3 : การติดตั้งอินเตอร์โพล (interpole)", "4 : ขดลวดชดเชย (compensating winding)"], correctIndex: 1, explanation: "ถูกต้อง วงแหวนลื่น (Slip ring) เป็นอุปกรณ์ของเครื่องจักร AC ไม่ใช่วิธีแก้ปัญหาอาร์มาเจอร์รีแอคชัน ส่วนข้อ 1, 3 และ 4 คือวิธีการแก้ปัญหาที่ถูกต้อง" },
                    { no: 108, text: "มอเตอร์ไฟฟ้ากระแสตรง 120 V ความเร็วที่พิกัด 1750 rpm ขับภาระเต็มพิกัดมี speed regulation 4% จงหาความเร็วขณะไม่มีโหลด (no load)", choices: ["1 : 1930 rpm", "2 : 1750 rpm", "3 : 1680 rpm", "4 : 1820 rpm"], correctIndex: 3, explanation: "ถูกต้อง จาก $Speed\\,Regulation = \\frac{N_{nl} - N_{fl}}{N_{fl}}$ จะได้ $0.04 = \\frac{N_{nl} - 1750}{1750}$ แก้สมการ $N_{nl} = 1750 + (0.04 \\times 1750) = 1820$ rpm" },
                    { no: 109, text: "เครื่องกำเนิดไฟฟ้ากระตุ้นแยก 25 kW 250 V มี $R_a=0.1053$, $R_{comp}=0.0141$, $R_{interpole}=0.0306$, $R_f=96.3$ $\\Omega$ จงหา $E_a$ ขณะจ่ายโหลดเต็มพิกัด", choices: ["1 : 235 V", "2 : 250 V", "3 : 265 V", "4 : 280 V"], correctIndex: 2, explanation: "ถูกต้อง หากระแสพิกัด $I_a = \\frac{25000}{250} = 100$ A. ความต้านทานซีรีส์รวม $R_{eq} = 0.1053 + 0.0141 + 0.0306 = 0.15$ $\\Omega$. จากสมการเครื่องกำเนิดไฟฟ้า $E_a = V_t + I_a R_{eq} = 250 + (100 \\times 0.15) = 265$ V" },
                    { no: 110, text: "เครื่องกำเนิด Shunt DC generator มี $R_f = 60\\,\\Omega$, $P_{load} = 6$ kW, $V_t = 120$ V, $E_a = 133$ V จงหาความต้านทานอาร์มาเจอร์ ($R_a$)", choices: ["1 : 0.4 ohm", "2 : 0.15 ohm", "3 : 0.2 ohm", "4 : 0.25 ohm"], correctIndex: 3, explanation: "ถูกต้อง กระแสโหลด $I_L = \\frac{6000}{120} = 50$ A, กระแสฟิลด์ $I_f = \\frac{120}{60} = 2$ A. จะได้ $I_a = 50 + 2 = 52$ A. จาก $E_a = V_t + I_a R_a \\Rightarrow 133 = 120 + 52R_a$ จะได้ $R_a = \\frac{13}{52} = 0.25$ $\\Omega$" },
                    { no: 111, text: "มอเตอร์อนุกรม (series DC motor) ขณะขับโหลดมีความเร็วรอบ 720 rpm กำลังเอาท์พุท 9800 W ให้คำนวณหาค่าของแรงบิดที่แกนเพลา", choices: ["1 : 100 N.m", "2 : 120 N.m", "3 : 130 N.m", "4 : 140 N.m"], correctIndex: 2, explanation: "ถูกต้อง ความเร็วเชิงมุม $\\omega = \\frac{2\\pi \\times 720}{60} \\approx 75.398$ rad/s. จาก $P = T\\omega$ จะได้ $T = \\frac{9800}{75.398} \\approx 129.97$ N.m (ประมาณ 130 N.m)" },
                    { no: 112, text: "มอเตอร์ไฟฟ้ากระแสตรง ขับโหลด 720 rpm กำลังเอาท์พุท 10 HP ให้คำนวณหาค่าของแรงบิดที่แกนเพลามอเตอร์ (1 HP=746 W)", choices: ["1 : 98.9 N.m", "2 : 120.7 N.m", "3 : 87.5 N.m", "4 : 32.6 N.m"], correctIndex: 0, explanation: "ถูกต้อง แปลงกำลัง $P = 10 \\times 746 = 7460$ W. ความเร็วเชิงมุม $\\omega = \\frac{2\\pi \\times 720}{60} \\approx 75.398$ rad/s. แรงบิด $T = \\frac{7460}{75.398} \\approx 98.94$ N.m" },
                    { no: 113, text: "Shunt DC generator 250 V, $R_a = 0.15\\,\\Omega$, $R_{sh} = 100\\,\\Omega$ โหลดความต้านทาน $25\\,\\Omega$ หาค่ากระแสอาร์มาเจอร์ ($I_a$)", choices: ["1 : 12.5 A", "2 : 2.5 A", "3 : 7.5 A", "4 : 10 A"], correctIndex: 0, explanation: "ถูกต้อง กระแสโหลด $I_L = \\frac{250}{25} = 10$ A. กระแสฟิลด์ $I_f = \\frac{250}{100} = 2.5$ A. เครื่องกำเนิดไฟฟ้าจ่าย $I_a = I_L + I_f = 10 + 2.5 = 12.5$ A" },
                    { no: 114, text: "Shunt DC generator 250 V, $R_a = 0.15\\,\\Omega$, $R_{sh} = 100\\,\\Omega$ จ่ายกำลัง 10 kW หาค่ากระแสอาร์มาเจอร์ ($I_a$)", choices: ["1 : 40 A", "2 : 2.5 A", "3 : 42.5 A", "4 : 37.5 A"], correctIndex: 2, explanation: "ถูกต้อง กระแสโหลด $I_L = \\frac{10000}{250} = 40$ A. กระแสฟิลด์ $I_f = \\frac{250}{100} = 2.5$ A. กระแสอาร์มาเจอร์ $I_a = 40 + 2.5 = 42.5$ A" },
                    { no: 115, text: "เครื่องจักรกลไฟฟ้ากระแสตรง (DC machine) มีขดลวดชนิดใด ที่ทำหน้าที่สร้างสนามแม่เหล็กหลัก", choices: ["1 : ขดลวดสร้างสนามแม่เหล็ก (field winding)", "2 : ขดลวดอามาเจอร์ (armature winding)", "3 : ขดลวดแดมเปอร์ (damper winding)", "4 : ขดลวดช่วย (auxiliary winding)"], correctIndex: 0, explanation: "ถูกต้อง ขดลวดสร้างสนามแม่เหล็ก (Field winding) ที่อยู่บนสเตเตอร์ทำหน้าที่สร้างฟลักซ์แม่เหล็กหลักของเครื่องจักร" },
                    { no: 116, text: "เครื่องจักรกลไฟฟ้ากระแสตรง (DC machines) มีส่วนประกอบข้อใดที่อยู่กับที่", choices: ["1 : โรเตอร์ (rotor)", "2 : สเตเตอร์ (stator)", "3 : สลิปริง (slip ring)", "4 : คอมมิวเตเตอร์ (commutator)"], correctIndex: 1, explanation: "ถูกต้อง สเตเตอร์ (Stator) คือโครงสร้างภายนอกที่อยู่กับที่ มักเป็นที่ตั้งของขั้วแม่เหล็กหลัก" },
                    { no: 117, text: "เครื่องจักรกลไฟฟ้ากระแสตรง (DC machine) มีส่วนประกอบในข้อใดที่หมุนได้", choices: ["1 : สเตเตอร์ (stator)", "2 : โรเตอร์ (rotor)", "3 : เปลือกและโครง (yoke and frame)", "4 : แปรงถ่าน (carbon brush)"], correctIndex: 1, explanation: "ถูกต้อง โรเตอร์ (Rotor) เป็นส่วนที่หมุนได้ ซึ่งใน DC machine คืออาร์มาเจอร์" },
                    { no: 118, text: "แรงดันไฟฟ้าที่ผลิตได้จากเครื่องจักรกลไฟฟ้ากระแสตรง (DC machine) ไม่ขึ้นอยู่กับองค์ประกอบข้อใดของเครื่องจักรกล", choices: ["1 : ความเร็ว (speed)", "2 : เส้นแรงแม่เหล็ก (magnetic flux)", "3 : ขดลวดอาร์มาเจอร์ (armature winding)", "4 : อุณหภูมิ (temperature)"], correctIndex: 3, explanation: "ถูกต้อง จากสมการ $E_a = K_a \\Phi \\omega$ แรงดันไฟฟ้าขึ้นอยู่กับโครงสร้างขดลวด, ฟลักซ์แม่เหล็ก, และความเร็วรอบ ไม่ได้พึ่งพาอุณหภูมิโดยตรง" },
                    { no: 119, text: "แรงบิดที่ได้จากเครื่องจักรกลไฟฟ้ากระแสตรง (DC machines) ไม่ขึ้นกับองค์ประกอบข้อใด", choices: ["1 : ขดลวดอาร์มาเจอร์ (armature winding)", "2 : เส้นแรงแม่เหล็ก (magnetic flux)", "3 : กระแสไฟฟ้า (current)", "4 : น้ำหนัก (weight)"], correctIndex: 3, explanation: "ถูกต้อง จากสมการ $T = K_a \\Phi I_a$ แรงบิดขึ้นอยู่กับค่าคงที่โครงสร้างขดลวด, ฟลักซ์, และกระแสอาร์มาเจอร์ ไม่เกี่ยวข้องกับน้ำหนักของเครื่องจักร" },
                    { no: 120, text: "ข้อใดไม่ใช่ความสูญเสียที่เกิดขึ้นในเครื่องจักรกลไฟฟ้ากระแสตรง (DC machines)", choices: ["1 : ความสูญเสียในแกนเหล็ก (core loss)", "2 : ความสูญเสียในขดลวด (copper losses)", "3 : ความสูญเสียทางกล (mechanical loss)", "4 : ความสูญเสียความถี่ (frequency loss)"], correctIndex: 3, explanation: "ถูกต้อง ไม่มีการบัญญัติศัพท์ความสูญเสียว่า Frequency loss ใน DC machine หลักๆ จะมี Core, Copper, และ Mechanical loss" },
                    { no: 121, text: "ส่วนใดของเครื่องจักรกลไฟฟ้ากระแสตรงที่ทำหน้าที่เหมือนกับเรคติไฟเออร์ (rectifier)", choices: ["1 : ขดลวดอาร์มาเจอร์ (armature winding)", "2 : สลิปริง (slip ring)", "3 : คอมมิวเตเตอร์ (commutator)", "4 : ขดลวดสร้างสนามแม่เหล็ก (field winding)"], correctIndex: 2, explanation: "ถูกต้อง คอมมิวเตเตอร์ทำหน้าที่สลับขั้วไฟฟ้า AC ที่เกิดขึ้นภายในอาร์มาเจอร์ ให้กลายเป็นไฟฟ้า DC ที่ขั้วภายนอก เสมือนการทำงานของวงจรเรียงกระแส (Rectifier)" },
                    { no: 122, text: "ข้อใดต่อไปนี้ผิด", choices: ["1 : Series DC generator นิยมนำไปใช้สำหรับงานที่ต้องการกระแสคงที่", "2 : Armature reaction จะเกิดขึ้นในกรณีของเครื่องกำเนิดไฟฟ้าเท่านั้น", "3 : Armature reaction สามารถแก้ไขได้ด้วยการเคลื่อนย้ายตำแหน่งแปรงถ่าน", "4 : Compound DC generator สามารถทำให้แรงดันที่จ่ายให้โหลดคงที่ได้"], correctIndex: 1, explanation: "ถูกต้อง ข้อ 2 ผิดเพราะ ปฏิกิริยาอาร์มาเจอร์ (Armature reaction) เกิดขึ้นได้ทั้งในสภาวะเครื่องกำเนิดไฟฟ้าและมอเตอร์ ตราบใดที่มีกระแสไหลในอาร์มาเจอร์" },
                    { no: 123, text: "Separately excited DC generator แรงดันอาร์มาเจอร์ 150 V ที่ 1800 rpm จงหาแรงดันขณะไร้ภาระที่ 1600 rpm (กระแสฟิลด์คงที่)", choices: ["1 : 133.3 V", "2 : 144.3 V", "3 : 122.3 V", "4 : 111.3 V"], correctIndex: 0, explanation: "ถูกต้อง แรงเคลื่อนไฟฟ้าแปรผันตรงกับความเร็วรอบ ($E \\propto N$) จะได้ $E_{new} = 150 \\times \\frac{1600}{1800} = 133.33$ V" },
                    { no: 124, text: "ย่านการใช้งานตั้งแต่ไม่มีภาระจนถึงมีภาระเต็มพิกัดของมอเตอร์แบบใดที่ความเร็วรอบมีการเปลี่ยนแปลงมากที่สุด", choices: ["1 : Series DC motor", "2 : Shunt DC motor", "3 : Short shunt compound DC motor", "4 : Long shunt compound DC motor"], correctIndex: 0, explanation: "ถูกต้อง มอเตอร์อนุกรม (Series DC motor) มีความเร็วรอบแปรผกผันกับโหลดอย่างมาก หากไม่มีโหลดความเร็วจะสูงจนอันตราย (Runaway speed)" },
                    { no: 125, text: "มอเตอร์ไฟฟ้ากระแสตรงแบบใดให้ความเร็วรอบสูงขึ้น ขณะภาระทางกลมีค่ามากขึ้น", choices: ["1 : Shunt DC motor", "2 : Series DC motor", "3 : Commulative compound DC motor", "4 : Differential compound DC motor"], correctIndex: 3, explanation: "ถูกต้อง Differential compound (แบบหักล้าง) เมื่อโหลดเพิ่ม กระแส $I_a$ เพิ่ม ทำให้ฟลักซ์แม่เหล็กรวมหักล้างกันจนลดลงมาก ส่งผลให้ความเร็วรอบ ($N \\propto 1/\\Phi$) เพิ่มสูงขึ้น" },
                    { no: 126, text: "มอเตอร์ไฟฟ้ากระแสตรงในข้อใด มีค่า speed regulation น้อยที่สุด", choices: ["1 : Series DC motor", "2 : Shunt DC motor", "3 : Short shunt compound DC motor", "4 : Long shunt compound DC motor"], correctIndex: 1, explanation: "ถูกต้อง Shunt motor เป็นมอเตอร์ที่มีความเร็วรอบค่อนข้างคงที่ตั้งแต่ไม่มีโหลดจนถึงโหลดเต็มพิกัด (Speed drop น้อยมาก) จึงมี Speed regulation ต่ำที่สุดเมื่อเทียบกับตัวเลือกอื่น" },
                    { no: 127, text: "เครื่องจักรกลไฟฟ้ากระแสตรงแบบใด สามารถจ่ายพลังงานไฟฟ้าให้กับตัวเองได้ (self-power) โดยไม่ต้องใช้แหล่งจ่ายจากภายนอก", choices: ["1 : Series DC motor", "2 : Shunt DC motor", "3 : Separately excited DC generator", "4 : Shunt DC generator"], correctIndex: 3, explanation: "ถูกต้อง Shunt DC generator เป็นเครื่องกำเนิดไฟฟ้ากระตุ้นด้วยตัวเอง (Self-excited) โดยใช้แรงดันที่สร้างขึ้นมากระตุ้นขดลวดสนามของตัวเองได้" },
                    { no: 128, text: "Separately excited DC generator มีแรงดัน 120 V ที่ 1500 rpm จงหาแรงดันเมื่อความเร็ว 1000 rpm (กระแสฟิลด์คงที่)", choices: ["1 : 150 V", "2 : 130 V", "3 : 180 V", "4 : 80 V"], correctIndex: 3, explanation: "ถูกต้อง แรงดันแปรผันตามความเร็วรอบ จะได้ $E_{new} = 120 \\times \\frac{1000}{1500} = 80$ V" },
                    { no: 129, text: "เครื่องกำเนิดไฟฟ้ากระแสตรงสามารถแบ่งตามลักษณะการกระตุ้นสนามแม่เหล็กได้ 2 ลักษณะคือ", choices: ["1 : Self excited and shunt excited", "2 : Self excited and compound excited", "3 : Self excited and separately excited", "4 : Self excited and series excited"], correctIndex: 2, explanation: "ถูกต้อง การแบ่งประเภทใหญ่ที่สุดคือ แบบกระตุ้นแยก (Separately excited) และแบบกระตุ้นตัวเอง (Self excited)" },
                    { no: 130, text: "ส่วนประกอบใดที่ไม่ใช่ส่วนประกอบของเครื่องกำเนิดไฟฟ้ากระแสตรง", choices: ["1 : Field winding", "2 : Stator winding", "3 : Armature winding", "4 : Damper winding"], correctIndex: 3, explanation: "ถูกต้อง Damper winding (ขดลวดแดมเปอร์) ใช้ในมอเตอร์ซิงโครนัสกระแสสลับ ไม่ได้ใช้ในเครื่องกำเนิดไฟฟ้ากระแสตรง" },
                    { no: 131, text: "เครื่องจักรกลไฟฟ้ากระแสตรงแบบกระตุ้นด้วยตัวเอง (self-excited) แบ่งการต่อขดลวด field ได้ 3 ประเภทคือ", choices: ["1 : Series, shunt, and compound", "2 : Series, shunt, and long shunt", "3 : Series, short shunt, and long shunt", "4 : Separately, series, and shunt"], correctIndex: 0, explanation: "ถูกต้อง แบ่งตามลักษณะการเชื่อมต่อวงจรได้เป็น แบบอนุกรม (Series), แบบขนาน (Shunt), และแบบผสม (Compound)" },
                    { no: 132, text: "มอเตอร์ไฟฟ้ากระแสตรงชนิดใดที่ให้แรงบิดเริ่มต้นหมุนสูง", choices: ["1 : Series motor", "2 : Shunt motor", "3 : Compound short shunt motor", "4 : Compound long shunt motor"], correctIndex: 0, explanation: "ถูกต้อง Series motor มีกระแสเริ่มต้นไหลผ่านทั้งอาร์มาเจอร์และขดลวดฟิลด์ ทำให้แรงบิดเริ่มต้น ($T \\propto I_a^2$) มีค่าสูงมาก" },
                    { no: 133, text: "เครื่องกำเนิดไฟฟ้ากระแสตรงแบบขนานขนาด 10 kW, 250 V, $R_a=0.4\\,\\Omega$, $R_f=250\\,\\Omega$ ขณะจ่ายภาระพิกัด จงหากระแสอาร์มาเจอร์ ($I_a$)", choices: ["1 : 39.0 A", "2 : 40.0 A", "3 : 41.0 A", "4 : 42.7 A"], correctIndex: 2, explanation: "ถูกต้อง กระแสโหลด $I_L = \\frac{10000}{250} = 40$ A. กระแสฟิลด์ $I_f = \\frac{250}{250} = 1$ A. เครื่องกำเนิดไฟฟ้าจ่ายกระแส $I_a = I_L + I_f = 41$ A" },
                    { no: 134, text: "มอเตอร์ไฟฟ้าแบบกระตุ้นแยก 40 kW, 250 V, 1450 rpm จงหาแรงบิดขาออกที่พิกัด (rated output torque)", choices: ["1 : 1655.2 N.m", "2 : 296.4 N.m", "3 : 263.5 N.m", "4 : 27.6 N.m"], correctIndex: 2, explanation: "ถูกต้อง กำลังขาออก $P_{out} = 40$ kW. ความเร็วเชิงมุม $\\omega_m = \\frac{1450 \\times 2\\pi}{60} \\approx 151.84$ rad/s. แรงบิด $T_{out} = \\frac{40000}{151.84} \\approx 263.43$ N.m (ใกล้เคียงตัวเลือกที่ 3)" },
                    { no: 135, text: "การต่อมอเตอร์ไฟฟ้ากระแสตรงต้องต่อขดลวดอย่างไร เพื่อให้มีการทำงานเป็นแบบขนาน", choices: ["1 : ต่อขดลวดอาร์เมเจอร์ขนานเข้ากับขดลวดสร้างสนามแม่เหล็กแบบขนาน", "2 : ต่อขดลวดอาร์เมเจอร์อนุกรมเข้ากับขดลวดสร้างสนามแม่เหล็กแบบอนุกรม", "3 : ต่อขดลวดอาร์เมเจอร์ขนานเข้ากับขดลวดสร้างสนามแม่เหล็กแบบอนุกรม", "4 : ต่อขดลวดอาร์เมเจอร์อนุกรมเข้ากับขดลวดสร้างสนามแม่เหล็กแบบขนาน"], correctIndex: 0, explanation: "ถูกต้อง Shunt DC motor คือการต่อขดลวดอาร์มาเจอร์และขดลวดฟิลด์ขนาน (Shunt) เข้าด้วยกันคร่อมแหล่งจ่ายไฟ" },
                    { no: 136, text: "แปรงถ่านและ คอมมิวเตเตอร์ (brush and commutator) ในมอเตอร์ไฟฟ้ากระแสตรงมีความสำคัญอย่างไร", choices: ["1 : ใช้ป้อนกระแสไฟฟ้าให้กับขดลวดสร้างสนามแม่เหล็กบนโรเตอร์", "2 : ใช้แปลงไฟฟ้ากระแสสลับเป็นกระแสตรง", "3 : ใช้ป้อนกระแสไฟฟ้าให้กับขดลวดอาร์เมเจอร์", "4 : ใช้ป้อนกระแสไฟฟ้าให้กับขดลวดสร้างสนามแม่เหล็ก"], correctIndex: 2, explanation: "ถูกต้อง ในมอเตอร์ DC แปรงถ่านและคอมมิวเตเตอร์ทำหน้าที่เป็นจุดเชื่อมสัมผัสเพื่อป้อนไฟฟ้า DC จากแหล่งจ่ายภายนอก สลับขั้วเข้าไปยังขดลวดอาร์มาเจอร์ที่หมุนอยู่บนโรเตอร์" },
                    { no: 137, text: "Shunt DC motor 150 HP, 240 V ขับภาระ 125 HP (Pout) ใช้กระแส 420 A. $R_a=0.0125\\,\\Omega, R_f=32\\,\\Omega$, $V_{brush} = 2$ V จงหา Rotational loss (1 HP=746 W)", choices: ["1 : 2780 W", "2 : 3526 W", "3 : 96030 W", "4 : 93250 W"], correctIndex: 0, explanation: "ถูกต้อง $I_f = 240/32 = 7.5$ A $\\Rightarrow I_a = 420 - 7.5 = 412.5$ A. $E_a = 240 - (412.5 \\times 0.0125) - 2 = 232.84$ V. กำลังไฟฟ้าที่สร้าง $P_{dev} = E_a I_a = 232.84 \\times 412.5 \\approx 96048$ W. ขาออก $P_{out} = 125 \\times 746 = 93250$ W. $P_{rot} = 96048 - 93250 = 2798$ W (ใกล้เคียง 2780 W ในตัวเลือก)" },
                    { no: 138, text: "จากโจทย์ข้อ 137 จงหาค่าของกระแสอาร์เมเจอร์ (armature current)", choices: ["1 : 7.5 A", "2 : 412.5 A", "3 : 420 A", "4 : 232.8 A"], correctIndex: 1, explanation: "ถูกต้อง กระแสฟิลด์ $I_f = \\frac{240}{32} = 7.5$ A. กระแสอาร์มาเจอร์ $I_a = I_{total} - I_f = 420 - 7.5 = 412.5$ A" }
                ]
            },
            {
                chapter: "บทที่ 40 : Starting methods for DC motor (ข้อ 139 - 152)",
                questions: [
                    { no: 139, text: "ข้อใดทำให้เกิดความเสียหายกับมอเตอร์ไฟฟ้ากระแสตรง ขณะทำการสตาร์ทมอเตอร์", choices: ["1 : ต่อความต้านทานภายนอกกับขดลวดอาร์มาเจอร์แบบอนุกรม", "2 : เพิ่มแรงดันไฟฟ้าให้กับขดลวดอาร์มจอร์อย่างช้าๆ", "3 : กระตุ้นแยกต้องจ่ายกระแสฟิลด์ก่อนจ่ายอาร์มาเจอร์", "4 : ปลดขดลวดสร้างสนามแม่เหล็กขณะสตาร์ท และต่อกลับในภายหลัง"], correctIndex: 3, explanation: "ถูกต้อง หากปลดขดลวดสนามแม่เหล็ก มอเตอร์จะไม่มีเส้นแรงแม่เหล็ก ($\\Phi=0$) ทำให้ $E_a=0$ เกิดกระแสพุ่งเข้าอาร์มาเจอร์สูงมากจนไหม้ หรือเกิดอาการมอเตอร์หนีรอบ (Runaway)" },
                    { no: 140, text: "มอเตอร์ DC 230 V, $R_a = 0.8\\,\\Omega$ คำนวณหากระแสขณะสตาร์ทเมื่อไม่มีความต้านทานภายนอก", choices: ["1 : 27.5 A", "2 : 34.4 A", "3 : 260 A", "4 : 287.5 A"], correctIndex: 3, explanation: "ถูกต้อง ขณะเริ่มสตาร์ท $E_a = 0$ V กระแสสตาร์ท $I_{st} = \\frac{V_t}{R_a} = \\frac{230}{0.8} = 287.5$ A" },
                    { no: 141, text: "มอเตอร์ตัวเดิม (230 V, 27.5 A, $R_a = 0.8\\,\\Omega$) หาความต้านทานที่ต้องต่อเพื่อจำกัดกระแสสตาร์ทให้ไม่เกิน 120% ของพิกัด", choices: ["1 : 6.17 ohm", "2 : 6.97 ohm", "3 : 0.96 ohm", "4 : 8.36 ohm"], correctIndex: 0, explanation: "ถูกต้อง กระแสสูงสุดที่ยอมรับได้ $I_{max} = 1.2 \\times 27.5 = 33$ A. จาก $I = \\frac{V_t}{R_a + R_x}$ จะได้ $R_x = \\frac{230}{33} - 0.8 \\approx 6.97 - 0.8 = 6.17\\,\\Omega$" },
                    { no: 142, text: "ตัวเลือกใดกล่าวเกี่ยวกับการสตาร์ทมอเตอร์ไฟฟ้ากระแสตรงไม่ถูกต้อง", choices: ["1 : ขณะสตาร์ทแรงเคลื่อนไฟฟ้าเหนี่ยวนำมีค่าเท่ากับแรงดันไฟฟ้าที่ป้อนเข้า", "2 : กระตุ้นแยกต้องจ่ายกระแสฟิลด์ก่อนจ่ายอาร์มาเจอร์", "3 : ขณะสตาร์ทกระแสอาร์มาเจอร์จะมีค่ามากกว่าพิกัดหลายเท่า", "4 : เมื่อเริ่มหมุนกระแสอาร์มาเจอร์จะลดลง"], correctIndex: 0, explanation: "ถูกต้อง ขณะสตาร์ทมอเตอร์ยังไม่หมุน ความเร็วรอบเป็นศูนย์ ทำให้แรงเคลื่อนไฟฟ้าเหนี่ยวนำ ($E_a$) เท่ากับ **ศูนย์** (ไม่ใช่เท่ากับแรงดันป้อนเข้า)" },
                    { no: 143, text: "Shunt motor 10 kW, 100 V, $R_a = 0.1\\,\\Omega$ จ่ายแรงดัน 100 V กระแสอาร์มาเจอร์ช่วงเริ่มหมุนเป็นกี่เท่าของกระแสพิกัด", choices: ["1 : 1 เท่า", "2 : 10 เท่า", "3 : 15 เท่า", "4 : 100 เท่า"], correctIndex: 1, explanation: "ถูกต้อง ประมาณกระแสพิกัด $I_a \\approx \\frac{10000}{100} = 100$ A. กระแสสตาร์ท $I_{st} = \\frac{100}{0.1} = 1000$ A. คิดเป็น $\\frac{1000}{100} = 10$ เท่า" },
                    { no: 144, text: "Shunt motor 10 kW, 100 V, $R_a = 0.5\\,\\Omega$ จ่ายแรงดัน 100 V กระแสอาร์มาเจอร์ช่วงเริ่มหมุนมีค่าเท่าใด", choices: ["1 : 100 A", "2 : 200 A", "3 : 10 A", "4 : 50 A"], correctIndex: 1, explanation: "ถูกต้อง ขณะเริ่มสตาร์ท $E_a = 0$ ดังนั้น $I_{st} = \\frac{V_t}{R_a} = \\frac{100}{0.5} = 200$ A" },
                    { no: 145, text: "มอเตอร์ 220 V, 32.5 A, $R_a = 0.55\\,\\Omega$ กระแสสตาร์ทมีค่าเท่าใด", choices: ["1 : 400 A", "2 : 32.5 A", "3 : 65.5 A", "4 : 121 A"], correctIndex: 0, explanation: "ถูกต้อง กระแสสตาร์ท $I_{st} = \\frac{V_t}{R_a} = \\frac{220}{0.55} = 400$ A" },
                    { no: 146, text: "มอเตอร์ 400 V, 10 A, $R_a = 2\\,\\Omega$ หากจ่ายแรงดันไฟฟ้าครึ่งหนึ่งของพิกัดขณะสตาร์ท กระแสจะมีค่าเท่าใด", choices: ["1 : 150 A", "2 : 400 A", "3 : 200 A", "4 : 100 A"], correctIndex: 3, explanation: "ถูกต้อง แรงดันสตาร์ท $V_{st} = \\frac{400}{2} = 200$ V. กระแสสตาร์ท $I_{st} = \\frac{200}{2} = 100$ A" },
                    { no: 147, text: "ข้อใดกล่าวเกี่ยวกับการสตาร์ทมอเตอร์ไฟฟ้ากระแสตรงได้ถูกต้อง", choices: ["1 : การเพิ่มแรงดันไฟฟ้าให้กับขดลวดอาร์มาเจอร์อย่างช้าๆ เป็นการลดกระแสสตาร์ท", "2 : เมื่อจ่ายแรงดันที่พิกัด กระแสสตาร์ทเท่ากับกระแสรับภาระ", "3 : EMF มีค่าเท่ากับแรงดันป้อนเข้า", "4 : ต้องจ่ายแรงดันพิกัดเท่านั้นมอเตอร์จึงเริ่มหมุน"], correctIndex: 0, explanation: "ถูกต้อง การเริ่มเดินเครื่องด้วยวิธีลดแรงดัน (Reduced voltage starting) ค่อยๆ เพิ่มแรงดัน เป็นวิธีที่ใช้จำกัดกระแสสตาร์ทไม่ให้สูงเกินไป" },
                    { no: 148, text: "การลดกระแสเริ่มเดินหมุนของ Separately excited DC motor สามารถกระทำได้โดย", choices: ["1 : นำ R สูงๆ ต่ออนุกรมเข้ากับขดลวดอาร์มาเจอร์", "2 : นำ R สูงๆ ต่อขนานกับขดลวดอาร์มาเจอร์", "3 : นำ R สูงๆ ต่ออนุกรมกับขดลวดฟิลด์", "4 : นำ R สูงๆ ต่อขนานกับขดลวดฟิลด์"], correctIndex: 0, explanation: "ถูกต้อง การนำตัวต้านทาน (Starting resistor) มาต่ออนุกรมในวงจรอาร์มาเจอร์ จะช่วยจำกัดกระแสไฟฟ้า ($I = \\frac{V_t}{R_a + R_{st}}$) ขณะที่มอเตอร์ยังไม่เกิด EMF ต้านกลับ" },
                    { no: 149, text: "ข้อใดไม่ใช่วิธีการลดค่ากระแสเริ่มต้นหมุนของมอเตอร์ไฟฟ้ากระแสตรง", choices: ["1 : นำความต้านทานต่ออนุกรมเข้ากับอาร์มาเจอร์", "2 : ลดแรงดันไฟฟ้าขณะเริ่มหมุน", "3 : เพิ่มความต้านทานขดลวดอาร์มาเจอร์", "4 : การเพิ่มแรงดันไฟฟ้าที่จ่ายให้ขณะเริ่มต้นหมุน"], correctIndex: 3, explanation: "ถูกต้อง การ \"เพิ่ม\" แรงดันไฟฟ้าจะยิ่งทำให้กระแสสตาร์ทพุ่งสูงขึ้น ไม่ใช่วิธีลดกระแส" },
                    { no: 150, text: "ข้อใดเป็นขั้นตอนการปฏิบัติที่ถูกต้องในการเริ่มหมุน Separately excited DC motor", choices: ["1 : ป้อนกระแสฟิลด์ที่พิกัด แล้วถึงจะจ่ายแรงดันอาร์มาเจอร์", "2 : ป้อนกระแสฟิลด์ครึ่งพิกัด แล้วถึงจะจ่ายแรงดันอาร์มาเจอร์", "3 : ค่อยๆเพิ่มกระแสฟิลด์ พร้อมกับจ่ายแรงดันอาร์มาเจอร์", "4 : จ่ายแรงดันอาร์มาเจอร์ที่พิกัด แล้วถึงจะป้อนกระแสฟิลด์"], correctIndex: 0, explanation: "ถูกต้อง เพื่อป้องกันมอเตอร์เสียหายหรือหนีรอบ ต้องจ่ายกระแสฟิลด์สร้างสนามแม่เหล็กหลักให้เต็มพิกัดก่อน แล้วจึงป้อนแรงดันให้กับอาร์มาเจอร์" },
                    { no: 151, text: "ขณะเริ่มหมุน Separately excited DC motor ถ้ากระแสอาร์มาเจอร์เป็น 1.5 เท่าของพิกัด แรงบิดเริ่มหมุนจะเป็นเท่าใด", choices: ["1 : 1.0 เท่าของพิกัดแรงบิด", "2 : 1.5 เท่าของพิกัดแรงบิด", "3 : 2.25 เท่าของพิกัดแรงบิด", "4 : ไม่มีข้อถูก"], correctIndex: 1, explanation: "ถูกต้อง สำหรับมอเตอร์กระตุ้นแยก ฟลักซ์ ($\\Phi$) คงที่ จากสมการ $T = K_a \\Phi I_a$ ดังนั้นแรงบิดแปรผันตรงกับกระแส $I_a$ เมื่อกระแสเพิ่ม 1.5 เท่า แรงบิดจึงเพิ่ม 1.5 เท่า" },
                    { no: 152, text: "ขณะเริ่มหมุน Series DC motor ถ้ากระแสเป็น 1.5 เท่าของพิกัด แรงบิดเริ่มหมุนจะเป็นเท่าใด (สันนิษฐานแบบเชิงเส้น)", choices: ["1 : 1.0 เท่า", "2 : 1.5 เท่า", "3 : 2.25 เท่า", "4 : ไม่มีข้อถูก"], correctIndex: 2, explanation: "ถูกต้อง สำหรับมอเตอร์อนุกรม $\\Phi \\propto I_a$ ทำให้สมการแรงบิดกลายเป็น $T \\propto I_a^2$ เมื่อกระแสเป็น 1.5 เท่า แรงบิดจะเพิ่มขึ้นเป็น $1.5^2 = 2.25$ เท่า" }
                ]
            },
            {
                chapter: "บทที่ 41 : Speed control methods of dc motor (ข้อ 153 - 167)",
                questions: [
                    { no: 153, text: "การเพิ่มค่าความต้านทานภายนอกที่ต่ออนุกรมกับขดลวดสร้างสนามแม่เหล็กของ Shunt DC motor จะมีผลอย่างไร", choices: ["1 : ความเร็วรอบสูงขึ้น", "2 : ความเร็วรอบต่ำลง", "3 : ไม่มีผล", "4 : เปลี่ยนทิศทางการหมุน"], correctIndex: 0, explanation: "ถูกต้อง การเพิ่มความต้านทานทำใหกระแสฟิลด์ ($I_f$) ลดลง ส่งผลให้ฟลักซ์แม่เหล็ก ($\\Phi$) อ่อนลง (Field weakening) จาก $N \\propto \\frac{1}{\\Phi}$ ความเร็วรอบจึงเพิ่มสูงขึ้น" },
                    { no: 154, text: "Separately excited DC motor เริ่มทำงานที่ 800 rpm หากปรับแรงดัน V_t ลดลง 50% จงหาความเร็วรอบโดยประมาณ (สนามแม่เหล็กคงที่)", choices: ["1 : 1600 rpm", "2 : 800 rpm", "3 : 400 rpm", "4 : 200 rpm"], correctIndex: 2, explanation: "ถูกต้อง เมื่อฟลักซ์แม่เหล็กคงที่ ความเร็วแปรผันตรงกับแรงดันอาร์มาเจอร์ ($N \\propto V_a$) หากแรงดันลดลงครึ่งหนึ่ง ความเร็วจะลดลงเหลือ $800 \\times 0.5 = 400$ rpm" },
                    { no: 155, text: "ตัวเลือกใดเป็นวิธีการควบคุมความเร็วของมอเตอร์ไฟฟ้ากระแสตรง", choices: ["1 : ปรับกระแสสร้างสนามแม่เหล็ก (field current)", "2 : ปรับความต้านทานขดลวดอาร์มาเจอร์ (armature resistance)", "3 : ปรับแรงดันไฟฟ้าที่จ่ายให้อาร์มาเจอร์", "4 : มีคำตอบถูกมากกว่า 1 ข้อ"], correctIndex: 3, explanation: "ถูกต้อง ทั้งสามวิธีคือ 1) Field control 2) Armature resistance control และ 3) Armature voltage control เป็นวิธีมาตรฐานในการปรับความเร็ว DC motor" },
                    { no: 156, text: "DC motor ขณะไร้ภาระหมุน 500 rpm เมื่อทำให้แรงเคลื่อนไฟฟ้าเหนี่ยวนำ (induced emf) ลดลง 10% ความเร็วรอบจะเป็นเท่าใด", choices: ["1 : 450 rpm", "2 : 556 rpm", "3 : 405 rpm", "4 : 617 rpm"], correctIndex: 0, explanation: "ถูกต้อง ความเร็วรอบแปรผันตรงกับ EMF ($N \\propto E_a$) หาก $E_a$ ลดลง 10% (เหลือ 0.9) ความเร็วรอบจะเท่ากับ $500 \\times 0.9 = 450$ rpm" },
                    { no: 157, text: "การเปลี่ยนความเร็วขณะไม่มีภาระ ด้วยวิธีควบคุมแรงดัน V_t ให้สูงขึ้นแต่ไม่เกินค่าพิกัด จะทำให้เกิดผลใด", choices: ["1 : ความเร็วมอเตอร์ไฟฟ้าสูงขึ้น", "2 : ขดลวดสร้างสนามแม่เหล็กไหม้", "3 : แรงดันไฟฟ้าที่ขดลวดอาร์มาเจอร์ลดลง", "4 : ไม่มีผลใด ๆ"], correctIndex: 0, explanation: "ถูกต้อง เมื่อแรงดันเทอร์มินัลสูงขึ้น แรงเคลื่อนไฟฟ้าต้านกลับ ($E_a$) ย่อมสูงขึ้น ส่งผลให้ความเร็วรอบสูงขึ้น ($N \\propto E_a$)" },
                    { no: 158, text: "วิธีการควบคุมความเร็วด้วยวิธีควบคุมกระแสฟิลด์ (field current) ควรควบคุมในย่านความเร็วใด", choices: ["1 : สูงกว่าพิกัดความเร็วปกติ", "2 : ต่ำกว่าพิกัดความเร็วปกติ", "3 : เท่ากับพิกัดความเร็วปกติ", "4 : ครึ่งหนึ่งของพิกัดความเร็วปกติ"], correctIndex: 0, explanation: "ถูกต้อง การลดกระแสฟิลด์ (Field weakening) จะทำให้ฟลักซ์ลดลง มอเตอร์จะหมุนเร็วขึ้น ใช้สำหรับเร่งความเร็วในย่านที่ \"สูงกว่าความเร็วพิกัด\" (Above base speed)" },
                    { no: 159, text: "หากควบคุมความเร็วด้วยวิธีควบคุมความต้านทานของขดลวดสร้างสนามแม่เหล็ก จะต้องระวังเรื่องใดมากที่สุด", choices: ["1 : ความเร็วสนามแม่เหล็กหมุน (synchronous speed)", "2 : พิกัดกระแสสร้างสนามแม่เหล็ก (field current)", "3 : ขั้วแม่เหล็ก", "4 : ความถี่"], correctIndex: 1, explanation: "ถูกต้อง การลดความต้านทานฟิลด์จะทำให้กระแสฟิลด์สูงขึ้น ต้องระวังไม่ให้สูงเกินค่าพิกัดทนกระแสของขดลวด (Rated field current) ไม่เช่นนั้นขดลวดอาจไหม้ได้" },
                    { no: 160, text: "การควบคุมความเร็วของมอเตอร์ไฟฟ้ากระแสตรงสามารถทำได้หลายวิธียกเว้นข้อใด", choices: ["1 : ปรับความต้านทานขดลวดสนาม", "2 : ปรับแรงดันไฟฟ้าป้อนเข้าอาร์มาเจอร์", "3 : ปรับกระแสไฟฟ้าป้อนเข้าขดลวดสนาม", "4 : ปรับความถี่ของแหล่งจ่ายไฟป้อนเข้า"], correctIndex: 3, explanation: "ถูกต้อง การปรับความถี่แหล่งจ่าย (Frequency control) ทำได้เฉพาะกับมอเตอร์ไฟฟ้ากระแสสลับ (AC motor) ไม่มีผลกับมอเตอร์กระแสตรง (DC)" },
                    { no: 161, text: "การควบคุมความเร็วรอบมอเตอร์ไฟฟ้ากระแสตรงวิธีใดให้ประสิทธิภาพต่ำสุด", choices: ["1 : การควบคุมแรงดัน V_t", "2 : การควบคุมกระแสฟิลด์", "3 : การปรับความต้านทานภายนอกต่ออนุกรมกับอาร์มาเจอร์", "4 : ไม่มีข้อใดถูก"], correctIndex: 2, explanation: "ถูกต้อง การต่อความต้านทานอนุกรมอาร์มาเจอร์ ทำให้เกิดกำลังสูญเสียความร้อน ($I_a^2R$) ที่ตัวต้านทานจำนวนมหาศาล ประสิทธิภาพของระบบจึงต่ำมาก" },
                    { no: 162, text: "ข้อใดไม่มีผลต่อการปรับความเร็วรอบของมอเตอร์ไฟฟ้ากระแสตรง", choices: ["1 : การควบคุมกระแสฟิลด์", "2 : การควบคุมความต้านทานภายนอกต่ออนุกรมกับอาร์มาเจอร์", "3 : การควบคุมแรงดันอาร์มาเจอร์", "4 : ไม่มีคำตอบที่ถูกต้อง"], correctIndex: 3, explanation: "ถูกต้อง วิธีการในข้อ 1, 2 และ 3 ล้วนแต่ส่งผลต่อการปรับความเร็วรอบทั้งสิ้น ดังนั้นจึงไม่มีคำตอบที่ถูกต้องในข้อ 1-3" },
                    { no: 163, text: "การกลับทางหมุนของมอเตอร์ไฟฟ้ากระแสตรง สามารถทำได้โดยวิธีการใด", choices: ["1 : กลับขั้วขดลวดสร้างสนามแม่เหล็ก และกลับขั้วแรงดันไฟฟ้าที่ขั้ว (V_t)", "2 : กลับขั้วขดลวดสร้างสนามแม่เหล็ก หรือกลับขั้วแรงดันไฟฟ้าที่ขั้ว (V_t)", "3 : กลับขั้วขดลวดสนามแม่เหล็ก และกลับขั้วอาร์มาเจอร์", "4 : ไม่มีคำตอบที่ถูกต้อง"], correctIndex: 1, explanation: "ถูกต้อง การกลับทิศทางการหมุนทำได้โดยการกลับทิศกระแสสนามแม่เหล็ก **หรือ** กลับทิศกระแสอาร์มาเจอร์ (โดยกลับ V_t) เพียงอย่างใดอย่างหนึ่งเท่านั้น" },

                    { no: 165, text: "ต้องการลดความเร็ว Separately excited DC motor ด้วยวิธี Regenerative braking ในย่านความเร็วต่ำกว่าพิกัด วิธีการใดเหมาะสม", choices: ["1 : กลับทิศทางของกระแสไฟฟ้าอาร์มาเจอร์", "2 : กลับทิศทางแรงดันไฟฟ้าป้อนเข้าฟิลด์", "3 : กลับทิศทางของกระแสไฟฟ้าฟิลด์", "4 : ไม่มีข้อใดถูก"], correctIndex: 3, explanation: "ถูกต้อง (อ้างอิงจากเฉลยมาตรฐาน) การลดความเร็วด้วยการสร้างสภาวะ Regenerative มักอาศัยการลดแรงดัน V_t ให้ต่ำกว่า $E_a$ กระแสอาร์มาเจอร์จะกลับทิศเองโดยธรรมชาติ ไม่ใช่วิธีการกลับขั้วตามตัวเลือก 1-3" },
                    { no: 166, text: "ถ้าต้องการเพิ่มความเร็วของ Separately excited DC motor ในย่านความเร็วสูงกว่าพิกัด วิธีการในข้อใดจึงจะเหมาะสม", choices: ["1 : เพิ่มแรงดันป้อนเข้าอาร์มาเจอร์", "2 : ลดแรงดันป้อนเข้าอาร์มาเจอร์", "3 : เพิ่มกระแสป้อนเข้าฟิลด์", "4 : ลดกระแสป้อนเข้าฟิลด์"], correctIndex: 3, explanation: "ถูกต้อง ในย่านความเร็วสูงกว่าความเร็วพิกัด (Above base speed) วิธีการเดียวที่ทำได้คือการลดฟลักซ์แม่เหล็ก (Field weakening) โดยการลดกระแสป้อนเข้าฟิลด์ ($I_f$)" },
                    { no: 167, text: "ถ้าต้องการเพิ่มความเร็ว Separately excited DC motor เป็น 2 เท่าของพิกัด วิธีการในข้อใดเหมาะสม (สันนิษฐานวงจรเชิงเส้น)", choices: ["1 : เพิ่มแรงดันอาร์มาเจอร์เป็น 2 เท่า", "2 : ลดแรงดันอาร์มาเจอร์เหลือครึ่งหนึ่ง", "3 : เพิ่มกระแสฟิลด์เป็น 2 เท่า", "4 : ลดกระแสฟิลด์ลงเหลือครึ่งหนึ่ง"], correctIndex: 3, explanation: "ถูกต้อง ความเร็วรอบแปรผกผันกับกระแสฟิลด์ ($N \\propto \\frac{1}{I_f}$) การต้องการความเร็วเป็น 2 เท่า ต้องทำการลดกระแส $I_f$ ลงให้เหลือครึ่งหนึ่ง" }
                ]

            ,{
                chapter: "บทที่ 43 : AC machines construction (ข้อ 221 - 245)",
                questions: [
                    { no: 221, text: "การต่อขนานเครื่องกำเนิดไฟฟ้าซิงโครนัสสามเฟสกับระบบไฟฟ้า (synchronization) ข้อใดที่กล่าวไม่ถูกต้อง", choices: ["1 : การตรวจสอบแบบ Three-dark ถ้าหลอดไฟดับสนิททั้งสามดวง แสดงว่าขนานได้", "2 : การตรวจสอบแบบ Three-dark ถ้าหลอดไฟ สว่าง-ดับ พร้อมกันทั้งสามดวง แสดงว่าความถี่ไม่เท่า แต่ลำดับเฟสตรง", "3 : การตรวจสอบแบบ One-dark Two-bright ถ้าหลอดไฟดับ 1 สว่าง 2 สลับกันไป แสดงว่าลำดับเฟสตรงกันแต่ความถี่ไม่เท่า", "4 : การขนาน ลำดับเฟสต้องเหมือน ความถี่ต้องเท่า และแรงดันต้องเท่า"], correctIndex: 2, explanation: "ถูกต้อง ข้อ 3 ผิด เพราะลักษณะ \"ดับ 1 ดวง สว่าง 2 ดวง สลับกันหมุนเวียนไป\" เป็นอาการที่บ่งบอกว่า **ลำดับเฟส (Phase sequence) ไม่ตรงกัน**" },
                    { no: 222, text: "ตัวเลือกใดเป็นส่วนที่อยู่ในมอเตอร์เหนี่ยวนำ (induction motor)", choices: ["1 : อินเตอร์โพล (Inter pole)", "2 : ขดลวดชดเชย (compensating winding)", "3 : โรเตอร์แบบกรงกระรอก (squirrel cage rotor)", "4 : คอมมิวเตเตอร์ (commutator)"], correctIndex: 2, explanation: "ถูกต้อง โรเตอร์กรงกระรอก (Squirrel cage) เป็นเอกลักษณ์เฉพาะของมอเตอร์เหนี่ยวนำ ส่วนข้ออื่นเป็นชิ้นส่วนของ DC machine" },
                    { no: 223, text: "เมื่อต้องการใช้งานเครื่องกำเนิดไฟฟ้าแบบซิงโครนัส ผลิตไฟฟ้าโดยต้นกำลังเป็นพลังงานน้ำจากเขื่อน ควรเลือกใช้โรเตอร์เป็นแบบใดจึงเหมาะสม", choices: ["1 : โรเตอร์แบบทรงกระบอก (cylindrical rotor)", "2 : โรเตอร์แบบขั้วยื่น (salient pole rotor)", "3 : โรเตอร์แบบพันขดลวด (wound rotor)", "4 : โรเตอร์แบบกรงกระรอก (squirrel cage rotor)"], correctIndex: 1, explanation: "ถูกต้อง กังหันน้ำจากเขื่อนจะหมุนด้วยความเร็วรอบต่ำ (Low speed) การจะผลิตความถี่ 50Hz จึงต้องใช้ขั้วแม่เหล็กจำนวนมาก โครงสร้างที่เหมาะกับขั้วเยอะและรอบต่ำคือ โรเตอร์แบบขั้วยื่น (Salient pole)" },
                    { no: 224, text: "มอเตอร์ที่ใช้ไฟฟ้ากระแสสลับในข้อใดที่ไม่เกิดสนามแม่เหล็กหมุนจากขดลวดสเตเตอร์", choices: ["1 : มอเตอร์เหนี่ยวนำ (induction motor)", "2 : มอเตอร์ซิงโครนัส (synchronous motor)", "3 : มอเตอร์รีลักแทนซ์ (reluctance motor)", "4 : มอเตอร์ยูนิเวอร์แซล (universal motor)"], correctIndex: 3, explanation: "ถูกต้อง มอเตอร์ยูนิเวอร์แซลทำงานคล้ายมอเตอร์ DC อนุกรม สนามแม่เหล็กจากสเตเตอร์เป็นแบบสลับขั้วไปมาตามแกนเดียว (Pulsating field) ไม่ใช่สนามแม่เหล็กหมุน (Rotating magnetic field)" },
                    { no: 225, text: "มอเตอร์เหนี่ยวนำหนึ่งเฟสในข้อใดให้แรงบิดเริ่มต้นหมุน (starting torque) สูงสุด", choices: ["1 : Split phase motor", "2 : Capacitor start motor", "3 : Permanent split capacitor motor", "4 : Shaded pole motor"], correctIndex: 1, explanation: "ถูกต้อง การใช้ตัวเก็บประจุ (Capacitor) ในขดลวดสตาร์ท จะช่วยสร้างมุมต่างเฟสของกระแสได้เกือบ 90 องศา ทำให้เกิดแรงบิดเริ่มต้นได้สูงที่สุดในกลุ่ม" },
                    { no: 226, text: "ข้อใดเป็นส่วนประกอบของเครื่องจักรกลไฟฟ้าเหนี่ยวนำ (induction machine)", choices: ["1 : โรเตอร์แบบพันขดลวด (wound rotor) และ สเตเตอร์ (stator)", "2 : ขดลวดสร้างสนามแม่เหล็ก (field winding) และ โรเตอร์", "3 : ขดลวดสร้างสนามแม่เหล็ก และ ขดลวดอาร์เมเจอร์", "4 : ขดลวดสร้างสนามแม่เหล็ก และ โรเตอร์แบบกรงกระรอก"], correctIndex: 0, explanation: "ถูกต้อง เครื่องจักรกลเหนี่ยวนำมีโครงสร้างหลัก 2 แบบคือ โรเตอร์กรงกระรอก หรือ โรเตอร์แบบพันขดลวด (Wound rotor) และมีสเตเตอร์เป็นตัวสร้างสนามแม่เหล็กหมุน (ไม่มี Field winding แยกต่างหาก)" },
                    { no: 227, text: "ซิงโครนัสรีแอคแทนซ์ (synchronous reactance) เกิดจากสนามแม่เหล็กส่วนใดของเครื่องจักรกลไฟฟ้าซิงโครนัส", choices: ["1 : สนามแม่เหล็กอาร์เมเจอร์กับสนามแม่เหล็กรั่ว", "2 : สนามแม่เหล็กอาร์เมเจอร์กับสนามแม่เหล็กของขั้วแม่เหล็ก", "3 : สนามแม่เหล็กรั่วกับสนามแม่เหล็กของขั้วแม่เหล็ก", "4 : สนามแม่เหล็กรวมทั้งหมด"], correctIndex: 0, explanation: "ถูกต้อง ซิงโครนัสรีแอคแตนซ์ ($X_s$) เป็นผลรวมของรีแอคแตนซ์จากฟลักซ์รั่ว ($X_l$) และรีแอคแตนซ์จากปฏิกิริยาอาร์มาเจอร์ ($X_a$)" },
                    { no: 228, text: "ข้อใดไม่ใช่หน้าที่ของขดลวดสเตเตอร์ของเครื่องจักรกลไฟฟ้ากระแสสลับ (AC machine)", choices: ["1 : สร้างสนามแม่เหล็กหมุน (rotating magnetic field)", "2 : ส่งกำลังทางกลออกกรณีทำงานเป็นมอเตอร์", "3 : ส่งกำลังไฟฟ้าออกกรณีทำงานเป็นเครื่องกำเนิดไฟฟ้า", "4 : รับกำลังไฟฟ้าเข้ากรณีทำงานเป็นมอเตอร์"], correctIndex: 1, explanation: "ถูกต้อง การส่งกำลังทางกลออก (เพลาหมุน) เป็นหน้าที่ของ โรเตอร์ (Rotor) ไม่ใช่สเตเตอร์" },
                    { no: 229, text: "ข้อใดเป็นส่วนที่มีการเคลื่อนที่ในการทำงานของเครื่องกำเนิดไฟฟ้ากระแสสลับ (AC machine)", choices: ["1 : เปลือกและโครง (machine frame)", "2 : ขั้วแม่เหล็ก (magnetic pole)", "3 : แปรงถ่านและแบริง (brush and bearing)", "4 : แกนเหล็กอาร์เมเจอร์ (armature core)"], correctIndex: 1, explanation: "ถูกต้อง ใน AC synchronous generator ขดลวดอาร์มาเจอร์จะอยู่กับที่ (สเตเตอร์) ส่วนขดลวดสร้างสนามแม่เหล็ก หรือ ขั้วแม่เหล็ก (Magnetic pole) จะอยู่บนโรเตอร์ซึ่งเป็นส่วนที่หมุนตัดขดลวด" },
                    { no: 230, text: "เมื่อจ่ายแรงดันไฟฟ้า 3 เฟส 400 V, 50 Hz ให้มอเตอร์ตัวหนึ่ง หมุนด้วยความเร็วรอบ 980 rpm มอเตอร์นี้คือแบบใด", choices: ["1 : มอเตอร์ซิงโครนัส 2 poles", "2 : มอเตอร์ซิงโครนัส 4 poles", "3 : มอเตอร์เหนี่ยวนำ 4 poles", "4 : มอเตอร์เหนี่ยวนำ 6 poles"], correctIndex: 3, explanation: "ถูกต้อง ความเร็ว 980 rpm มีค่าสลิปเล็กน้อยเมื่อเทียบกับความเร็วซิงโครนัส 1000 rpm ซึ่ง $N_s = 1000$ rpm ตรงกับมอเตอร์ 6 poles ($120 \\times 50 / 6 = 1000$)" },
                    { no: 231, text: "หน้าที่หลักของ Damper bar ในเครื่องจักรกลไฟฟ้าคือข้อใด", choices: ["1 : ลดการแกว่งตัวของโรเตอร์ของเครื่องจักรกลไฟฟ้าซิงโครนัส", "2 : ลดการแกว่งตัวของโรเตอร์ของเครื่องจักรกลไฟฟ้ากระแสตรง", "3 : ลดการเปลี่ยนแปลงกระแสอาร์มาเจอร์ของเครื่องจักรซิงโครนัส", "4 : ลดการเปลี่ยนแปลงกระแสอาร์มาเจอร์ของเครื่องจักรกระแสตรง"], correctIndex: 0, explanation: "ถูกต้อง Damper winding (ขดลวดหน่วง) มีไว้เพื่อป้องกันหรือลดอาการแกว่งตัว (Hunting) ของโรเตอร์เมื่อเกิดการเปลี่ยนแปลงโหลดกะทันหัน และช่วยสตาร์ทในมอเตอร์ซิงโครนัส" },
                    { no: 232, text: "เครื่องจักรกลไฟฟ้าประเภทใดต้องการกระแสไฟฟ้ากระตุ้นจากแหล่งจ่ายแรงดันไฟฟ้ากระแสตรงภายนอก", choices: ["1 : เครื่องกำเนิดไฟฟ้าเหนี่ยวนำ", "2 : มอเตอร์ซิงโครนัส (synchronous motor)", "3 : มอเตอร์รีลักแทนซ์", "4 : มอเตอร์เหนี่ยวนำ"], correctIndex: 1, explanation: "ถูกต้อง มอเตอร์ซิงโครนัสจำเป็นต้องจ่ายไฟฟ้ากระแสตรง (DC Excitation) เข้าไปที่โรเตอร์เพื่อสร้างขั้วแม่เหล็กหลัก" },
                    { no: 233, text: "ทิศทางแรงเคลื่อนไฟฟ้าเหนี่ยวนำ (induced emf) ในลวดตัวนำสามารถเปลี่ยนแปลงได้โดยวิธีใด", choices: ["1 : ลดขนาดลวดตัวนำ", "2 : กลับทิศทางสนามแม่เหล็ก", "3 : เพิ่มความยาวลวดตัวนำ", "4 : เพิ่มขนาดสนามแม่เหล็ก"], correctIndex: 1, explanation: "ถูกต้อง ตามกฎมือขวาของเฟลมมิง การกลับทิศทางการเคลื่อนที่ หรือ การกลับทิศทางของสนามแม่เหล็ก จะส่งผลให้ทิศของแรงเคลื่อนไฟฟ้าเหนี่ยวนำกลับทิศทาง" },
                    { no: 234, text: "แรงเคลื่อนไฟฟ้าเหนี่ยวนำของลวดตัวนำเดียวในสนามแม่เหล็กที่มี 4 ขั้วแม่เหล็ก จะมีจำนวนกี่ cycle ต่อการหมุน 1 รอบ", choices: ["1 : 1 cycle", "2 : 2 cycles", "3 : 4 cycles", "4 : 8 cycles"], correctIndex: 1, explanation: "ถูกต้อง 1 คู่ขั้ว (1 เหนือ 1 ใต้) จะสร้างรูปคลื่น 1 ไซเคิล. เครื่องจักร 4 ขั้วแม่เหล็ก (2 คู่ขั้ว) หมุน 1 รอบจึงได้ $P/2 = 4/2 = 2$ cycles" },
                    { no: 235, text: "แรงเคลื่อนไฟฟ้าเหนี่ยวนำสูงสุดในลวดตัวนำเดียวจะเกิดขึ้นเมื่อขดลวดวางอยู่ในลักษณะใด", choices: ["1 : ตั้งฉากกับทิศทางสนามแม่เหล็ก", "2 : ขนานกับทิศทางสนามแม่เหล็ก", "3 : ทำมุม 30° กับทิศทางสนามแม่เหล็ก", "4 : ทำมุม 45° กับทิศทางสนามแม่เหล็ก"], correctIndex: 0, explanation: "ถูกต้อง จากสมการ $e = Blv \\sin \\theta$ จะมีค่าสูงสุดเมื่อ $\\sin \\theta = 1$ ซึ่งก็คือทำมุมตั้งฉาก ($90^\\circ$)" },
                    { no: 236, text: "มอเตอร์ 50 Hz ความเร็วรอบที่ภาระพิกัด 1420 rpm มอเตอร์เครื่องนี้ควรเป็นมอเตอร์แบบใด", choices: ["1 : มอเตอร์เหนี่ยวนำ 2 poles", "2 : มอเตอร์เหนี่ยวนำ 4 poles", "3 : มอเตอร์ซิงโครนัส 2 poles", "4 : มอเตอร์ซิงโครนัส 4 poles"], correctIndex: 1, explanation: "ถูกต้อง ความเร็ว 1420 rpm ต่ำกว่า Synchronous speed ที่ 1500 rpm เล็กน้อย จึงเป็นมอเตอร์เหนี่ยวนำ 4 ขั้ว ($120 \\times 50 / 4 = 1500$)" },
                    { no: 237, text: "จากรูป (โรเตอร์มีขั้วแม่เหล็กยื่นออกมา 4 แฉก รูปทรงกากบาท) ข้อใดกล่าวไม่ถูกต้อง", choices: ["1 : เป็นโครงสร้างของเครื่องจักรกลไฟฟ้าซิงโครนัส", "2 : เครื่องจักรกลไฟฟ้านี้มี 4 poles", "3 : โรเตอร์เป็นแบบขั้วยื่น (salient pole rotor)", "4 : โรเตอร์เป็นแบบทรงกระบอก (cylindrical rotor)"], correctIndex: 3, explanation: "ถูกต้อง จากรูปโรเตอร์มีขั้วแม่เหล็กยื่นออกมาอย่างชัดเจน (Salient pole) จึงไม่ใช่แบบทรงกระบอก (Cylindrical) ข้อ 4 จึงกล่าวผิด" },
                    { no: 238, text: "แกนของขดลวดอาร์เมเจอร์เฟส a กับ b ของ Three phase armature winding 4 poles จะวางห่างกันทางกลเท่าใด", choices: ["1 : 45 mechanical degree", "2 : 60 mechanical degree", "3 : 90 mechanical degree", "4 : 120 mechanical degree"], correctIndex: 1, explanation: "ถูกต้อง ขดลวด 3 เฟสจะห่างกันทางไฟฟ้า $120^\\circ$ เสมอ. จากสมการ $\\theta_{mech} = \\frac{2}{P} \\times \\theta_{elec} = \\frac{2}{4} \\times 120^\\circ = 60^\\circ$ ทางกล" },
                    { no: 239, text: "แกนของขดลวด Main และ Aux winding ของมอเตอร์ 1-phase Capacitor start ที่มี 4 poles จะวางห่างกันทางกลเท่าใด", choices: ["1 : 45 mechanical degree", "2 : 60 mechanical degree", "3 : 90 mechanical degree", "4 : 120 mechanical degree"], correctIndex: 0, explanation: "ถูกต้อง มอเตอร์ 1 เฟส 2 ขดลวด จะวางห่างกันทางไฟฟ้า $90^\\circ$. มุมทางกล $\\theta_{mech} = \\frac{2}{P} \\times 90^\\circ = \\frac{2}{4} \\times 90 = 45^\\circ$ ทางกล" },
                    { no: 240, text: "มอเตอร์ 50 Hz ทำงานที่ความเร็วรอบ 1500 rpm เป๊ะ มอเตอร์นี้น่าจะเป็นมอเตอร์ใด", choices: ["1 : มอเตอร์ซิงโครนัส 2 poles", "2 : มอเตอร์ซิงโครนัส 4 poles", "3 : มอเตอร์เหนี่ยวนำ 4 poles", "4 : มอเตอร์เหนี่ยวนำ 6 poles"], correctIndex: 1, explanation: "ถูกต้อง การที่หมุนด้วยความเร็ว 1500 rpm พอดีแสดงว่าไม่มี Slip จึงเป็นมอเตอร์ซิงโครนัส และ $N_s = 1500$ ตรงกับ 4 poles" },
                    { no: 241, text: "ข้อใดไม่ใช่ลักษณะของโรเตอร์ในเครื่องจักรกลไฟฟ้ากระแสสลับ", choices: ["1 : โรเตอร์แบบทรงกระบอก (cylindrical)", "2 : โรเตอร์แบบขั้วยื่น (salient pole)", "3 : โรเตอร์แบบพันขดลวด (wound rotor)", "4 : ไม่มีคำตอบที่ถูกต้อง"], correctIndex: 3, explanation: "ถูกต้อง เพราะข้อ 1-3 ล้วนแต่เป็นประเภทของโรเตอร์ที่ใช้ในเครื่องจักรกล AC ทั้งสิ้น ดังนั้นจึงไม่มีคำตอบที่ถูกในข้อ 1-3" },
                    { no: 242, text: "หากต้องการให้แรงดันไฟฟ้าที่ผลิตได้เพิ่มขึ้น 2 เท่า (ความเร็วรอบเท่าเดิม) ทำได้อย่างไร", choices: ["1 : เพิ่มขนาดลวดตัวนำของขดลวด 2 เท่า", "2 : ลดขนาดลวดตัวนำลง 2 เท่า", "3 : เพิ่มจำนวนรอบของขดลวดอาร์มาเจอร์ขึ้น 2 เท่า", "4 : ลดจำนวนรอบลง 2 เท่า"], correctIndex: 2, explanation: "ถูกต้อง จากสมการ $E = 4.44 f N \\Phi$ แรงดันแปรผันตรงกับจำนวนรอบ (N) หากเพิ่ม N เป็น 2 เท่า แรงดันก็จะเพิ่ม 2 เท่า" },
                    { no: 243, text: "ข้อใดคือส่วนประกอบที่มีในเครื่องจักร AC แต่ไม่ได้อยู่ใน DC", choices: ["1 : ขดลวดอาร์มาเจอร์", "2 : ขดลวดสร้างสนามแม่เหล็ก", "3 : วงแหวนลื่น (slip ring)", "4 : แปรงถ่าน (brush)"], correctIndex: 2, explanation: "ถูกต้อง วงแหวนลื่น (Slip ring) ใช้สำหรับดึงไฟ AC เข้า/ออกโรเตอร์โดยตรง ส่วน DC machine จะใช้คอมมิวเตเตอร์ (Commutator)" },
                    { no: 244, text: "เครื่องจักรกลเหนี่ยวนำ 3 เฟส ขณะทำงานมีค่า slip เป็นลบ กำลังทำงานอยู่ในสภาวะใด", choices: ["1 : สภาวะมอเตอร์", "2 : สภาวะเครื่องกำเนิดไฟฟ้า", "3 : สภาวะปลั๊กกิ้ง", "4 : สภาวะกลับทางหมุน"], correctIndex: 1, explanation: "ถูกต้อง เมื่อ $s < 0$ แสดงว่าโรเตอร์ถูกขับให้หมุนเร็วกว่าสนามแม่เหล็กหมุน ($N_r > N_s$) เครื่องจักรจะเข้าสู่สภาวะเครื่องกำเนิดไฟฟ้า (Induction Generator)" },
                    { no: 245, text: "ผลิตไฟฟ้า 50 Hz จากเขื่อนที่รอบต่ำ 250 rpm ควรใช้เครื่องกำเนิดซิงโครนัสกี่ขั้วแม่เหล็ก", choices: ["1 : 8 poles", "2 : 16 poles", "3 : 24 poles", "4 : 32 poles"], correctIndex: 2, explanation: "ถูกต้อง จากสูตร $P = \\frac{120f}{N_s} = \\frac{120 \\times 50}{250} = \\frac{6000}{250} = 24$ poles" }
                ]
            },
            {
                chapter: "บทที่ 44 : Steady state performance of induction machines (ข้อ 246 - 294)",
                questions: [
                    { no: 246, text: "มอเตอร์ 3 เฟส 50 Hz ไม่มีโหลดหมุน 1498 rpm ความเร็วเต็มพิกัดจะประมาณเท่าไร ถ้า Per-unit slip = 0.033", choices: ["1 : 1480 rpm", "2 : 1470 rpm", "3 : 1460 rpm", "4 : 1450 rpm"], correctIndex: 3, explanation: "ถูกต้อง ความเร็วไร้โหลด 1498 rpm ชี้ว่า $N_s = 1500$ rpm. ที่ Full load $N_r = N_s(1 - s) = 1500(1 - 0.033) = 1500 - 49.5 = 1450.5 \\approx 1450$ rpm" },
                    { no: 247, text: "มอเตอร์ 50 HP (37.3 kW) มี Stator+rotor cu loss 1.6 kW, Core loss 1.2 kW, F&W loss 950 W หาประสิทธิภาพ (1 HP=746 W)", choices: ["1 : 85%", "2 : 87%", "3 : 93%", "4 : 90%"], correctIndex: 3, explanation: "ถูกต้อง $P_{out} = 50 \\times 746 = 37300$ W. กำลังสูญเสียรวม $P_{loss} = 1600 + 1200 + 950 = 3750$ W. $P_{in} = 37300 + 3750 = 41050$ W. ประสิทธิภาพ $\\eta = \\frac{37300}{41050} \\approx 0.908$ หรือ $\\approx 90\\%$" },
                    { no: 248, text: "มอเตอร์มี Stator copper loss 2 kW, Rotor copper loss 700 W, Core loss 1800 W, F&W loss 600 W จงหาค่าความสูญเสียในขดลวดทั้งหมด", choices: ["1 : 2.1 kW", "2 : 3.3 kW", "3 : 2.7 kW", "4 : 5.1 kW"], correctIndex: 2, explanation: "ถูกต้อง ความสูญเสียในขดลวด (Copper losses) ประกอบด้วย Stator + Rotor $= 2000 + 700 = 2700$ W หรือ 2.7 kW" },
                    { no: 249, text: "มอเตอร์ 50 Hz มี slip 5% จงหาความถี่ไฟฟ้าที่โรเตอร์ (rotor frequency)", choices: ["1 : 1.5 Hz", "2 : 2.5 Hz", "3 : 3.5 Hz", "4 : 4.5 Hz"], correctIndex: 1, explanation: "ถูกต้อง ความถี่โรเตอร์ $f_r = s \\times f_s = 0.05 \\times 50 = 2.5$ Hz" },
                    { no: 250, text: "มอเตอร์ 50 Hz, 2850 rpm จงหาจำนวนขั้วแม่เหล็ก", choices: ["1 : 2 pole", "2 : 4 poles", "3 : 6 poles", "4 : 8 poles"], correctIndex: 0, explanation: "ถูกต้อง ความเร็ว 2850 rpm ใกล้เคียง $N_s = 3000$ rpm ซึ่งตรงกับมอเตอร์ 2 poles ($120\\times50/2 = 3000$)" },
                    { no: 251, text: "มอเตอร์พิกัด 18.5 kW, $\\omega = 298.4$ rad/s จงหาแรงบิดทางกล (output torque) เต็มพิกัด", choices: ["1 : 62 N.m", "2 : 123 N.m", "3 : 32 N.m", "4 : 157 N.m"], correctIndex: 0, explanation: "ถูกต้อง จากสมการกำลังกล $P = T \\cdot \\omega \\Rightarrow T = \\frac{P}{\\omega} = \\frac{18500}{298.4} \\approx 62.0$ N.m" },
                    { no: 252, text: "มอเตอร์ 50 Hz, 2850 rpm ให้หาค่า slip เมื่อทำงานเต็มพิกัด", choices: ["1 : 0.05", "2 : 0.053", "3 : 0.06", "4 : 0.047"], correctIndex: 0, explanation: "ถูกต้อง $N_s = 3000$ rpm. $s = \\frac{N_s - N_r}{N_s} = \\frac{3000 - 2850}{3000} = \\frac{150}{3000} = 0.05$" },
                    { no: 253, text: "อัตราส่วนระหว่าง กำลังไฟฟ้าที่จ่ายให้โรเตอร์ (air gap power: $P_g$) กับกำลังไฟฟ้ากลที่ออกจากโรเตอร์ ($P_{mech}$) ตรงกับตัวเลือกใด", choices: ["1 : 1/(1-s)", "2 : 1-s", "3 : s", "4 : 1/s"], correctIndex: 0, explanation: "ถูกต้อง ความสัมพันธ์คือ $P_g : P_{cu} : P_{mech} = 1 : s : (1-s)$. ดังนั้น $\\frac{P_g}{P_{mech}} = \\frac{1}{1-s}$" },
                    { no: 254, text: "มอเตอร์ 6 poles 50 Hz. มี $P_{gap} = 20$ kW หาค่าแรงบิดแม่เหล็กไฟฟ้า (electromagnetic torque)", choices: ["1 : 12.7 N.m", "2 : 63.6 N.m", "3 : 127 N.m", "4 : 191 N.m"], correctIndex: 3, explanation: "ถูกต้อง $N_s = \\frac{120\\times50}{6} = 1000$ rpm $\\Rightarrow \\omega_s = \\frac{2\\pi\\times1000}{60} \\approx 104.72$ rad/s. $T_{em} = \\frac{P_g}{\\omega_s} = \\frac{20000}{104.72} \\approx 191$ N.m" },
                    { no: 255, text: "มอเตอร์พิกัด 1 HP หมุนด้วยความเร็ว 146 rad/s มีแรงบิดพิกัดเท่าใด (1 HP=746 W)", choices: ["1 : 0.85 N.m", "2 : 2.1 N.m", "3 : 1.7 N.m", "4 : 5.1 N.m"], correctIndex: 3, explanation: "ถูกต้อง $T = \\frac{P_{out}}{\\omega_m} = \\frac{746}{146} \\approx 5.11$ N.m" },
                    { no: 256, text: "มอเตอร์พิกัด 3 kW, 4 poles, 380 V, 1450 rpm มีพิกัดกำลังด้านออกเท่าใด", choices: ["1 : 400 W", "2 : 1450 W", "3 : 3000 W", "4 : 19.76 W"], correctIndex: 2, explanation: "ถูกต้อง พิกัดกำลังที่ระบุบนแผ่นป้าย (Nameplate) ของมอเตอร์คือพิกัดกำลังด้านขาออก (Rated Output Power) ซึ่งเท่ากับ 3 kW หรือ 3000 W" },
                    { no: 257, text: "มอเตอร์ 4 poles 50 Hz ขณะหมุน 1800 rpm กำลังทำงานอยู่ในสภาวะใด", choices: ["1 : สภาวะมอเตอร์", "2 : สภาวะเครื่องกำเนิดไฟฟ้า", "3 : สภาวะปลั๊กกิ้ง", "4 : สภาวะกลับทางหมุน"], correctIndex: 1, explanation: "ถูกต้อง $N_s = 1500$ rpm. เมื่อโรเตอร์หมุน 1800 rpm (เร็วกว่าสนามแม่เหล็กหมุน) สลิปติดลบ เครื่องจักรจะอยู่ในสภาวะเครื่องกำเนิดไฟฟ้า (Induction generator)" },
                    { no: 258, text: "มอเตอร์ 60 Hz, 6 poles ทำงานที่ slip 2% มีความเร็วโรเตอร์เท่าใด", choices: ["1 : 24.0 rpm", "2 : 125.6 rpm", "3 : 1000 rpm", "4 : 1176 rpm"], correctIndex: 3, explanation: "ถูกต้อง $N_s = \\frac{120 \\times 60}{6} = 1200$ rpm. $N_r = N_s(1 - s) = 1200(1 - 0.02) = 1176$ rpm" },
                    { no: 259, text: "มอเตอร์พิกัด 10 HP สามารถจ่ายกำลังทางกลที่พิกัดได้เท่ากับเท่าใด", choices: ["1 : 7460 W", "2 : 746 W", "3 : 11000 W", "4 : 10000 W"], correctIndex: 0, explanation: "ถูกต้อง แปลงหน่วยจากม้าเป็นวัตต์: $10 \\times 746 = 7460$ W (นี่คือกำลัง Rated ไม่ใช่ Breakdown/Max power แต่โจทย์ใช้คำว่าจ่ายได้สูงสุดอิงจากพิกัด)" },
                    { no: 260, text: "แนวทางในข้อใดไม่ใช่วิธีการที่สามารถนำมาใช้ในการควบคุมความเร็วมอเตอร์เหนี่ยวนำสามเฟส", choices: ["1 : การเปลี่ยนจำนวนขั้วแม่เหล็ก", "2 : ปรับเปลี่ยนความถี่", "3 : ปรับค่าแรงดันไฟฟ้า", "4 : การต่อความต้านทานภายนอกอนุกรมกับโรเตอร์แบบกรงกระรอก"], correctIndex: 3, explanation: "ถูกต้อง โรเตอร์แบบกรงกระรอก (Squirrel cage) ถูกลัดวงจรตายตัวมาจากโรงงาน ไม่สามารถต่อความต้านทานภายนอกได้ (ต้องเป็นแบบ Wound rotor ถึงจะต่อได้)" },
                    { no: 261, text: "มอเตอร์ความถี่ไฟจ่าย 50 Hz ถ้ารอเตอร์มีความถี่ $f_r = 2$ Hz สลิปมีค่าเท่าใด", choices: ["1 : 0.04", "2 : 0.02", "3 : 0.4", "4 : 0.2"], correctIndex: 0, explanation: "ถูกต้อง จาก $f_r = s \\cdot f$ จะได้ $s = \\frac{f_r}{f} = \\frac{2}{50} = 0.04$" },
                    { no: 262, text: "มอเตอร์ 3 kW, 4 poles, 1450 rpm, 50 Hz มีแรงบิดพิกัดเท่าไร", choices: ["1 : 20.59 N.m", "2 : 14.75 N.m", "3 : 19.24 N.m", "4 : 19.76 N.m"], correctIndex: 3, explanation: "ถูกต้อง $\\omega_m = \\frac{1450 \\times 2\\pi}{60} \\approx 151.84$ rad/s. $T = \\frac{3000}{151.84} \\approx 19.76$ N.m" },
                    { no: 263, text: "มอเตอร์ 400 V, จ่าย Out put 3 kW, Eff 75%, 0.8 PF lagging จงหากระแส (rated current)", choices: ["1 : 12.50 A", "2 : 4.66 A", "3 : 7.22 A", "4 : 21.67 A"], correctIndex: 2, explanation: "ถูกต้อง $P_{in} = \\frac{P_{out}}{Eff} = \\frac{3000}{0.75} = 4000$ W. จาก $P_{in} = \\sqrt{3} V_L I_L \\cos\\theta \\Rightarrow I_L = \\frac{4000}{\\sqrt{3} \\times 400 \\times 0.8} \\approx 7.217$ A" },
                    { no: 264, text: "ทดสอบ Blocked rotor (ต่อ Star): V=100 V, I=15 A, P=800 W ถ้า $R_{stator}=0.75\\,\\Omega$ หาความต้านทานโรเตอร์ ($R_{rotor}$ หรือ $R_2'$)", choices: ["1 : 3.844 ohm", "2 : 3.662 ohm", "3 : 1.185 ohm", "4 : ไม่มีข้อถูก (ในตัวเลือก 3 คือ R_eq)"], correctIndex: 2, explanation: "ถูกต้อง หา $R_{eq}$ ต่อเฟส $R_{eq} = \\frac{P}{3I^2} = \\frac{800}{3 \\times 15^2} = 1.185\\,\\Omega$. ความจริง $R_2' = R_{eq} - R_1 = 1.185 - 0.75 = 0.435\\,\\Omega$ แต่ในตัวเลือกมี 1.185 ซึ่งคือ $R_{eq}$ คาดว่าโจทย์หมายถึง $R_{eq}$ หรือละเว้นการหักลบ" },
                    { no: 265, text: "Blocked rotor: 30 V, 15 A, PF=0.8 ขณะทำงานที่พิกัดค่าสูญเสียในขดลวดทั้งหมด (Total Cu losses) มีค่าเท่าใด (สมมติกระแสพิกัด=15A)", choices: ["1 : 624 W", "2 : 1080 W", "3 : 360 W", "4 : 509 W"], correctIndex: 0, explanation: "ถูกต้อง การทดสอบลัดวงจรใช้วัด Copper loss พิกัด $P_{cu} = \\sqrt{3} V_L I_L \\cos\\theta = \\sqrt{3} \\times 30 \\times 15 \\times 0.8 \\approx 623.5$ W (ประมาณ 624 W)" },
                    { no: 266, text: "มอเตอร์ 5 kW, 380 V, 10.3 A, 0.85 PF ขณะจ่ายเต็มพิกัด มอเตอร์ใช้กำลังอินพุท (Input power) ประมาณเท่าใด", choices: ["1 : 5762.4 W", "2 : 6779.3 W", "3 : 3326.9 W", "4 : 3914.0 W"], correctIndex: 0, explanation: "ถูกต้อง $P_{in} = \\sqrt{3} V_L I_L \\cos\\theta = \\sqrt{3} \\times 380 \\times 10.3 \\times 0.85 \\approx 5762.4$ W" },
                    { no: 267, text: "มอเตอร์ 5 kW, 380 V ต่อแบบเดลต้า s=5% ข้อใดกล่าวไม่ถูกต้อง", choices: ["1 : สามารถใช้การสตาร์ทแบบ Star-Delta กับระบบไฟ 380 V", "2 : มีประสิทธิภาพมากกว่า 98%", "3 : จ่ายกำลังเอาท์พุทสูงสุดได้ 5000 W", "4 : เมื่อต่อ Star กระแสลดลง 3 เท่าของการต่อ Delta"], correctIndex: 1, explanation: "ถูกต้อง ข้อ 2 ผิด เนื่องจากมีสลิปถึง 5% หมายความว่า Rotor copper loss มีค่า 5% ของ $P_g$ ไปแล้ว ประสิทธิภาพโดยรวมจึงเป็นไปไม่ได้ที่จะเกิน 95% (ยิ่งกว่า 98% ยิ่งเป็นไปไม่ได้)" },
                    { no: 268, text: "สำหรับมอเตอร์เหนี่ยวนำสามเฟส เมื่อสลิป s=1 มอเตอร์มีสภาวะเป็นอย่างไร", choices: ["1 : หมุนด้วยความเร็วซิงโครนัส", "2 : จะเริ่มหมุนกลับทาง", "3 : หยุดหมุน", "4 : หมุนด้วยความเร็วครึ่งหนึ่งของความเร็วซิงโครนัส"], correctIndex: 2, explanation: "ถูกต้อง จากสมการ $s = \\frac{N_s - N_r}{N_s}$ เมื่อ $s=1$ หมายถึง $N_r = 0$ ซึ่งก็คือสภาวะหยุดหมุน (Standstill หรือ Blocked rotor)" },
                    { no: 269, text: "มอเตอร์ 100 kW, 50 Hz, 4 poles, s=0.05 จงหาความถี่ไฟในโรเตอร์", choices: ["1 : 25 Hz", "2 : 2.5 Hz", "3 : 15 Hz", "4 : 1.5 Hz"], correctIndex: 1, explanation: "ถูกต้อง $f_r = s \\cdot f = 0.05 \\times 50 = 2.5$ Hz" },
                    { no: 270, text: "มอเตอร์ 50 Hz, 2 poles ขับโหลด 15 kW ที่ 2,950 rpm จงหาแรงบิดทางกล (ไม่คิด rotational loss)", choices: ["1 : 38.6 N.m", "2 : 48.6 N.m", "3 : 58.6 N.m", "4 : 68.6 N.m"], correctIndex: 1, explanation: "ถูกต้อง $\\omega_m = \\frac{2950 \\times 2\\pi}{60} \\approx 308.9$ rad/s. $T = \\frac{15000}{308.9} \\approx 48.56$ N.m" },
                    { no: 271, text: "มอเตอร์ 2 kW, 380 V, 5 A, PF 0.8 lagging จงหาประสิทธิภาพ", choices: ["1 : 67%", "2 : 76%", "3 : 86%", "4 : 91%"], correctIndex: 1, explanation: "ถูกต้อง $P_{in} = \\sqrt{3} \\times 380 \\times 5 \\times 0.8 \\approx 2632.7$ W. $Eff = \\frac{2000}{2632.7} \\approx 0.7596$ หรือ 76%" },
                    { no: 272, text: "มอเตอร์ 50 Hz, 1440 rpm, 4 poles (Ns=1500) จงหาความถี่โรเตอร์", choices: ["1 : 0.5 Hz", "2 : 1.0 Hz", "3 : 1.5 Hz", "4 : 2.0 Hz"], correctIndex: 3, explanation: "ถูกต้อง $s = \\frac{1500 - 1440}{1500} = \\frac{60}{1500} = 0.04$. $f_r = 0.04 \\times 50 = 2.0$ Hz" },
                    { no: 273, text: "มอเตอร์ 50 Hz, 4 poles (Ns=1500), 1425 rpm มีค่าสลิปเท่าใด", choices: ["1 : 0.02", "2 : 0.03", "3 : 0.04", "4 : 0.05"], correctIndex: 3, explanation: "ถูกต้อง $s = \\frac{1500 - 1425}{1500} = \\frac{75}{1500} = 0.05$" },
                    { no: 274, text: "มอเตอร์ 200 kW, Star/Delta 660/380V, 202/350A, PF 0.92 ขณะจ่ายไฟ 380 V ต่อแบบ Delta กำลังอินพุทเท่าใด", choices: ["1 : 122 kW", "2 : 367 kW", "3 : 212 kW", "4 : 200 kW"], correctIndex: 2, explanation: "ถูกต้อง ต่อ Delta 380V จะกินกระแส 350A. $P_{in} = \\sqrt{3} \\times 380 \\times 350 \\times 0.92 \\approx 211,956$ W หรือ 212 kW" },
                    { no: 275, text: "มอเตอร์ 37 kW, 50 Hz, 6 poles ความเร็วรอบสนามแม่เหล็กหมุน (synchronous speed) เท่าใด", choices: ["1 : 1000 rpm", "2 : 970 rpm", "3 : 1200 rpm", "4 : 1500 rpm"], correctIndex: 0, explanation: "ถูกต้อง $N_s = \\frac{120 \\times 50}{6} = 1000$ rpm" },
                    { no: 276, text: "มอเตอร์ 50 Hz, 6 poles, ความเร็ว 970 rpm ค่าสลิปเท่าใด", choices: ["1 : 0.03", "2 : 0.97", "3 : 1.03", "4 : 1.97"], correctIndex: 0, explanation: "ถูกต้อง $s = \\frac{1000 - 970}{1000} = 0.03$" },
                    { no: 277, text: "มอเตอร์ 50 Hz, 6 poles, ความเร็ว 970 rpm ความถี่โรเตอร์เท่าใด", choices: ["1 : 1.5 Hz", "2 : 16.7 Hz", "3 : 48.5 Hz", "4 : 50 Hz"], correctIndex: 0, explanation: "ถูกต้อง $s = 0.03$. $f_r = 0.03 \\times 50 = 1.5$ Hz" },
                    { no: 278, text: "มอเตอร์ 37 kW, 380 V, 73.5 A, 0.85 PF ประสิทธิภาพเท่าใด", choices: ["1 : 75.5%", "2 : 64.2%", "3 : 94.6%", "4 : 90.0%"], correctIndex: 3, explanation: "ถูกต้อง $P_{in} = \\sqrt{3} \\times 380 \\times 73.5 \\times 0.85 \\approx 41,119$ W. $Eff = \\frac{37000}{41119} \\approx 0.8998$ หรือ 90.0%" },
                    { no: 279, text: "วงจรสมมูลที่มีความต้านทาน $R_2(1-s)/s$ เป็นของเครื่องจักรประเภทใด", choices: ["1 : มอเตอร์เหนี่ยวนำ 3 เฟส", "2 : เครื่องกำเนิดไฟฟ้าเหนี่ยวนำ", "3 : เครื่องกำเนิดซิงโครนัส", "4 : มอเตอร์ซิงโครนัส"], correctIndex: 0, explanation: "ถูกต้อง เทอม $R_2(1-s)/s$ ถูกใช้เพื่อจำลองกำลังทางกล (Mechanical load) ที่เพลาของมอเตอร์เหนี่ยวนำในรูปของความต้านทานไฟฟ้าสมมูล" },
                    { no: 280, text: "มอเตอร์ 220 V (Line) ต่อแบบสตาร์ แรงดันต่อเฟสเท่าใด", choices: ["1 : 220 V", "2 : 381 V", "3 : 127 V", "4 : 73.3 V"], correctIndex: 2, explanation: "ถูกต้อง สำหรับการต่อสตาร์ $V_{phase} = \\frac{V_{line}}{\\sqrt{3}} = \\frac{220}{1.732} \\approx 127$ V (ข้อมูลโหลดในโจทย์เป็นเพียงตัวหลอก)" },
                    { no: 281, text: "มอเตอร์ 6 poles 50 Hz (Ns=1000) สลิป 3% ความเร็วโรเตอร์เท่าใด", choices: ["1 : 1000 rpm", "2 : 970 rpm", "3 : 1500 rpm", "4 : 1455 rpm"], correctIndex: 1, explanation: "ถูกต้อง $N_r = 1000(1 - 0.03) = 970$ rpm" },
                    { no: 282, text: "มอเตอร์ $P_{out}=6000$, $P_{rot+core}=550$, $P_{cu1}=680$, $P_{cu2}=270$ ประสิทธิภาพเท่าใด", choices: ["1 : 80.0%", "2 : 91.6%", "3 : 86.3%", "4 : 83.0%"], correctIndex: 0, explanation: "ถูกต้อง $P_{in} = P_{out} + Losses = 6000 + 550 + 680 + 270 = 7500$ W. $Eff = \\frac{6000}{7500} = 0.8$ หรือ 80%" },
                    { no: 283, text: "ข้อใดไม่ใช่ลักษณะของมอเตอร์เหนี่ยวนำสามเฟส", choices: ["1 : สามารถควบคุมความเร็วโรเตอร์ได้", "2 : ขณะรับโหลดจะทำงานที่ PF lagging", "3 : กระแสไฟฟ้าขณะเริ่มหมุนมีค่าสูง", "4 : ความเร็วโรเตอร์เท่ากับความเร็วซิงโครนัส"], correctIndex: 3, explanation: "ถูกต้อง มอเตอร์เหนี่ยวนำต้องมีสลิป (Slip) เพื่อเหนี่ยวนำกระแสในโรเตอร์ ความเร็วโรเตอร์จึงไม่มีทางเท่ากับความเร็วซิงโครนัสเป๊ะขณะมีโหลด" },
                    { no: 284, text: "ถ้ามอเตอร์เหนี่ยวนำสามเฟสรับโหลดมากเกินกว่าค่าแรงบิดสูงสุด (Breakdown torque) จะเป็นอย่างไร", choices: ["1 : หมุนที่ความเร็วพิกัด", "2 : หมุนด้วยความเร็วสูงกว่าพิกัด", "3 : (ตัวเลือกหาย/พิมพ์ผิด)", "4 : หยุดหมุน"], correctIndex: 3, explanation: "ถูกต้อง หากโหลดทางกลมากกว่าแรงบิดสูงสุดที่มอเตอร์สร้างได้ มอเตอร์จะไม่สามารถฉุดโหลดได้และจะเข้าสู่สภาวะหยุดหมุน (Stall)" },
                    { no: 285, text: "มอเตอร์ไร้โหลด 1198 rpm ความถี่ 60 Hz จงหาจำนวนขั้วแม่เหล็ก", choices: ["1 : 24 poles", "2 : 18 poles", "3 : 12 poles", "4 : 6 poles"], correctIndex: 3, explanation: "ถูกต้อง ความเร็ว 1198 rpm บ่งบอกว่า $N_s = 1200$ rpm. จาก $P = \\frac{120f}{N_s} = \\frac{120\\times60}{1200} = 6$ poles" },
                    { no: 286, text: "มอเตอร์ 480 V, 60 A, 0.85 PF lagging หากำลังอินพุท", choices: ["1 : 42.4 kW", "2 : 5.1 kW", "3 : 21.2 kW", "4 : 28.8 kW"], correctIndex: 0, explanation: "ถูกต้อง $P_{in} = \\sqrt{3} V_L I_L \\cos\\theta = 1.732 \\times 480 \\times 60 \\times 0.85 \\approx 42,390$ W หรือ 42.4 kW" },
                    { no: 287, text: "มอเตอร์ Star/Delta 660/380V, 202/350A ขณะต่อแบบ Delta (380V) มอเตอร์ใช้กระแสเท่าใด", choices: ["1 : 350 A", "2 : 202 A", "3 : 303 A", "4 : 526 A"], correctIndex: 0, explanation: "ถูกต้อง ข้อมูลป้าย (Nameplate) ระบุไว้ชัดเจนว่าถ้าต่อ Delta ที่แรงดัน 380V จะกินกระแสสาย 350 A" },
                    { no: 288, text: "มอเตอร์ตัวเดิม (660/380V) หากต่อเข้ากับระบบ 660 V แบบ Star มอเตอร์ใช้กระแสเท่าใด (โจทย์อาจละ 660V ไว้)", choices: ["1 : 350 A", "2 : 202 A", "3 : 303 A", "4 : 526 A"], correctIndex: 1, explanation: "ถูกต้อง จากแผ่นป้ายระบุว่าถ้าต่อ Star ที่แรงดัน 660V (เพื่อให้ได้เฟสละ 380V) จะกินกระแส 202 A" },
                    { no: 289, text: "มอเตอร์ Star/Delta 660/380V (พิกัด 1420 rpm ที่ 380V Delta) ถ้านำมาต่อแบบ Star บนระบบไฟ 380V (สตาร์ท) ความเร็วจะตกลงเหลือประมาณเท่าใด (รับโหลดพิกัด)", choices: ["1 : 1306 rpm", "2 : 1495 rpm", "3 : 1500 rpm", "4 : 1420 rpm"], correctIndex: 0, explanation: "ถูกต้อง การต่อ Star บนไฟ 380V ทำให้แรงดันตกคร่อมเฟสเหลือ 220V แรงบิดจะลดลง 1/3 เท่า สลิปจะเพิ่มขึ้น 3 เท่า ($s \\approx 3 \\times 0.053 = 0.16$) ความเร็วตกมาที่ $\\approx 1260$ rpm (1306 rpm คือตัวเลือกที่แสดงให้เห็นถึงการตกลงของความเร็วอย่างชัดเจน)" },
                    { no: 290, text: "จากมอเตอร์ข้อเดิม ต่อแบบ Delta รับไฟ 380V เต็มพิกัด ความเร็วรอบจะเป็นเท่าใด", choices: ["1 : 1306 rpm", "2 : 1495 rpm", "3 : 1500 rpm", "4 : 1420 rpm"], correctIndex: 3, explanation: "ถูกต้อง ต่อ Delta 380V เป็นการต่อแบบปกติเต็มพิกัด (Rated condition) ความเร็วรอบจึงเท่ากับบนแผ่นป้ายคือ 1420 rpm" },
                    { no: 291, text: "มอเตอร์ 8 kW, 1425 rpm, 4 poles 50 Hz (Ns=1500) สลิปเท่าใด", choices: ["1 : 0.85", "2 : 0.05", "3 : 0.053", "4 : 0.80"], correctIndex: 1, explanation: "ถูกต้อง $s = \\frac{1500 - 1425}{1500} = \\frac{75}{1500} = 0.05$" },
                    { no: 292, text: "คำถามและตัวเลือกซ้ำกับข้อ 291 (หาค่าสลิป)", choices: ["1 : 0.85", "2 : 0.05", "3 : 0.053", "4 : 0.80"], correctIndex: 1, explanation: "ถูกต้อง คำนวณได้ 0.05 เหมือนเดิม" },
                    { no: 293, text: "หาความสูญเสียรวม (Total losses) เมื่อ $P_{rot+core}=550$, $P_{cu1}=680$, $P_{cu2}=350$", choices: ["1 : 1580 W", "2 : 550 W", "3 : 680 W", "4 : 350 W"], correctIndex: 0, explanation: "ถูกต้อง $Total\\,losses = 550 + 680 + 350 = 1580$ W" },
                    { no: 294, text: "มอเตอร์ 8 poles 50 Hz (Ns=750 rpm) สลิป 3% ความเร็วโรเตอร์เท่าใด", choices: ["1 : 22.5 rpm", "2 : 970 rpm", "3 : 727.5 rpm", "4 : 750 rpm"], correctIndex: 2, explanation: "ถูกต้อง $N_r = 750(1 - 0.03) = 727.5$ rpm" }
                ]
            },
		// --- เริ่มก็อปปี้ตรงนี้เป็นต้นไป (ใส่ลูกน้ำคั่นต่อจากบทที่ 44) ---
            ,{
                chapter: "บทที่ 45 : Steady state performance of synchronous machines (ข้อ 295 - 334)",
                questions: [
                    { no: 295, text: "เครื่องกำเนิดไฟฟ้า 3 เฟส แบบซิงโครนัส ทำงานอย่างอิสระโดยมีความเร็วคงที่ แรงดันไฟฟ้าที่ขั้วจะเป็นอย่างไร ถ้าภาระทางไฟฟ้าที่มาต่อเป็น ตัวต้านทาน และตัวเหนี่ยวนำ ตามลำดับ", choices: ["1 : เท่าเดิม, เพิ่มขึ้น", "2 : เพิ่มขึ้น, เพิ่มขึ้น", "3 : ลดลง, เพิ่มขึ้น", "4 : ลดลง, ลดลง"], correctIndex: 3, explanation: "ถูกต้อง โหลดความต้านทาน (R) ทำให้เกิดแรงดันตกคร่อม ($I_a R_a$) แรงดันจึงลดลงเล็กน้อย ส่วนโหลดตัวเหนี่ยวนำ (L) ทำให้เกิดปฏิกิริยาอาร์มาเจอร์แบบหักล้างสนามแม่เหล็กหลัก (Demagnetizing) แรงดันจึงลดลงอย่างมาก" },
                    { no: 296, text: "ค่ากำลังไฟฟ้าที่ส่งผ่านจากเครื่องกำเนิดไฟฟ้าซิงโครนัส เข้าสู่ระบบไฟฟ้า จะมีค่าสูงสุดเมื่อมุมระหว่างแรงดันไฟฟ้าทั้งสอง (มุมกำลัง) มีค่าเท่ากับเท่าใด", choices: ["1 : 0 electrical degree", "2 : 90 electrical degree", "3 : 30 electrical degree", "4 : 60 electrical degree"], correctIndex: 1, explanation: "ถูกต้อง จากสมการ $P = \\frac{E \\cdot V}{X_s} \\sin(\\delta)$ กำลังไฟฟ้าจะมีค่าสูงสุดเมื่อ $\\sin(\\delta) = 1$ ซึ่งก็คือที่มุม $\\delta = 90^\\circ$" },
                    { no: 297, text: "ใน V-curve ของมอเตอร์ซิงโครนัส จุดที่เส้นกราฟมีค่ากระแสอาร์มาเจอร์ต่ำที่สุด แสดงถึงอะไร", choices: ["1 : ค่าตัวประกอบกำลังไฟฟ้าเท่ากับหนึ่ง", "2 : ไม่มีภาระโหลด", "3 : ค่าตัวประกอบกำลังไฟฟ้าล้าหลัง", "4 : ค่าตัวประกอบกำลังไฟฟ้านำหน้า"], correctIndex: 0, explanation: "ถูกต้อง จุดต่ำสุดของ V-curve คือจุดที่มอเตอร์กินกระแสอาร์มาเจอร์น้อยที่สุด ซึ่งตรงกับสภาวะที่มีตัวประกอบกำลังไฟฟ้า (PF) เป็น 1 (Unity Power Factor)" },
                    { no: 298, text: "มอเตอร์ซิงโครนัสสามเฟส ขนาด 7.5 kW, 380 V, 4 poles, 50 Hz จงหาค่าเปอร์เซ็นต์สลิป (% slip)", choices: ["1 : 0%", "2 : 2.5%", "3 : 3.7%", "4 : 4.2%"], correctIndex: 0, explanation: "ถูกต้อง มอเตอร์ซิงโครนัสในสภาวะปกติ (Steady state) จะหมุนด้วยความเร็วเท่ากับสนามแม่เหล็กหมุนเป๊ะ ($N_r = N_s$) ดังนั้นจึงไม่มีสลิป (Slip = 0%)" },
                    { no: 299, text: "ข้อใดไม่ใช่เงื่อนไขในการขนานเครื่องกำเนิดไฟฟ้าซิงโครนัสเข้ากับระบบไฟฟ้า (synchronization)", choices: ["1 : มีแรงดันไฟฟ้าเท่ากัน", "2 : มีความถี่เท่ากัน", "3 : มีลำดับเฟสเหมือนกัน", "4 : มีกระแสไฟฟ้าเท่ากัน"], correctIndex: 3, explanation: "ถูกต้อง เงื่อนไขการขนานเครื่องกำเนิดไฟฟ้าคือ V เท่า, f เท่า, และ Phase sequence ตรงกัน กระแสไฟฟ้าไม่ต้องเท่ากันและไม่เกี่ยวกับการขนาน" },
                    { no: 300, text: "Short circuit ratio (SCR) คือค่าตัวเลขที่เป็นค่าคงที่ของเครื่องจักรซิงโครนัสแต่ละตัว ข้อใดเป็นความหมายของ SCR", choices: ["1 : อัตราส่วนกระแสอาร์มาเจอร์เต็มพิกัดต่อกระแสลัดวงจรสูงสุด", "2 : อัตราส่วนกระแสฟิลด์เพื่อผลิตแรงดันพิกัดขณะไม่มีโหลด ต่อ กระแสฟิลด์ขณะกระแสอาร์มาเจอร์เต็มพิกัดขณะลัดวงจร", "3 : ส่วนกลับของค่า per unit ของ ซิงโครนัสรีแอคแตนซ์อิ่มตัว", "4 : ไม่มีคำตอบที่ถูกต้อง"], correctIndex: 1, explanation: "ถูกต้อง SCR นิยามโดยตรงจาก $I_f$ ที่ให้ $V_{rated}$ (OC) หารด้วย $I_f$ ที่ให้ $I_{rated}$ (SC) ซึ่งเป็นตัวบ่งชี้ขนาดของปฏิกิริยาอาร์มาเจอร์" },
                    { no: 301, text: "วงจรสมมูลต่อเฟสของเครื่องจักรกลไฟฟ้าที่มีกระแส $I_a$ ไหลออกจากแหล่งจ่าย $E_{af}$ ผ่าน $R_a$ และ $X_s$ ไปยังขั้ว $V_{ta}$ เป็นลักษณะของเครื่องจักรใด", choices: ["1 : มอเตอร์ซิงโครนัส", "2 : เครื่องกำเนิดไฟฟ้าซิงโครนัส", "3 : มอเตอร์เหนี่ยวนำ", "4 : เครื่องกำเนิดไฟฟ้าเหนี่ยวนำ"], correctIndex: 1, explanation: "ถูกต้อง ทิศทางกระแส $I_a$ ไหลออกจากแหล่งกำเนิดแรงดันเหนี่ยวนำภายใน ($E_{af}$) แสดงว่าเครื่องจักรนี้กำลัง จ่าย พลังงานไฟฟ้า ซึ่งก็คือ เครื่องกำเนิดไฟฟ้า (Generator)" },
                    { no: 302, text: "วงจรสมมูลต่อเฟสของเครื่องจักรกลไฟฟ้าที่มีกระแส $I_a$ ไหลจากขั้ว $V_{ta}$ เข้าไปหาแหล่งจ่าย $E_{af}$ เป็นลักษณะของเครื่องจักรใด", choices: ["1 : มอเตอร์ซิงโครนัส", "2 : เครื่องกำเนิดไฟฟ้าซิงโครนัส", "3 : มอเตอร์เหนี่ยวนำ", "4 : เครื่องกำเนิดไฟฟ้าเหนี่ยวนำ"], correctIndex: 0, explanation: "ถูกต้อง ทิศทางกระแสไหลเข้าเครื่องจักร แสดงว่ากำลัง รับ พลังงานไฟฟ้าเข้าไป จึงเป็น มอเตอร์ซิงโครนัส" },
                    { no: 303, text: "เฟสเซอร์ไดอะแกรมที่แสดง $E_{af} = V_{ta} + I_a R_a + jI_a X_s$ และมีกระแส $I_a$ นำหน้า $V_{ta}$ (Leading) เป็นของเครื่องจักรใด", choices: ["1 : มอเตอร์ ทำงาน PF นำหน้า", "2 : มอเตอร์ ทำงาน PF=1", "3 : เครื่องกำเนิดไฟฟ้า ทำงาน PF นำหน้า", "4 : เครื่องกำเนิดไฟฟ้า ทำงาน PF=1"], correctIndex: 2, explanation: "ถูกต้อง สมการสมดุลแรงดัน $E_a = V_t + IZ$ คือของเครื่องกำเนิดไฟฟ้า และกระแส $I_a$ นำหน้าแรงดัน $V_t$ คือสภาวะ PF นำหน้า (Leading)" },
                    { no: 304, text: "ข้อใดไม่ใช่คุณสมบัติของเครื่องจักรกลไฟฟ้าซิงโครนัส", choices: ["1 : ความเร็วรอบของโรเตอร์มีค่าคงที่", "2 : ความเร็วรอบโรเตอร์เท่ากับความเร็วซิงโครนัส", "3 : ความถี่สลิปจะเกิดขึ้นที่ขดลวดโรเตอร์ของมอเตอร์ซิงโครนัสเสมอ", "4 : สามารถใช้ปรับปรุงตัวประกอบกำลังไฟฟ้าได้"], correctIndex: 2, explanation: "ถูกต้อง ในสภาวะทำงานปกติ มอเตอร์ซิงโครนัสจะหมุนเท่ากับความเร็วสนามแม่เหล็ก ทำให้ สลิปมีค่าเป็นศูนย์ จึงไม่มีความถี่สลิปเหนี่ยวนำที่โรเตอร์" },
                    { no: 305, text: "การทดสอบโดยหมุนด้วยความเร็วซิงโครนัส ขดลวดอาร์มาเจอร์เปิดวงจร (ต่อแค่โวลต์มิเตอร์) แล้วปรับกระแสฟิลด์ เป็นการทดสอบแบบใด", choices: ["1 : การทดสอบแบบเปิดวงจร (Open circuit test)", "2 : การทดสอบแบบลัดวงจร (Short circuit test)", "3 : ทดสอบหา friction and windage", "4 : การทดสอบสลิป (Slip test)"], correctIndex: 0, explanation: "ถูกต้อง การเปิดวงจรอาร์มาเจอร์แล้ววัดแรงดัน ขณะที่ปรับเพิ่มกระแสฟิลด์ คือขั้นตอนของการทำ Open Circuit Test เพื่อสร้าง OCC curve" },
