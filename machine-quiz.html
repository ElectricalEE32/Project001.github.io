                    { no: 306, text: "ข้อใดไม่ใช่การทดสอบเพื่อหาค่าพารามิเตอร์ของเครื่องจักรกลซิงโครนัส", choices: ["1 : การทดสอบแบบเปิดวงจร", "2 : การทดสอบแบบลัดวงจร", "3 : การทดสอบแบบยึดโรเตอร์ (locked rotor test)", "4 : การทดสอบสลิป (slip test)"], correctIndex: 2, explanation: "ถูกต้อง Locked rotor test เป็นการทดสอบเฉพาะสำหรับมอเตอร์เหนี่ยวนำ (Induction motor) ไม่ใช้กับเครื่องจักรซิงโครนัส" },
                    { no: 307, text: "ข้อใดไม่ใช่เครื่องมือที่จำเป็นต้องใช้ในการขนานเครื่องกำเนิดไฟฟ้าซิงโครนัส (synchronization)", choices: ["1 : หลอด Incandescent 3 ดวง", "2 : Voltmeter", "3 : Frequency meter", "4 : Ammeter"], correctIndex: 3, explanation: "ถูกต้อง การขนานเข้าสู่ระบบต้องเช็คแรงดัน (Voltmeter), ความถี่ (Frequency meter), และลำดับเฟส/ความสอดคล้องของมุม (หลอดไฟ 3 ดวงหรือ Synchroscope) แอมมิเตอร์ไม่จำเป็นในขั้นตอนนี้" },
                    { no: 308, text: "ข้อใดต่อไปนี้กล่าวถูกต้องที่สุด", choices: ["1 : มุมกำลังมากสุดขั้วไม่ยื่นคือ 90 องศา", "2 : มุมกำลังมากสุดขั้วยื่นน้อยกว่า 90 องศา", "3 : SC และ OC test หาได้แค่ Unsaturated Xs", "4 : Slip test หา Xq ได้เท่านั้น"], correctIndex: 1, explanation: "ถูกต้อง สำหรับมอเตอร์ขั้วยื่น (Salient pole) จะมี Reluctance torque เข้ามาบวกเพิ่ม ทำให้จุดที่ให้กำลัง/แรงบิดสูงสุด (Pull-out torque) ขยับมาอยู่ที่มุม $\\delta < 90^\\circ$ (มักอยู่แถวๆ 60-70 องศา)" },
                    { no: 309, text: "เครื่องกำเนิดไฟฟ้า 380 V (Line), 50 Hz, 5 A, Star, 0.8 PF lagging, $Z_s = 4+j3\\,\\Omega$ หา induced voltage per phase ($E_a$)", choices: ["1 : 194.4 V", "2 : 219.4 V", "3 : 232.7 V", "4 : 310 V"], correctIndex: 2, explanation: "ถูกต้อง แรงดันเฟส $V_\\phi = 380/\\sqrt{3} \\approx 219.4$ V. จากสมการ $E_a = V_\\phi + I_a Z_s$. แม้คำนวณเวกเตอร์เต็มจะได้ 244.4 V แต่ถ้าโจทย์เจตนาอ้างอิงแรงดัน Line ที่ 403 V (จากข้อ 330) จะได้แรงดันเฟส $E_{a,\\phi} = 403/\\sqrt{3} = 232.7$ V ซึ่งเป็นตัวเลือกที่ถูกต้องที่สุดในบริบทนี้" },
                    { no: 310, text: "เครื่องกำเนิดไฟฟ้ากระแสสลับ 3 เฟส 8 poles ถ้าต้องการผลิตไฟฟ้า 50 Hz จะต้องหมุนเท่าใด", choices: ["1 : 750 rpm", "2 : 750 rps", "3 : 1250 rpm", "4 : 25 rps"], correctIndex: 0, explanation: "ถูกต้อง คำนวณจากสูตร $N_s = \\frac{120f}{P} = \\frac{120 \\times 50}{8} = 750$ rpm" },
                    { no: 311, text: "ลักษณะโรเตอร์ของเครื่องจักรกลไฟฟ้าซิงโครนัสชนิดใดที่เหมาะสมกับต้นกำลังทางกลที่มีความเร็วรอบสูง", choices: ["1 : Wound rotor", "2 : Squirrel cage rotor", "3 : Salient pole", "4 : Cylindrical rotor"], correctIndex: 3, explanation: "ถูกต้อง โรเตอร์แบบทรงกระบอก (Cylindrical หรือ Non-salient) มีความแข็งแรงทางกลสูง และลู่ลมได้ดี จึงเหมาะกับเครื่องกำเนิดไฟฟ้าที่หมุนด้วยความเร็วสูง (เช่น กังหันไอน้ำ/แก๊ส)" },
                    { no: 312, text: "เครื่องกำเนิด 125 kVA, 400 / 230 V, 50 Hz, 1500 rpm มีจำนวนขั้วแม่เหล็กเท่าใด", choices: ["1 : 2 poles", "2 : 4 poles", "3 : 6 poles", "4 : 8 poles"], correctIndex: 1, explanation: "ถูกต้อง จากสูตร $P = \\frac{120f}{N} = \\frac{120 \\times 50}{1500} = 4$ poles" },
                    { no: 313, text: "เครื่องกำเนิด 200 kW, 400 V, Star, 50 Hz, 6 poles, 0.8 lagging PF, eff 95% หากระแสพิกัด", choices: ["1 : 360.8 A", "2 : 389.8 A", "3 : 288.6 A", "4 : 500.0 A"], correctIndex: 0, explanation: "ถูกต้อง พิกัดของ Generator ในหน่วย kW คือกำลังไฟฟ้าขาออก $P_{out} = \\sqrt{3} V_L I_L \\cos\\theta \\Rightarrow 200000 = 1.732 \\times 400 \\times I_L \\times 0.8$. จะได้ $I_L = 360.8$ A" },
                    { no: 314, text: "การ Synchronization เครื่องกำเนิดไฟฟ้าจะต้องมีเงื่อนไขใด", choices: ["1 : แรงดันเท่า, ความถี่เท่า, พิกัดกำลังเท่า", "2 : ลำดับเฟสตรง, แรงดันเท่า, ขั้วแม่เหล็กเท่า", "3 : ลำดับเฟสตรง, แรงดันเท่า, ความถี่ไฟเท่า", "4 : ลำดับเฟสตรง, แกนเหล็กเท่า, ความถี่ไฟเท่า"], correctIndex: 2, explanation: "ถูกต้อง เงื่อนไขหลัก 3 ประการในการขนานไฟคือ 1) แรงดันไฟฟ้าเท่ากัน 2) ความถี่ไฟฟ้าเท่ากัน และ 3) ลำดับเฟส (Phase sequence) ตรงกัน" },
                    { no: 315, text: "เมื่อขนานกับ Infinite bus แล้ว ถ้าเปลี่ยนแปลงกำลังของชุดขับเคลื่อนต้นกำลัง (prime mover) จะเกิดผลใด", choices: ["1 : จ่ายกำลังไฟฟ้าให้ระบบเพิ่มขึ้น เมื่อเพิ่มกำลัง Prime mover", "2 : จ่ายกำลังไฟฟ้าลดลง เมื่อเพิ่มกำลัง Prime mover", "3 : PF เพิ่มขึ้น เมื่อเพิ่มกำลัง Prime mover", "4 : PF ลดลง เมื่อลดกำลัง Prime mover"], correctIndex: 0, explanation: "ถูกต้อง การเร่ง Prime mover (เพิ่มพลังงานกล) จะส่งผลให้มุมกำลัง (Power angle $\\delta$) กางออกมากขึ้น ทำให้จ่ายกำลังไฟฟ้าจริง (Active power, P) เข้าสู่ระบบมากขึ้น" },
                    { no: 316, text: "เครื่องกำเนิด 3 เฟส อิสระความเร็วคงที่ Terminal voltage จะเป็นอย่างไร ถ้าโหลดเป็นตัวต้านทาน (R) และตัวเก็บประจุ (C) ตามลำดับ", choices: ["1 : เท่าเดิม, เพิ่มขึ้น", "2 : เพิ่มขึ้น, เพิ่มขึ้น", "3 : ลดลง, เพิ่มขึ้น", "4 : ลดลง, ลดลง"], correctIndex: 2, explanation: "ถูกต้อง โหลด R ทำให้เกิดแรงดันตกคร่อมภายในเล็กน้อย V จึงลดลง ส่วนโหลด C (PF นำหน้า) จะเกิดปฏิกิริยาอาร์มาเจอร์เสริมสนามแม่เหล็ก (Magnetizing) ทำให้ V เพิ่มสูงขึ้น" },
                    { no: 317, text: "มอเตอร์ซิงโครนัสมีความเร็วเป็นอย่างไร", choices: ["1 : ช้ากว่า Synchronous speed", "2 : เท่ากับ Synchronous speed", "3 : เร็วกว่า Synchronous speed", "4 : มี Slip speed เหมือนกับ Induction motor"], correctIndex: 1, explanation: "ถูกต้อง เป็นเอกลักษณ์ของมอเตอร์ซิงโครนัสที่โรเตอร์จะหมุนล็อคไปกับสนามแม่เหล็กสเตเตอร์ จึงมีความเร็วเท่ากับ Synchronous speed เสมอ" },
                    { no: 318, text: "มอเตอร์ซิงโครนัส 100 kW, 380 V, PF=1 ขับภาระเต็มพิกัด ประสิทธิภาพ 90% ให้หาค่ากระแสไฟฟ้า (rated line current)", choices: ["1 : 263.2 A", "2 : 168.8 A", "3 : 151.9 A", "4 : 97.5 A"], correctIndex: 1, explanation: "ถูกต้อง อินพุทไฟฟ้า $P_{in} = P_{out} / Eff = 100 / 0.9 = 111.11$ kW. จาก $P_{in} = \\sqrt{3} V_L I_L \\cos\\theta$ จะได้ $I_L = \\frac{111111}{\\sqrt{3} \\times 380 \\times 1} = 168.8$ A" },
                    { no: 319, text: "แปลงความถี่ 50 Hz เป็น 400 Hz โดยใช้มอเตอร์ซิงโครนัสขับเครื่องกำเนิดซิงโครนัส อัตราส่วนจำนวนขั้วแม่เหล็ก (Motor : Generator) คือเท่าใด", choices: ["1 : 8 ต่อ 2", "2 : 2 ต่อ 8", "3 : 16 ต่อ 2", "4 : 2 ต่อ 16"], correctIndex: 3, explanation: "ถูกต้อง ทั้งคู่เพลาต่อถึงกันจึงหมุนรอบเท่ากัน ($N_m = N_g$). จาก $\\frac{120 f_m}{P_m} = \\frac{120 f_g}{P_g} \\Rightarrow \\frac{50}{P_m} = \\frac{400}{P_g} \\Rightarrow \\frac{P_m}{P_g} = \\frac{50}{400} = \\frac{1}{8} = \\frac{2}{16}$" },
                    { no: 320, text: "เครื่องกำเนิด 800 kVA, 6600 V, 4 poles, 50 Hz, Star ขณะจ่ายภาระพิกัด ที่ 0.8 lagging PF กำลังไฟฟ้าเอาท์พุทมีค่าเท่าใด", choices: ["1 : 640 kW", "2 : 1000 kW", "3 : 660 kW", "4 : 528 kW"], correctIndex: 0, explanation: "ถูกต้อง กำลังไฟฟ้าจริง (Active power) $P = S \\times PF = 800 \\times 0.8 = 640$ kW" },
                    { no: 321, text: "เครื่องกำเนิด 800 kVA, 6600 V, 4 poles, 50 Hz Star ขณะจ่ายพิกัด กระแสไฟฟ้ามีค่าเท่าใด", choices: ["1 : 70.0 A", "2 : 121.2 A", "3 : 40.4 A", "4 : 85.7 A"], correctIndex: 0, explanation: "ถูกต้อง กระแสไฟฟ้าคำนวณจาก $I_L = \\frac{S}{\\sqrt{3} V_L} = \\frac{800,000}{\\sqrt{3} \\times 6600} \\approx 69.98$ หรือ 70.0 A" },
                    { no: 322, text: "ข้อความใดไม่เกี่ยวข้องกับลักษณะการทำงานของเครื่องจักรกลไฟฟ้าซิงโครนัส", choices: ["1 : Slip speed", "2 : Synchronous speed", "3 : Synchronize", "4 : Phase sequence voltage"], correctIndex: 0, explanation: "ถูกต้อง เครื่องจักรกลซิงโครนัสไม่มีการไถล (Slip) ในสภาวะทำงานปกติ Slip speed จึงไม่เกี่ยวข้อง" },
                    { no: 323, text: "เครื่องกำเนิด 100 kVA, 380 V, 50 Hz, 6 poles, Delta. 0.8 lag PF. Rotational loss 2500 W. ($Z_s = 0.25+j0.75\\,\\Omega$) หาแรงบิดของต้นกำลัง (input torque)", choices: ["1 : 770 N.m", "2 : 568 N.m", "3 : 976 N.m", "4 : 842 N.m"], correctIndex: 3, explanation: "ถูกต้อง $P_{out} = 80$ kW. $I_{ph} = 87.7$ A. $P_{cu} = 3 I_{ph}^2 R_a = 5771$ W. $P_{in} = 80000 + 5771 + 2500 = 88271$ W. $\\omega_s = \\frac{2\\pi \\times 1000}{60} = 104.72$ rad/s. $T_{in} = \\frac{88271}{104.72} \\approx 842.9$ N.m" },
                    { no: 324, text: "จากโจทย์ข้อ 323 กระแสไฟฟ้าต่อเฟสมีค่าเท่าใด", choices: ["1 : 151.9 A", "2 : 87.7 A", "3 : 263.2 A", "4 : 186.1 A"], correctIndex: 1, explanation: "ถูกต้อง กระแสสาย $I_L = \\frac{100,000}{\\sqrt{3} \\times 380} = 151.9$ A. ต่อ Delta กระแสเฟส $I_{ph} = \\frac{151.9}{\\sqrt{3}} \\approx 87.7$ A" },
                    { no: 325, text: "ระบบไฟฟ้ามีภาระ 2000 kVA, 0.8 PF lagging หากำลังไฟฟ้าเสมือน (reactive power) ของระบบนี้", choices: ["1 : 1200 kvar", "2 : 1000 kvar", "3 : 800 kvar", "4 : 600 kvar"], correctIndex: 0, explanation: "ถูกต้อง $Q = S \\sin\\theta$. มุม $\\cos^{-1}(0.8) = 36.87^\\circ$, $\\sin(36.87^\\circ) = 0.6$. ดังนั้น $Q = 2000 \\times 0.6 = 1200$ kVAR" },
                    { no: 326, text: "ระบบไฟฟ้า 2000 kVA, 0.8 PF lagging หากำลังไฟฟ้าจริง (real power)", choices: ["1 : 1600 kW", "2 : 1400 kW", "3 : 1200 kW", "4 : 1000 kW"], correctIndex: 0, explanation: "ถูกต้อง $P = S \\cos\\theta = 2000 \\times 0.8 = 1600$ kW" },
                    { no: 327, text: "จงหาความเร็วรอบของมอเตอร์ซิงโครนัสสามเฟส 480 V, 60 Hz, 4 poles", choices: ["1 : 900 rpm", "2 : 1800 rpm", "3 : 2700 rpm", "4 : 3600 rpm"], correctIndex: 1, explanation: "ถูกต้อง $N_s = \\frac{120 \\times 60}{4} = 1800$ rpm" },
                    { no: 328, text: "มอเตอร์ข้อ 327 จะมีความเร็วรอบเท่าใดเมื่อรับภาระทางกล 70% ของพิกัด", choices: ["1 : 900 rpm", "2 : 1800 rpm", "3 : 2700 rpm", "4 : 3600 rpm"], correctIndex: 1, explanation: "ถูกต้อง มอเตอร์ซิงโครนัสรักษาความเร็วรอบคงที่เท่ากับ Synchronous speed เสมอ ไม่ว่าโหลดจะเปลี่ยนไปเท่าใด (ตราบใดที่ไม่หลุดซิงโครนัส)" },
                    { no: 329, text: "มอเตอร์ข้อ 327 ความเร็วจะเป็นเท่าใดเมื่อจ่ายไฟ 240 V", choices: ["1 : 300 rpm", "2 : 450 rpm", "3 : 900 rpm", "4 : 1800 rpm"], correctIndex: 3, explanation: "ถูกต้อง ความเร็วรอบขึ้นอยู่กับความถี่ (Hz) ไม่ใช่แรงดัน (V) ดังนั้นเมื่อจ่ายไฟ 60Hz เท่าเดิม ความเร็วก็ยังคงเป็น 1800 rpm" },
                    { no: 330, text: "เครื่องกำเนิด 380 V, 50 Hz, 5 A, 0.8 PF lag, Star. $Z_s = 4+j3\\,\\Omega$. หา $E_a$", choices: ["1 : 403 V", "2 : 219.4 V", "3 : 232.7 V", "4 : 310 V"], correctIndex: 2, explanation: "ถูกต้อง คำนวณเวกเตอร์แรงดันตกคร่อมและบวกกับแรงดันเฟส จะได้ $E_{a,\\phi} \approx 232.7$ V (ซึ่งสอดคล้องกับ $E_{line} = 403$ V ในตัวเลือก 1)" },
                    { no: 331, text: "เฟสเซอร์ไดอะแกรมที่มี $E_{af}$ เกิดจาก $V_{ta} + I_aR_a + jI_aX_s$ และกระแส $I_a$ ตามหลัง $V_{ta}$ (Lagging) เป็นลักษณะของเครื่องจักรใด", choices: ["1 : มอเตอร์ นำหน้า", "2 : มอเตอร์ ล้าหลัง", "3 : เครื่องกำเนิด นำหน้า", "4 : เครื่องกำเนิด ล้าหลัง"], correctIndex: 3, explanation: "ถูกต้อง สมการบวก $E_a = V_t + IZ$ คือเครื่องกำเนิดไฟฟ้า และกระแสที่ล้าหลัง $V_t$ คือสภาวะ Lagging PF" },
                    { no: 332, text: "เครื่องกำเนิด 380 V, 50 Hz, 5 A, 0.8 PF lag, Star จ่ายไฟพิกัด กำลังไฟฟ้าที่จ่ายโหลดเท่าใด", choices: ["1 : 1900 W", "2 : 1520 W", "3 : 2633 W", "4 : 4560 W"], correctIndex: 2, explanation: "ถูกต้อง $P = \\sqrt{3} V_L I_L \\cos\\theta = \\sqrt{3} \\times 380 \\times 5 \\times 0.8 \\approx 2632.7$ W (ประมาณ 2633 W)" },
                    { no: 333, text: "ทดสอบลำดับเฟสด้วยหลอดไฟ 3 ดวงตรง (Three-dark method) ถ้าลำดับเฟสตรงกัน หลอดไฟจะเป็นอย่างไร", choices: ["1 : ดับสนิททั้งสามเฟส", "2 : หลอด A ดับ B,C สว่าง", "3 : สว่างทั้งสามเฟส", "4 : หลอด A สว่าง B,C ดับ"], correctIndex: 0, explanation: "ถูกต้อง วิธี Three-dark (ต่อตรงเฟส A-a, B-b, C-c) เมื่อแรงดัน ความถี่ และลำดับเฟสตรงกัน หลอดทั้งสามจะค่อยๆ หรี่และ \"ดับสนิท\" พร้อมกัน" },
                    { no: 334, text: "ทดสอบลำดับเฟสแบบไขว้ (Two-bright, One-dark) A ต่อ a, B ต่อ c, C ต่อ b. ถ้าลำดับเฟสตรงกันจะเป็นอย่างไร", choices: ["1 : ดับสนิททั้งสามเฟส", "2 : หลอด A ดับ B,C สว่าง", "3 : สว่างทั้งสามเฟส", "4 : หลอด A สว่าง B,C ดับ"], correctIndex: 1, explanation: "ถูกต้อง วิธีไขว้สาย เมื่อซิงโครนัสตรงกัน หลอดที่ต่อตรง (A-a) จะดับสนิท ส่วนหลอดที่ต่อไขว้ (B-c และ C-b) จะได้รับแรงดัน Line-to-line จึงสว่างจ้า" }
                ]
            },
            {
                chapter: "บทที่ 46 : Starting methods for polyphase induction motors (ข้อ 335 - 347)",
                questions: [
                    { no: 335, text: "มอเตอร์ต่อแบบเดลต้า ต้องการกระแสไฟฟ้า 3 A จากแหล่ง 380 V ถ้าต่อแบบสตาร์แทน จะต้องการกระแสไฟฟ้าเท่าใด", choices: ["1 : 2.1 A", "2 : 5.2 A", "3 : 1.7 A", "4 : 3.0 A"], correctIndex: 2, explanation: "ถูกต้อง การต่อแบบสตาร์จะทำให้กระแสสาย (Line current) ลดลงเหลือ 1/3 ของกระแสขณะต่อเดลต้า หาก 3 A คือเฟสเคอเรนต์ การต่อสตาร์จะได้กระแส $\\approx 1.732$ A (ข้อนี้สันนิษฐาน 3A คือกระแสเฟสในเดลต้า)" },
                    { no: 336, text: "วิธีการเริ่มหมุนแบบใด เหมาะสมที่จะนำมาใช้กับมอเตอร์ขนาด 750 W มากที่สุด", choices: ["1 : Direct on line", "2 : Auto-transformer starting", "3 : Part winding starting", "4 : Star-delta starting"], correctIndex: 0, explanation: "ถูกต้อง มอเตอร์ขนาดเล็ก 750 W (1 HP) นิยมต่อตรงเข้ากับแหล่งจ่ายไฟ (Direct On Line: DOL) เพราะราคาถูกและไม่กระทบระบบไฟ" },
                    { no: 337, text: "การสตาร์ทแบบ Direct on line กระแสขณะสตาร์ทมีค่าประมาณเท่าใด", choices: ["1 : ลดลง 2 เท่า", "2 : เพิ่ม 1-2 เท่า", "3 : เพิ่ม 5-8 เท่า", "4 : เท่ากับกระแสพิกัด"], correctIndex: 2, explanation: "ถูกต้อง การจ่ายไฟเต็มพิกัดขณะโรเตอร์หยุดนิ่ง จะทำให้เกิดกระแสกระชาก (Inrush current) สูงถึง 5-8 เท่าของกระแสพิกัด" },
                    { no: 338, text: "ตัวเลือกใดกล่าวไม่ถูกต้องเกี่ยวกับวิธีสตาร์ทแบบสตาร์ เดลต้า", choices: ["1 : แรงบิดลดลง 3 เท่า", "2 : ใช้หลักการลดแรงดัน", "3 : แรงดันตกคร่อมลดลง 1.7 เท่า", "4 : ต้องใช้มอเตอร์ขดลวด 2 ชุด"], correctIndex: 3, explanation: "ถูกต้อง ไม่จำเป็นต้องมีขดลวด 2 ชุด (นั่นคือแบบ Part Winding) มอเตอร์ใช้ขดลวดชุดเดียวที่มี 6 ปลายสาย (U1-U2, V1-V2, W1-W2) เพื่อสลับการเชื่อมต่อก็พอ" },
                    { no: 339, text: "ในการสตาร์ท Star-Delta กับระบบไฟ 380 V ควรเลือกป้ายมอเตอร์แบบใด", choices: ["1 : 220/380 V", "2 : 380/660 V", "3 : 660 V", "4 : 380 V"], correctIndex: 1, explanation: "ถูกต้อง การรันในโหมด Delta หมายความว่าขดลวดเฟสต้องรับไฟ 380V ได้เต็มๆ ป้ายมอเตอร์จึงต้องระบุ 380/660V (Delta/Star)" },
                    { no: 340, text: "ข้อใดไม่ใช่วิธีเริ่มหมุนของ Wound rotor induction motor", choices: ["1 : ต่อความต้านทานภายนอกกับโรเตอร์เฉพาะตอนเริ่มหมุน", "2 : ปรับความต้านทานโรเตอร์ให้ต่ำสุดในตอนเริ่มหมุน", "3 : ลัดวงจรความต้านทานภายนอกขณะหมุนปกติ", "4 : เมื่อเริ่มหมุน ค่อยๆลดความต้านทานลงจนเป็นศูนย์"], correctIndex: 1, explanation: "ถูกต้อง ตอนเริ่มหมุนต้องปรับ R ภายนอกให้ สูงสุด เพื่อลดกระแสสตาร์ทและเพิ่มแรงบิด การปรับให้ \"ต่ำสุด\" จึงผิด" },
                    { no: 341, text: "มอเตอร์กรงกระรอก 2 ชั้น (double squirrel cage) กระแสสตาร์ทส่วนใหญ่ไหลในแท่งตัวนำด้านนอก (outer) หรือด้านใน (inner) เพราะเหตุใด", choices: ["1 : ด้านนอก เพราะอิมพีแดนซ์ต่ำกว่า", "2 : ด้านใน เพราะอิมพีแดนซ์ต่ำกว่า", "3 : ด้านใน เพราะความต้านทานต่ำกว่า", "4 : ไหลเท่ากัน"], correctIndex: 0, explanation: "ถูกต้อง ขณะสตาร์ท ความถี่โรเตอร์สูงมาก (50Hz) ขดลวดด้านในอยู่ลึกมี Leakage reactance สูงมาก กระแสจึงเลือกไหลผ่านขดลวดด้านนอกที่มี Reactance ต่ำกว่า" },
                    { no: 342, text: "สตาร์ทด้วย Autotransformer ลดแรงดัน 380V เป็น 220V ให้ผลเหมือนสตาร์ทวิธีใด", choices: ["1 : Direct on line 380V", "2 : ลดแรงดันด้วย R อนุกรม", "3 : ลดแรงดันด้วย L อนุกรม", "4 : Star-delta"], correctIndex: 3, explanation: "ถูกต้อง การลดแรงดันจาก 380V เป็น 220V คือการลดลงด้วยอัตราส่วน $1/\\sqrt{3}$ ซึ่งให้ค่าแรงดัน/กระแส/แรงบิด เท่ากับการสตาร์ทแบบ Star-Delta พอดี" },
                    { no: 343, text: "DOL ด้วย 400V ได้แรงบิดสตาร์ท 3 เท่าพิกัด ถ้าต้องการแรงบิดสตาร์ทเท่าพิกัดพอดี ต้องจ่ายแรงดันเท่าไร", choices: ["1 : 100 V", "2 : 231 V", "3 : 300 V", "4 : 380 V"], correctIndex: 1, explanation: "ถูกต้อง แรงบิดแปรผันตามแรงดันยกกำลังสอง ($T \\propto V^2$) จะได้ $1/3 = (V_{new}/400)^2 \\Rightarrow V_{new} = 400 / \\sqrt{3} \\approx 231$ V" },
                    { no: 344, text: "ข้อใดเป็นลักษณะของมอเตอร์แบบ Wound rotor", choices: ["1 : ให้แรงม้าและแรงบิดต่ำกว่า Squirrel cage", "2 : ต้องมีความต้านทานภายนอกต่อที่ขดลวดสเตเตอร์", "3 : ไม่ต้องใช้ความต้านทานภายนอก", "4 : ต้องมีความต้านทานภายนอกต่อที่ขดลวดโรเตอร์ขณะสตาร์ท"], correctIndex: 3, explanation: "ถูกต้อง คุณสมบัติเฉพาะของ Wound rotor คือสามารถต่อตัวต้านทานภายนอกผ่าน Slip ring เข้าวงจรโรเตอร์เพื่อปรับปรุงคุณสมบัติการสตาร์ทได้" },
                    { no: 345, text: "การกระทำแบบใดทำให้กระแสเข้ามอเตอร์มีค่าสูงที่สุด", choices: ["1 : Direct on line starting", "2 : ปลั๊กกิ้ง (Plugging: กลับทางหมุนทันที)", "3 : มอเตอร์จ่ายโหลดเต็มพิกัด", "4 : สตาร์ทแบบ Star-Delta"], correctIndex: 1, explanation: "ถูกต้อง การ Plugging (สลับสายกะทันหันขณะหมุน) สลิปจะมีค่าเข้าใกล้ 2 ทำให้เกิดกระแสดึงเข้ามอเตอร์สูงยิ่งกว่าการสตาร์ทแบบ DOL (s=1)" },
                    { no: 346, text: "มอเตอร์ 220 V, Delta. $Z_{eq} = (0.1+0.3/s)+j4.0\\,\\Omega$ หากระแสสตาร์ทเมื่อต่อแบบ Star", choices: ["1 : 42.3 A", "2 : 24.4 A", "3 : 73.2 A", "4 : 31.6 A"], correctIndex: 3, explanation: "ถูกต้อง ขณะสตาร์ท $s=1$. $Z_{eq} = 0.4+j4.0$ ซึ่ง $|Z_{eq}| \\approx 4.02\\,\\Omega$. ต่อ Star แรงดันตกคร่อมคือ $220/\\sqrt{3} = 127$ V. กระแส $I = 127/4.02 = 31.6$ A" },
                    { no: 347, text: "สตาร์ท Star-Delta ระบบ 220 V ควรเลือกแผ่นป้ายพิกัดแบบใด", choices: ["1 : 220/380 V", "2 : 380/660 V", "3 : 660 V", "4 : 380 V"], correctIndex: 0, explanation: "ถูกต้อง มอเตอร์ต้องรันปกติในแบบ Delta ด้วยไฟ 220V (ขดลวดทนได้ 220V) แผ่นป้ายจึงควรระบุ $\\Delta/Y = 220/380$ V" }
                ]
            },
            {
                chapter: "บทที่ 47 : Starting methods for synchronous motors (ข้อ 348 - 356)",
                questions: [
                    { no: 348, text: "ข้อใดไม่ใช่วิธีการสตาร์ทมอเตอร์ซิงโครนัสสามเฟส", choices: ["1 : Synchronization starting", "2 : Induction starting", "3 : Reduced frequency starting", "4 : ไม่มีข้อใดผิด"], correctIndex: 3, explanation: "ถูกต้อง วิธีที่ 1 (ใช้ต้นกำลัง), วิธีที่ 2 (ใช้ขดลวดแดมเปอร์), วิธีที่ 3 (ใช้อินเวอร์เตอร์ปรับความถี่) ล้วนเป็นวิธีที่ใช้งานจริงทั้งหมด" },
                    { no: 349, text: "มอเตอร์ซิงโครนัสใช้ดันกำลังช่วยหมุน ปลดเครื่องดันกำลังออกเมื่อใด", choices: ["1 : เมื่อป้อนกระแสฟิลด์แล้ว", "2 : เมื่อหมุนด้วยความเร็วพิกัดแล้ว", "3 : เมื่อต่อขั้วสเตเตอร์เข้าระบบแล้ว", "4 : เมื่ออยู่ในสภาวะ steady state"], correctIndex: 2, explanation: "ถูกต้อง ต้องทำการขนาน (Synchronize) สเตเตอร์เข้ากับระบบกริดให้เรียบร้อยก่อน มอเตอร์จึงจะสามารถยึดเกาะกับความถี่กริดได้ จากนั้นจึงปลดต้นกำลังได้" },
                    { no: 350, text: "Amortisseur winding หรือ Damper winding ในมอเตอร์ซิงโครนัส คืออะไร", choices: ["1 : ขดลวดอาร์มาเจอร์", "2 : ขดลวดสร้างสนามแม่เหล็ก", "3 : ขดลวดกรงกระรอกใช้สำหรับช่วยในการเริ่มหมุน", "4 : ขดลวดชดเชยใช้แก้ Armature reaction"], correctIndex: 2, explanation: "ถูกต้อง Damper winding มีลักษณะเป็นแท่งทองแดงฝังที่หน้าขั้วแม่เหล็ก ทำหน้าที่เสมือนโรเตอร์กรงกระรอก ช่วยสร้างแรงบิดเหนี่ยวนำตอนเริ่มสตาร์ท" },
                    { no: 351, text: "เมื่อจ่ายแรงดันไฟฟ้าที่พิกัดให้มอเตอร์ซิงโครนัส (ไม่มีวิธีช่วยสตาร์ท) จะเกิดอะไรขึ้น", choices: ["1 : ออกตัวหมุนตามปกติ", "2 : ออกตัวไม่ดีแต่หมุนได้", "3 : ไม่หมุนเพราะแรงดันน้อย", "4 : ไม่หมุน เพราะโรเตอร์เกาะสนามแม่เหล็กไม่ทัน"], correctIndex: 3, explanation: "ถูกต้อง เนื่องจากโรเตอร์มีความเฉื่อย สนามแม่เหล็กหมุนที่เกิดจาก 50Hz เร็วเกินไป โรเตอร์สลับขั้วตามไม่ทัน แรงบิดเฉลี่ยจึงเป็นศูนย์ ทำให้มอเตอร์สั่นแต่ไม่หมุน" },
                    { no: 352, text: "ข้อใดต่อไปนี้ถูกต้อง", choices: ["1 : สตาร์ทได้แค่ 2 วิธี", "2 : ขดลวดพิเศษทำให้เสียเสถียรภาพ", "3 : ทำงานเป็น gen กลับเป็น motor ทันทีไม่ได้", "4 : ขดลวดพิเศษฝังที่หน้าโพลทำหน้าที่คล้ายกรงกระรอก เรียกว่า Damper winding"], correctIndex: 3, explanation: "ถูกต้อง ขดลวดแดมเปอร์ (Damper winding) คือกรงกระรอกจำลองที่ฝังไว้หน้าขั้วแม่เหล็กเพื่อช่วยสตาร์ทแบบ Induction" },
                    { no: 353, text: "ขณะสตาร์ทด้วย Damper winding ต้องลัดวงจรขดลวดสร้างสนามเพื่อป้องกันเหตุการณ์ใด", choices: ["1 : แรงดันเกินในวงจรอาร์มาเจอร์", "2 : กระแสเกินในวงจรอาร์มาเจอร์", "3 : แรงดันเกินในวงจรขดลวดสนาม", "4 : กระแสเกินในวงจรขดลวดสนาม"], correctIndex: 2, explanation: "ถูกต้อง ตอนเริ่มหมุน สลิปมีค่า 1 (ตัดเส้นแรงแม่เหล็กความเร็วสูงมาก) ขดลวดฟิลด์มีจำนวนรอบเยอะมาก จะเกิดแรงดันเหนี่ยวนำสูงจนฉนวนอาจทะลุได้ จึงต้องต่อลัดวงจร (ผ่านตัวต้านทานดิสชาร์จ)" },
                    { no: 354, text: "ข้อใดเป็นวิธีการสตาร์ทของมอเตอร์ซิงโครนัส", choices: ["1 : สตาร์ทด้วยไฟตรง", "2 : ใช้วิธีเดียวกับมอเตอร์เหนี่ยวนำ", "3 : Synchronization แล้วตัด Prime mover", "4 : สตาร์ทด้วยขดลวดพิเศษ"], correctIndex: 2, explanation: "ถูกต้อง การใช้ Prime mover เร่งความเร็วขึ้นไปจนสามารถ Synchronization เข้ากับระบบไฟ แล้วค่อยปลด Prime mover ออก เป็นวิธีคลาสสิกของซิงโครนัสมอเตอร์" },
                    { no: 355, text: "ขณะต่อ Infinite bus เปลี่ยนกระแสฟิลด์ ทำให้เกิดอะไร", choices: ["1 : กำลังไฟฟ้าเพิ่ม เมื่อเพิ่มฟิลด์", "2 : กำลังไฟฟ้าลด เมื่อลดฟิลด์", "3 : PF ล้าหลัง เมื่อเพิ่มฟิลด์", "4 : PF นำหน้า เมื่อเพิ่มฟิลด์"], correctIndex: 3, explanation: "ถูกต้อง การเพิ่มกระแสฟิลด์ให้สูงกว่าพิกัด (Over-excitation) มอเตอร์ซิงโครนัสจะทำหน้าที่คล้ายตัวเก็บประจุ คือจ่าย VAr เข้าระบบ ทำให้ดึงกระแสแบบนำหน้า (Leading PF)" },
                    { no: 356, text: "ซิงโครนัสไม่สามารถเริ่มหมุนเองได้เพราะเหตุใด", choices: ["1 : เร่งความเร็วไม่ทันในครึ่งคาบ", "2 : แรงบิดเฉลี่ยเป็นศูนย์", "3 : ขดลวดรับแรงดันกระชากไม่ไหว", "4 : ถูกทุกข้อ"], correctIndex: 3, explanation: "ถูกต้อง ความเฉื่อยโรเตอร์ทำให้ตามสนามแม่เหล็กสเตเตอร์ไม่ทันในครึ่งไซเคิล แรงบิดผลัก-ดูดสลับกันรวดเร็วทำให้แรงบิดเฉลี่ยเป็น 0 มอเตอร์จึงหมุนไม่ได้" }
                ]
            },
            {
                chapter: "บทที่ 48 : Speed control methods of induction motor (ข้อ 357 - 371)",
                questions: [
                    { no: 357, text: "ข้อใดต่อไปนี้ไม่ใช่ผลของการเพิ่มความถี่ไฟ", choices: ["1 : ความเร็วรอบ no load สูงขึ้น", "2 : แรงบิดสูงสุดเพิ่มขึ้น", "3 : ที่สลิปเดียวกัน ความเร็วสูงขึ้น", "4 : ความเร็วที่จุดแรงบิดสูงสุดเพิ่มขึ้น"], correctIndex: 1, explanation: "ถูกต้อง ถ้า V คงที่ การเพิ่ม f จะทำให้เส้นแรงแม่เหล็ก (Flux) ลดลง แรงบิดสูงสุด ($T_{max} \\propto (V/f)^2$) จึง ลดลง ไม่ใช่เพิ่มขึ้น" },
                    { no: 358, text: "ข้อใดไม่ใช่วิธีควบคุมความเร็วมอเตอร์เหนี่ยวนำ 3 เฟส", choices: ["1 : ปรับความถี่", "2 : เปลี่ยนขั้วแม่เหล็ก", "3 : เพิ่ม R โรเตอร์", "4 : เปลี่ยนการต่อ Star เป็น Delta"], correctIndex: 3, explanation: "ถูกต้อง การเปลี่ยน Star เป็น Delta ทำเพื่อการสตาร์ทเพื่อลดกระแสกระชาก ไม่ใช่วิธีที่ใช้เพื่อควบคุมความเร็วรอบระหว่างการรันปกติ" },
                    { no: 359, text: "ตัวเลือกใดกล่าวเกี่ยวกับการควบคุมความเร็วไม่ถูกต้อง", choices: ["1 : เปลี่ยนขั้วแม่เหล็กปรับความเร็วได้อย่างละเอียดที่สุด", "2 : ปรับ f ต้องรักษา V/f", "3 : ปรับ V เป็นวิธีหนึ่ง", "4 : เปลี่ยน f คือปรับอินพุท"], correctIndex: 0, explanation: "ถูกต้อง การเปลี่ยนขั้ว (Pole changing) ทำได้แบบก้าวกระโดดเท่านั้น (เช่น 2, 4, 6 ขั้ว -> 3000, 1500, 1000 rpm) จึงเป็นวิธีที่ หยาบที่สุด ไม่ใช่ละเอียดที่สุด" },
                    { no: 360, text: "ตัวเลือกใดกล่าวไม่ถูกต้อง", choices: ["1 : มอเตอร์ที่เปลี่ยนขั้วได้มีราคาแพง", "2 : เปลี่ยนขั้วเหมาะกับงานไม่ต้องการละเอียด", "3 : ปรับความเร็วทำได้โดยปรับ f และ P เท่านั้น", "4 : 50Hz, P=2,4,6 ได้ Ns=3000,1500,1000"], correctIndex: 2, explanation: "ถูกต้อง คำว่า \"เท่านั้น\" ทำให้ข้อนี้ผิด เพราะนอกจากปรับ f และ P แล้ว ยังสามารถปรับความเร็วด้วยการควบคุมแรงดัน (Voltage control) หรือควบคุมความต้านทานโรเตอร์ (Rotor resistance control) ได้อีกด้วย" },
                    { no: 361, text: "ควบคุมความเร็วด้วยความถี่ไฟต่ำกว่าพิกัด ต้องทำสิ่งใดประกอบ", choices: ["1 : ลดกระแสสนาม", "2 : ลดแรงดันไฟฟ้าป้อนเข้า", "3 : เพิ่มแรงดันไฟฟ้า", "4 : ลดภาระลง"], correctIndex: 1, explanation: "ถูกต้อง ในย่านต่ำกว่าความเร็วพิกัด (Below base speed) จำเป็นต้องรักษาอัตราส่วน V/f ให้คงที่เพื่อไม่ให้แกนเหล็กอิ่มตัว ดังนั้นเมื่อลด f ก็ต้อง \"ลด V\" ควบคู่กันไป" },
                    { no: 362, text: "ปรับความเร็วโดยเปลี่ยนจำนวนขั้ว ข้อใดไม่ถูกต้อง", choices: ["1 : เกิดจากการเปลี่ยนการต่อสเตเตอร์", "2 : เหมาะสมกับ Wound rotor", "3 : ไม่สามารถปรับต่อเนื่องได้", "4 : ไม่มีข้อใดผิด"], correctIndex: 1, explanation: "ถูกต้อง วิธีการเปลี่ยนขั้วแม่เหล็ก เหมาะกับ Squirrel cage เท่านั้น เพราะกรงกระรอกปรับตัวตามขั้วสเตเตอร์ได้เองแบบอัตโนมัติ สำหรับ Wound rotor หากเปลี่ยนขั้วสเตเตอร์ต้องรื้อพันขั้วโรเตอร์ใหม่ให้ตรงกันด้วย จึงไม่เหมาะสม" },
                    { no: 363, text: "380V, 50Hz, 4 poles (Ns=1500). ต้องการ Nl ~ 750 rpm. ต้องจ่าย V, f เท่าใด", choices: ["1 : 190V, 12.5Hz", "2 : 380V, 25Hz", "3 : 190V, 25Hz", "4 : 380V, 12.5Hz"], correctIndex: 2, explanation: "ถูกต้อง ต้องการรอบลดลงครึ่งหนึ่ง ความถี่ f ต้องลดครึ่งหนึ่งเป็น 25 Hz. และเพื่อรักษา V/f (Constant Volts/Hertz) แรงดัน V ก็ต้องลดครึ่งหนึ่งเป็น 190V ด้วย" },
                    { no: 364, text: "380V, 60Hz, 6 poles (Ns=1200). ต้องการ Nl ~ 2400 rpm อินเวอร์เตอร์ต้องจ่าย V, f เท่าใด (คำนึงถึงพิกัดด้วย)", choices: ["1 : 380V, 40Hz", "2 : 253V, 40Hz", "3 : 380V, 120Hz", "4 : 760V, 120Hz"], correctIndex: 2, explanation: "ถูกต้อง รอบ 2400 คือต้องใช้ f=120Hz. ตามทฤษฎีต้องใช้ไฟ 760V แต่ฉนวนมอเตอร์ทนได้แค่พิกัด 380V ดังนั้นต้องจำกัด V ไว้ที่ 380V สูงสุด (สภาวะ Field weakening)" },
                    { no: 365, text: "มอเตอร์เหนี่ยวนำสามเฟส สามารถควบคุมความเร็วได้โดยวิธีใด", choices: ["1 : เปลี่ยนจำนวนเส้นแรงแม่เหล็ก", "2 : เปลี่ยนจำนวนขั้วแม่เหล็ก", "3 : เปลี่ยนความถี่แรงดันจ่ายให้มอเตอร์", "4 : มีคำตอบถูกมากกว่า 1 ข้อ"], correctIndex: 3, explanation: "ถูกต้อง วิธีเปลี่ยนจำนวนขั้วแม่เหล็ก (Pole) และวิธีเปลี่ยนความถี่ (Frequency VFD) เป็นวิธีหลักในการควบคุมความเร็วมอเตอร์ AC" },
                    { no: 366, text: "10 kW, 380V, 50Hz, 4 poles (Ns=1500). ป้อนไฟ 380V แต่ f=80 Hz แรงบิดขับโหลดจะประมาณเท่าใด", choices: ["1 : 40 N.m", "2 : 50 N.m", "3 : 80 N.m", "4 : 100 N.m"], correctIndex: 0, explanation: "ถูกต้อง ที่ 80Hz (Field weakening) กำลัง P คงที่ 10kW. ความเร็วซิงโครนัส $\\omega_s = \\frac{120 \\times 80}{4} \\times \\frac{2\\pi}{60} \\approx 251$ rad/s. แรงบิด $T = P/\\omega = 10000 / 251 \\approx 39.8$ N.m (ประมาณ 40 N.m)" },
                    { no: 367, text: "วิธีการใดที่ไม่ใช่วิธีควบคุมความเร็วมอเตอร์เหนี่ยวนำสามเฟส", choices: ["1 : ปรับแรงดันที่สาย", "2 : ปรับความถี่", "3 : เปลี่ยนลำดับเฟส", "4 : ปรับความต้านทานโรเตอร์"], correctIndex: 2, explanation: "ถูกต้อง การเปลี่ยนลำดับเฟส (Phase sequence) ใช้สำหรับการ กลับทิศทางการหมุน (Reverse) ไม่ใช่วิธีการควบคุมระดับความเร็วรอบ" },
                    { no: 368, text: "1.0 kW, 380V, 50Hz. ป้อน 25 Hz. พิกัดกำลังที่จ่ายได้จะประมาณเท่าใด", choices: ["1 : 250 W", "2 : 500 W", "3 : 1000 W", "4 : 2000 W"], correctIndex: 1, explanation: "ถูกต้อง ในย่านต่ำกว่าพิกัด (Constant V/f) แรงบิดสูงสุดจะคงที่ เนื่องจาก $P = T \\cdot \\omega$ เมื่อความเร็วรอบ (ความถี่) ลดลงครึ่งหนึ่ง กำลังสูงสุดที่จ่ายได้จึงลดลงครึ่งหนึ่งเหลือ 500 W" },
                    { no: 369, text: "จากข้อ 368 ป้อน 25 Hz ควรใช้แรงดันเท่าใด", choices: ["1 : 95 V", "2 : 190 V", "3 : 380 V", "4 : 760 V"], correctIndex: 1, explanation: "ถูกต้อง เพื่อรักษาอัตราส่วน V/f ให้คงที่ เมื่อความถี่ลดเหลือครึ่งหนึ่ง (25Hz) แรงดันก็ต้องลดเหลือครึ่งหนึ่งด้วย $380/2 = 190$ V" },
                    { no: 370, text: "1.0 kW, 380V, 50Hz. ป้อน 100 Hz. พิกัดกำลังที่จ่ายได้จะประมาณเท่าใด", choices: ["1 : 250 W", "2 : 500 W", "3 : 1000 W", "4 : 2000 W"], correctIndex: 2, explanation: "ถูกต้อง ในย่านสูงกว่าพิกัด (Field weakening) แรงดันถูกล็อคไว้ที่ 380V แรงบิดจะลดลงตามความเร็ว แต่พิกัดกำลังสูงสุดที่มอเตอร์ทำได้จะ รักษาไว้คงที่ (Constant Power Region) คือ 1.0 kW เท่าเดิม" },
                    { no: 371, text: "จากข้อ 370 ป้อน 100 Hz แรงดันควรเป็นเท่าใด", choices: ["1 : 95 V", "2 : 190 V", "3 : 380 V", "4 : 760 V"], correctIndex: 2, explanation: "ถูกต้อง ในย่านความถี่เกินพิกัด เราไม่สามารถเพิ่มแรงดันเกินพิกัดฉนวนได้ ดังนั้นจึงต้องจำกัดและคงแรงดันไว้ที่ 380 V (Rated voltage)" }
                ]
            },
            {
                chapter: "บทที่ 49 : Protection of machines (ข้อ 372 - 388)",
                questions: [
                    { no: 372, text: "ขดลวดที่มีฉนวนชนิด B (insulation class B) อุณหภูมิสูงสุดที่ยอมรับได้มีค่าเท่าใด", choices: ["1 : 105 degree Celsius", "2 : 120 degree Celsius", "3 : 130 degree Celsius", "4 : 155 degree Celsius"], correctIndex: 2, explanation: "ถูกต้อง ตามมาตรฐาน NEMA Insulation Class B สามารถทนอุณหภูมิสูงสุด (Hot spot) ได้ที่ $130^\\circ$C" },
                    { no: 373, text: "ขดลวดที่มีฉนวนชนิด F (Insulation class F) อุณหภูมิสูงสุดที่ยอมรับได้มีค่าเท่าใด", choices: ["1 : 105 degree Celsius", "2 : 120 degree Celsius", "3 : 130 degree Celsius", "4 : 155 degree Celsius"], correctIndex: 3, explanation: "ถูกต้อง Insulation Class F ทนอุณหภูมิสูงสุด (Hot spot) ได้ที่ $155^\\circ$C (เป็นคลาสที่ใช้แพร่หลายที่สุดในมอเตอร์อุตสาหกรรมปัจจุบัน)" },
                    { no: 374, text: "ออกแบบ Overload relay เพื่อป้องกันมอเตอร์ ควรตั้งไว้กี่เปอร์เซ็นต์ของพิกัด", choices: ["1 : 125%", "2 : 150%", "3 : 175%", "4 : 200%"], correctIndex: 0, explanation: "ถูกต้อง ตามมาตรฐาน NEC แนะนำให้ตั้งค่า Overload เผื่อไว้สำหรับการเริ่มเดินเครื่องเล็กน้อย ปกติอยู่ที่ 115% ถึง 125% ของพิกัด Full Load Ampere (FLA)" },
                    { no: 375, text: "อุปกรณ์ใด ไม่ใช่ อุปกรณ์ป้องกันมอเตอร์ทางไฟฟ้า", choices: ["1 : Circuit breaker", "2 : Overload relay", "3 : Fuse", "4 : Bearing"], correctIndex: 3, explanation: "ถูกต้อง Bearing (ตลับลูกปืน) เป็นชิ้นส่วนรองรับทางกลเพื่อให้แกนเพลาหมุนได้ ไม่ใช่อุปกรณ์ป้องกันความผิดปกติของวงจรไฟฟ้า" },
                    { no: 376, text: "ข้อใดเป็นสาเหตุทำให้มอเตอร์เกิดความเสียหายได้", choices: ["1 : อุณหภูมิสูงเกินพิกัด", "2 : แรงดันไฟฟ้าสูงเกินพิกัด", "3 : ความเร็วรอบสูงเกินพิกัด", "4 : มีคำตอบถูกมากกว่า 1 ข้อ"], correctIndex: 3, explanation: "ถูกต้อง ความร้อนสะสมเกิน (ฉนวนเสื่อม), แรงดันสูงเกิน (ฉนวนพัง/แกนอิ่มตัว), และความเร็วสูงเกิน (แรงหนีศูนย์กลางทำลายโรเตอร์) ล้วนทำให้มอเตอร์พังได้ทั้งสิ้น" },
                    { no: 377, text: "ค่าระดับการป้องกัน (IP) ของมอเตอร์แสดงถึงอะไร", choices: ["1 : มาตรฐานการจับยึดมอเตอร์", "2 : มาตรฐานการระบายความร้อน", "3 : มาตรฐานการป้องกันเปลือกหุ้มมอเตอร์", "4 : มาตรฐานการตรวจจับการสั่นสะเทือน"], correctIndex: 2, explanation: "ถูกต้อง IP (Ingress Protection) เป็นมาตรฐานบ่งบอกระดับการป้องกันของเปลือกหุ้ม (Enclosure) จากของแข็ง/ฝุ่น และ ของเหลว/น้ำ" },
                    { no: 378, text: "IP XY ค่า X แสดงถึงการป้องกันสิ่งใด", choices: ["1 : น้ำ", "2 : ของแข็ง", "3 : ไฟฟ้า", "4 : ความร้อน"], correctIndex: 1, explanation: "ถูกต้อง ตัวเลขหลักแรก (X) บ่งบอกระดับการป้องกันวัตถุของแข็ง (Solid ingress) ตั้งแต่ฝุ่นผงไปจนถึงนิ้วมือและเครื่องมือ" },
                    { no: 379, text: "IP XY ค่า Y แสดงถึงการป้องกันสิ่งใด", choices: ["1 : น้ำ", "2 : ของแข็ง", "3 : ไฟฟ้า", "4 : ความร้อน"], correctIndex: 0, explanation: "ถูกต้อง ตัวเลขหลักที่สอง (Y) บ่งบอกระดับการป้องกันของเหลว/น้ำ (Water ingress) ตั้งแต่ละอองน้ำไปจนถึงการจมน้ำลึก" },
                    { no: 380, text: "IP 55 แสดงถึงอะไร", choices: ["1 : ป้องกันของแข็ง >12mm และน้ำตกแนวดิ่ง", "2 : ป้องกันของแข็ง >1mm และน้ำสาด", "3 : ป้องกันฝุ่นเข้า (ฝุ่นเข้าได้บ้างแต่ไม่ทำอันตราย) และป้องกันน้ำฉีดแรงดันต่ำ", "4 : ป้องกันฝุ่นสมบูรณ์ และป้องกันน้ำฉีดแรง"], correctIndex: 2, explanation: "ถูกต้อง IP5x หมายถึง ป้องกันฝุ่น (Dust protected - อาจมีฝุ่นเล็ดลอดแต่ไม่กระทบการทำงาน) และ IPx5 หมายถึง ป้องกันน้ำฉีด (Water jets) จากทุกทิศทาง" },
                    { no: 381, text: "โครงสร้างส่วนใดในมอเตอร์กระแสตรงไม่จำเป็นต้องพิจารณาการป้องกัน", choices: ["1 : ไม่มีคำตอบที่ถูกต้อง", "2 : ขดลวดอาร์เมเจอร์", "3 : ขดลวดสนามแบบขนาน", "4 : ขดลวดสนามแบบอนุกรม"], correctIndex: 0, explanation: "ถูกต้อง ชิ้นส่วนภายในทุกส่วน ไม่ว่าจะเป็นอาร์มาเจอร์ หรือขดลวดสนาม ล้วนแต่ต้องได้รับการป้องกันฉนวนและการระบายความร้อนที่เหมาะสม จึงไม่มีข้อใดที่ไม่ต้องพิจารณา" },
                    { no: 382, text: "ข้อจำกัดการปรับปรุง PF ของซิงโครนัสมอเตอร์ ขึ้นอยู่กับสิ่งใด", choices: ["1 : ตัวประกอบกำลังไฟฟ้าของแหล่งจ่าย", "2 : แรงดันพิกัดของมอเตอร์", "3 : กระแสพิกัดอาร์เมเจอร์", "4 : กระแสพิกัดขดลวดสนาม"], correctIndex: 3, explanation: "ถูกต้อง การปรับ PF ให้นำหน้า ทำได้โดยเพิ่มกระแสสร้างสนามแม่เหล็ก (Over-excitation) ข้อจำกัดสำคัญจึงอยู่ที่พิกัดทนความร้อนของ ขดลวดสร้างสนามแม่เหล็ก ว่าจ่ายกระแส $I_f$ ได้สูงสุดเท่าใด" },
                    { no: 383, text: "ขดลวดที่มีฉนวนชนิด E (Insulation class E) อุณหภูมิสูงสุดที่ยอมรับได้มีค่าเท่าใด", choices: ["1 : 105 degree Celsius", "2 : 120 degree Celsius", "3 : 130 degree Celsius", "4 : 155 degree Celsius"], correctIndex: 1, explanation: "ถูกต้อง ตามมาตรฐาน Insulation Class E สามารถทนอุณหภูมิสูงสุด (Hot spot) ได้ที่ $120^\\circ$C" },
                    { no: 384, text: "ป้องกันแรงดันผิดปกติ ควรป้องกันความผิดปกติใด", choices: ["1 : Over voltage", "2 : Under voltage", "3 : Unbalance voltage", "4 : ถูกทุกข้อ"], correctIndex: 3, explanation: "ถูกต้อง ทั้งไฟเกิน (Over), ไฟตก (Under), และแรงดันไม่สมดุล (Unbalance) ล้วนส่งผลให้กระแสสูงผิดปกติและความร้อนสะสมจนมอเตอร์ไหม้ได้ จึงต้องป้องกันทั้งหมด" },
                    { no: 385, text: "ความผิดปกติใดของแรงดันไฟฟ้า ต้องทำการตัดแหล่งจ่ายทันที", choices: ["1 : Over voltage", "2 : Under voltage", "3 : Unbalance voltage", "4 : Phase failure"], correctIndex: 3, explanation: "ถูกต้อง Phase failure (ไฟตกเฟส หรือไฟมาไม่ครบ 3 เฟส) เป็นสภาวะร้ายแรงที่ทำให้มอเตอร์ดึงกระแสสูงในเฟสที่เหลืออย่างรุนแรง (Single-phasing) มอเตอร์จะไหม้เร็วมาก จึงต้องตัดวงจรทันที" },
                    { no: 386, text: "ความผิดปกติของแรงดันไฟฟ้าข้อใดทำให้เกิดการสั่นสะเทือนอย่างต่อเนื่อง", choices: ["1 : Over voltage", "2 : Under voltage", "3 : Unbalance voltage", "4 : แรงดันไฟฟ้าไม่ส่งผลต่อการสั่นสะเทือน"], correctIndex: 2, explanation: "ถูกต้อง Unbalance voltage (แรงดันไม่สมดุล) ทำให้เกิดสนามแม่เหล็กหมุนทวนเข็ม (Negative sequence) สร้างแรงบิดต้าน (Pulsating torque) ที่ความถี่ 2 เท่า ส่งผลให้มอเตอร์สั่นสะเทือนอย่างหนัก" },
                    { no: 387, text: "มอเตอร์ 10 kW, 4 poles, 1430 rpm. ความเร็วใดแสดงว่ารับโหลดเกินพิกัด (Overload)", choices: ["1 : 1,400 rpm", "2 : 1,450 rpm", "3 : 1,500 rpm", "4 : 1,550 rpm"], correctIndex: 0, explanation: "ถูกต้อง ความเร็วพิกัดคือ 1430 rpm (สลิปปกติ) หากมอเตอร์โหลดเกินพิกัด สลิปจะกว้างขึ้น ส่งผลให้ความเร็วรอบตกลงต่ำกว่า 1430 rpm (เช่น 1400 rpm)" },
                    { no: 388, text: "มอเตอร์ 10 kW, 4 poles, 1430 rpm. ความเร็วใดแสดงว่าทำงานเป็นเครื่องกำเนิดไฟฟ้า", choices: ["1 : 1,400 rpm", "2 : 1,450 rpm", "3 : 1,500 rpm", "4 : 1,550 rpm"], correctIndex: 3, explanation: "ถูกต้อง มอเตอร์ 4 poles มีความเร็ว $N_s = 1500$ rpm. จะเข้าสู่สภาวะเครื่องกำเนิดไฟฟ้าได้ ต้นกำลังต้องขับให้เร็วกว่า 1500 rpm (Supersynchronous speed) ซึ่งก็คือ 1550 rpm" }
                ]
            }
        ];

        // 1. ฟังก์ชันสร้างหน้าเลือกบท (เพิ่มปุ่มสุ่มแบ่งครึ่งแรก-ครึ่งหลัง)
        function renderChapterSelection() {
            const listDiv = document.getElementById('chapter-list');
            listDiv.innerHTML = '';

            // --- กลุ่มที่ 1: สุ่มข้อ 1 - 220 (เนื้อหาครึ่งแรก) ---
            const group1 = document.createElement('div');
            group1.innerHTML = '<h3 style="color:#2c3e50; margin: 10px 0 10px 0; font-size: 1.1em;">🎲 โหมดสุ่มข้อสอบ (ครึ่งแรก: ข้อ 1 - 220)</h3>';
            listDiv.appendChild(group1);

            const randomEasyBtn1 = document.createElement('button');
            randomEasyBtn1.className = 'chapter-btn';
            randomEasyBtn1.style.backgroundColor = '#27ae60';
            randomEasyBtn1.style.marginBottom = '10px';
            randomEasyBtn1.innerText = '🟢 สุ่ม 40 ข้อ (ระดับง่าย - ตัวเลือกปกติ)';
            randomEasyBtn1.onclick = () => startRandomQuiz(false, 1, 220); // false=ง่าย, เริ่มข้อ 1, จบข้อ 220
            listDiv.appendChild(randomEasyBtn1);

            const randomHardBtn1 = document.createElement('button');
            randomHardBtn1.className = 'chapter-btn';
            randomHardBtn1.style.backgroundColor = '#e74c3c';
            randomHardBtn1.style.marginBottom = '25px'; // เว้นระยะห่างกลุ่ม
            randomHardBtn1.innerText = '🔴 สุ่ม 40 ข้อ (ระดับยาก - สลับตัวเลือก)';
            randomHardBtn1.onclick = () => startRandomQuiz(true, 1, 220); // true=ยากสลับช้อย, เริ่ม 1, จบ 220
            listDiv.appendChild(randomHardBtn1);

            // --- กลุ่มที่ 2: สุ่มข้อ 221 - 388 (เนื้อหาครึ่งหลัง) ---
            const group2 = document.createElement('div');
            group2.innerHTML = '<h3 style="color:#2c3e50; margin: 0 0 10px 0; font-size: 1.1em;">🎲 โหมดสุ่มข้อสอบ (ครึ่งหลัง: ข้อ 221 - 388)</h3>';
            listDiv.appendChild(group2);

            const randomEasyBtn2 = document.createElement('button');
            randomEasyBtn2.className = 'chapter-btn';
            randomEasyBtn2.style.backgroundColor = '#27ae60';
            randomEasyBtn2.style.marginBottom = '10px';
            randomEasyBtn2.innerText = '🟢 สุ่ม 40 ข้อ (ระดับง่าย - ตัวเลือกปกติ)';
            randomEasyBtn2.onclick = () => startRandomQuiz(false, 221, 388); // เริ่ม 221, จบ 388
            listDiv.appendChild(randomEasyBtn2);

            const randomHardBtn2 = document.createElement('button');
            randomHardBtn2.className = 'chapter-btn';
            randomHardBtn2.style.backgroundColor = '#e74c3c';
            randomHardBtn2.style.marginBottom = '25px'; // เว้นระยะห่างกลุ่ม
            randomHardBtn2.innerText = '🔴 สุ่ม 40 ข้อ (ระดับยาก - สลับตัวเลือก)';
            randomHardBtn2.onclick = () => startRandomQuiz(true, 221, 388); // เริ่ม 221, จบ 388
            listDiv.appendChild(randomHardBtn2);
            
            // --- กลุ่มที่ 3: ทำข้อสอบรายบท ---
            const group3 = document.createElement('div');
            group3.innerHTML = '<h3 style="color:#2c3e50; margin: 0 0 10px 0; font-size: 1.1em;">📖 เลือกทำตามบทเรียน</h3>';
            listDiv.appendChild(group3);

            // ปุ่มเลือกทำตามบทปกติ
            quizData.forEach((chapterData, index) => {
                const btn = document.createElement('button');
                btn.className = 'chapter-btn';
                btn.innerText = chapterData.chapter;
                btn.onclick = () => showQuiz(index);
                listDiv.appendChild(btn);
            });
        }

        // 2. ฟังก์ชันเริ่มโหมดสุ่ม (เพิ่มการรับค่าเลขข้อเริ่มต้น และเลขข้อสุดท้าย)
        function startRandomQuiz(isHardMode, startNo, endNo) {
            document.getElementById('chapter-selection').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            
            // อัปเดตหัวข้อให้โชว์ด้วยว่ากำลังสุ่มช่วงข้อที่เท่าไหร่
            document.getElementById('chapter-title').innerText = isHardMode ? 
                `🔴 โหมดสุ่มทำข้อสอบ 40 ข้อ (ข้อ ${startNo} - ${endNo} | ระดับยาก - สลับตัวเลือก)` : 
                `🟢 โหมดสุ่มทำข้อสอบ 40 ข้อ (ข้อ ${startNo} - ${endNo} | ระดับง่าย - ปกติ)`;
            
            const questionsArea = document.getElementById('questions-area');
            questionsArea.innerHTML = '';

            let allQuestions = [];
            quizData.forEach(chapter => {
                allQuestions = allQuestions.concat(chapter.questions);
            });

            // กรองเอาเฉพาะข้อที่อยู่ในช่วงที่เรากำหนด (startNo ถึง endNo)
            allQuestions = allQuestions.filter(q => q.no >= startNo && q.no <= endNo);
            
            allQuestions.sort(() => 0.5 - Math.random());
            const selectedQuestions = allQuestions.slice(0, 40);

            // ส่งไปให้ระบบวาดข้อสอบและจับคะแนน
            renderQuestions(selectedQuestions, questionsArea, isHardMode);
        }

        // 3. ฟังก์ชันเปิดข้อสอบปกติ (แบบเลือกบท)
        function showQuiz(chapterIndex) {
            document.getElementById('chapter-selection').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            
            const chapterData = quizData[chapterIndex];
            document.getElementById('chapter-title').innerText = chapterData.chapter;
            
            const questionsArea = document.getElementById('questions-area');
            questionsArea.innerHTML = '';

            // ส่งไปให้ระบบวาดข้อสอบและจับคะแนน (โดยตั้งค่าไม่ให้สลับช้อยส์)
            renderQuestions(chapterData.questions, questionsArea, false);
        }

        // 4. เครื่องยนต์หลัก: สร้างข้อสอบ จับคะแนน และแสดงผลสรุป
        function renderQuestions(questionsArray, container, isHardMode) {
            let score = 0;
            let answeredCount = 0;
            const totalQuestions = questionsArray.length;

            questionsArray.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-block';
                
                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                // โชว์เลขข้อต้นฉบับด้วย
                questionText.innerHTML = `ข้อที่ ${index + 1} <span style="font-size: 0.8em; color: #7f8c8d; font-weight: normal;">(อ้างอิงต้นฉบับข้อ ${q.no})</span> : ${q.text}`;
                questionDiv.appendChild(questionText);

                const choicesList = document.createElement('ul');
                choicesList.className = 'choices';

                const explanationDiv = document.createElement('div');
                explanationDiv.className = 'explanation';
                explanationDiv.innerHTML = `<strong>เฉลยและเหตุผล:</strong> ${q.explanation}`;

                let displayChoices = [];
                let actualCorrectIndex = q.correctIndex;

                if (isHardMode) {
                    // โหมดสลับช้อยส์
                    let mappedChoices = q.choices.map((text, i) => {
                        let cleanText = text.replace(/^\d+\s*:\s*/, '');
                        return { text: cleanText, isCorrect: i === q.correctIndex };
                    });
                    mappedChoices.sort(() => 0.5 - Math.random());
                    actualCorrectIndex = mappedChoices.findIndex(c => c.isCorrect);
                    displayChoices = mappedChoices.map(c => c.text);
                } else {
                    // โหมดปกติ
                    displayChoices = q.choices;
                }

                let isAnswered = false; 

                displayChoices.forEach((choiceText, cIndex) => {
                    const choiceLi = document.createElement('li');
                    choiceLi.className = 'choice';
                    choiceLi.innerHTML = choiceText;
                    
                    choiceLi.onclick = () => {
                        if (isAnswered) return; // ล็อคคำตอบ
                        isAnswered = true;
                        answeredCount++;

                        Array.from(choicesList.children).forEach(child => child.classList.remove('correct', 'incorrect'));
                        
                        if (cIndex === actualCorrectIndex) {
                            choiceLi.classList.add('correct');
                            score++; 
                        } else {
                            choiceLi.classList.add('incorrect');
                            choicesList.children[actualCorrectIndex].classList.add('correct');
                        }
                        explanationDiv.classList.add('show-explanation');

                        // เมื่อทำครบทุกข้อ ให้โชว์คะแนน
                        if (answeredCount === totalQuestions) {
                            showScoreSummary();
                        }
                    };
                    choicesList.appendChild(choiceLi);
                });

                questionDiv.appendChild(choicesList);
                questionDiv.appendChild(explanationDiv);
                container.appendChild(questionDiv);
            });

            // สร้างปุ่มส่งคำตอบ และหน้าต่างสรุปผล
            const finishBtn = document.createElement('button');
            finishBtn.className = 'chapter-btn';
            finishBtn.style.backgroundColor = '#3498db';
            finishBtn.style.marginTop = '20px';
            finishBtn.style.textAlign = 'center';
            finishBtn.innerText = '✅ ส่งคำตอบ / ดูสรุปคะแนน';
            finishBtn.onclick = () => showScoreSummary();
            container.appendChild(finishBtn);

            const summaryDiv = document.createElement('div');
            summaryDiv.id = 'score-summary';
            summaryDiv.className = 'card';
            summaryDiv.style.display = 'none';
            summaryDiv.style.marginTop = '20px';
            summaryDiv.style.textAlign = 'center';
            container.appendChild(summaryDiv);

            function showScoreSummary() {
                finishBtn.style.display = 'none'; 
                
                const percentage = ((score / totalQuestions) * 100).toFixed(0);
                let message = '';
                if (percentage >= 80) message = '🎉 ยอดเยี่ยมมาก! คุณพร้อมสำหรับการสอบแล้ว';
                else if (percentage >= 50) message = '👍 ทำได้ดี! แต่อาจจะต้องทบทวนอีกนิดนะ';
                else message = '💪 พยายามเข้านะ! กลับไปทบทวนเนื้อหาแล้วมาลองใหม่';

                summaryDiv.innerHTML = `
                    <h2 style="color: #2c3e50;">📊 สรุปคะแนนของคุณ</h2>
                    <p style="font-size: 1.8em; font-weight: bold; color: ${percentage >= 50 ? '#27ae60' : '#e74c3c'}; margin: 10px 0;">
                        คุณทำได้ ${score} / ${totalQuestions} คะแนน
                    </p>
                    <p style="font-size: 1.1em; color: #555; margin-bottom: 20px;">คิดเป็น ${percentage}% <br> ${message}</p>
                    <button class="back-btn" onclick="showChapterSelection()" style="margin-bottom: 0;">↻ กลับไปหน้ารวมข้อสอบ</button>
                `;
                summaryDiv.style.display = 'block';
                summaryDiv.scrollIntoView({ behavior: 'smooth' }); 
            }

            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise([container]).catch(err => console.log('MathJax error: ', err.message));
            }
        }

        // 5. ฟังก์ชันกลับไปหน้าเลือกบท
        function showChapterSelection() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('chapter-selection').style.display = 'flex';
        }

        // เริ่มการทำงานเมื่อเปิดเว็บ
        renderChapterSelection();
    </script>
</body>
</html>
